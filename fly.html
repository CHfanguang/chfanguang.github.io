<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>专注飞行 - Shadow Moon</title>

<style>
body{
    margin:0;
    font-family:-apple-system,BlinkMacSystemFont;
    background:#0a1f44;
    color:white;
    overflow:hidden;
}

/* 背景地图（假） */
.map{
    position:fixed;
    width:100%;
    height:100%;
    background:linear-gradient(#0a1f44,#1e3c72);
}

/* LOGO */
.logo{
    position:absolute;
    top:60px;
    width:100%;
    text-align:center;
    font-size:40px;
    font-weight:900;
}

/* 液态玻璃 */
.glass{
    backdrop-filter: blur(20px);
    background: rgba(255,255,255,0.1);
    border-radius:20px;
    padding:20px;
    margin:20px auto;
    width:80%;
}

/* 起始卡片 */
.start{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    text-align:center;
}

/* 按钮 */
.btn{
    margin-top:20px;
    padding:15px 30px;
    border-radius:12px;
    background:rgba(255,255,255,0.2);
}

/* 飞机 */
.plane{
    position:absolute;
    top:60%;
    left:10%;
    font-size:30px;
    transition: all 1s linear;
}

/* 路线 */
.route{
    position:absolute;
    top:70%;
    width:100%;
    height:2px;
    background:rgba(255,255,255,0.3);
}

/* 终点 */
.end{
    position:absolute;
    right:10%;
    top:60%;
    font-size:20px;
}

/* 时间 */
.timer{
    font-size:50px;
}
</style>

</head>

<body>

<div class="map"></div>

<div class="logo">Shadow Moon</div>

<div class="start glass" id="startBox">
欢迎来到CH凡光：专注飞行<br><br>
完全免费，告别没钱烦恼<br>
最新测试版，全球首发<br>
无需登录等复杂操作<br><br>

<div class="btn" onclick="startFlight()">开启飞行 ✈️</div>
</div>

<!-- 飞行UI -->
<div id="flightUI" style="display:none;">

<div class="route"></div>

<div class="plane" id="plane">✈️</div>

<div class="end">
城郊机场
</div>

<div class="glass" style="position:absolute;bottom:40px;left:50%;transform:translateX(-50%);text-align:center;">
<div>凡光城（城中机场） → 凡光城（城郊机场）</div>
<div class="timer" id="timer">25:00</div>
<div id="status">准备起飞...</div>
</div>

</div>

<script>
let total = 1500;
let time = total;
let timer;

function startFlight(){
    document.getElementById("startBox").style.display="none";
    document.getElementById("flightUI").style.display="block";

    document.getElementById("status").innerText="✈️ 飞行中";

    timer = setInterval(()=>{
        time--;

        let m = Math.floor(time/60);
        let s = time%60;

        document.getElementById("timer").innerText =
        (m<10?"0":"")+m+":"+(s<10?"0":"")+s;

        // 飞机移动
        let progress = (total-time)/total;
        let plane = document.getElementById("plane");
        plane.style.left = (10 + progress*70) + "%";

        if(time<=0){
            clearInterval(timer);
            document.getElementById("status").innerText="🛬 已降落";
        }

    },1000);
}

/* 切后台失败 */
document.addEventListener("visibilitychange", ()=>{
    if(document.hidden){
        alert("❌ 飞行失败（离开页面）");
        location.reload();
    }
});

/* 防退出 */
window.onbeforeunload = function(){
    return "飞行中，确定离开？";
}
</script>

</body>
</html>
