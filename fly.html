<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>专注飞行 - Shadow Moon</title>

<style>
body{
    margin:0;
    background:radial-gradient(circle at 50% 30%, #1e3c72, #0a1f44);
    font-family:-apple-system,BlinkMacSystemFont;
    color:white;
    overflow:hidden;
}

/* LOGO */
.logo{
    position:absolute;
    top:50px;
    width:100%;
    text-align:center;
    font-size:34px;
    font-weight:800;
}

/* 地图点 */
.map-dot{
    position:absolute;
    width:6px;
    height:6px;
    background:white;
    border-radius:50%;
    opacity:0.4;
}

/* 液态玻璃（增强版） */
.glass{
    backdrop-filter: blur(30px);
    background: rgba(255,255,255,0.15);
    border-radius:25px;
    padding:20px;
    width:85%;
    margin:auto;
    box-shadow:0 10px 30px rgba(0,0,0,0.3);
}

/* 起始 */
.start{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    text-align:center;
}

/* 按钮 */
.btn{
    margin-top:20px;
    padding:14px;
    border-radius:14px;
    background:rgba(255,255,255,0.2);
}

/* SVG航线 */
svg{
    position:absolute;
    width:100%;
    height:100%;
}

/* 飞机 */
.plane{
    position:absolute;
    font-size:26px;
    transform-origin:center;
}

/* 机场 */
.airport{
    position:absolute;
    font-size:14px;
    opacity:0.8;
}

/* 底部卡片 */
.card{
    position:absolute;
    bottom:40px;
    left:50%;
    transform:translateX(-50%);
    text-align:center;
}

/* 时间 */
.timer{
    font-size:48px;
}
</style>
</head>

<body>

<div class="logo">Shadow Moon</div>

<!-- 假地图点 -->
<script>
for(let i=0;i<40;i++){
    let dot=document.createElement("div");
    dot.className="map-dot";
    dot.style.left=Math.random()*100+"%";
    dot.style.top=Math.random()*100+"%";
    document.body.appendChild(dot);
}
</script>

<!-- 起始 -->
<div class="start glass" id="startBox">
欢迎来到CH凡光：专注飞行<br><br>
完全免费，告别没钱烦恼<br>
最新测试版，全球首发<br>
无需登录等复杂操作<br><br>

<div class="btn" onclick="startFlight()">开启飞行 ✈️</div>
</div>

<!-- 航线 -->
<svg id="routeSVG">
<path id="routePath" d="M50 500 Q200 200 350 400" stroke="white" stroke-width="2" fill="none" opacity="0.5"/>
</svg>

<!-- 飞机 -->
<div class="plane" id="plane">✈️</div>

<!-- 机场 -->
<div class="airport" style="left:40px;bottom:180px;">城中机场</div>
<div class="airport" style="right:40px;bottom:220px;">城郊机场</div>

<!-- 卡片 -->
<div class="card glass" id="card" style="display:none;">
<div>凡光城（城中机场） → 凡光城（城郊机场）</div>
<div class="timer" id="timer">25:00</div>
<div id="status">飞行中</div>
</div>

<script>
let total=1500;
let time=total;
let timer;

let path=document.getElementById("routePath");
let plane=document.getElementById("plane");
let length=path.getTotalLength();

function startFlight(){
    document.getElementById("startBox").style.display="none";
    document.getElementById("card").style.display="block";

    timer=setInterval(()=>{
        time--;

        let m=Math.floor(time/60);
        let s=time%60;

        document.getElementById("timer").innerText=
        (m<10?"0":"")+m+":"+(s<10?"0":"")+s;

        let progress=(total-time)/total;
        let point=path.getPointAtLength(progress*length);
        let next=path.getPointAtLength(progress*length+1);

        plane.style.left=point.x+"px";
        plane.style.top=point.y+"px";

        let angle=Math.atan2(next.y-point.y,next.x-point.x)*180/Math.PI;
        plane.style.transform="rotate("+angle+"deg)";

        if(time<=0){
            clearInterval(timer);
            document.getElementById("status").innerText="🛬 已降落";
        }

    },1000);
}

/* 切后台失败 */
document.addEventListener("visibilitychange",()=>{
    if(document.hidden){
        alert("❌ 飞行失败");
        location.reload();
    }
});
</script>

</body>
</html>
