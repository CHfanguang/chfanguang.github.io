<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CHFG社区 · 登录</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", sans-serif;
            background: #0a0a0f;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            position: relative;
        }
        
        /* 星空背景 */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: radial-gradient(2px 2px at 15px 60px, #fff, rgba(0,0,0,0)),
                        radial-gradient(2px 2px at 72px 150px, #fff, rgba(0,0,0,0)),
                        radial-gradient(2px 2px at 145px 280px, #ffd700, rgba(0,0,0,0)),
                        radial-gradient(2px 2px at 220px 90px, #fff, rgba(0,0,0,0)),
                        radial-gradient(3px 3px at 350px 190px, #87ceeb, rgba(0,0,0,0)),
                        radial-gradient(2px 2px at 410px 310px, #fff, rgba(0,0,0,0)),
                        radial-gradient(3px 3px at 520px 130px, #ffd700, rgba(0,0,0,0)),
                        radial-gradient(2px 2px at 680px 250px, #fff, rgba(0,0,0,0)),
                        radial-gradient(2px 2px at 750px 380px, #87ceeb, rgba(0,0,0,0)),
                        radial-gradient(3px 3px at 820px 90px, #fff, rgba(0,0,0,0));
            background-size: 200px 200px;
            background-repeat: repeat;
            opacity: 0.6;
            animation: stars 180s linear infinite;
            pointer-events: none;
        }
        
        @keyframes stars {
            from { transform: translateY(0) translateX(0); }
            to { transform: translateY(-1000px) translateX(200px); }
        }
        
        .login-container {
            width: 100%;
            max-width: 400px;
            position: relative;
            z-index: 10;
        }
        
        .login-card {
            background: rgba(30, 30, 40, 0.8);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 30px;
            padding: 40px 30px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }
        
        .rainbow-title {
            font-size: 32px;
            font-weight: 800;
            text-align: center;
            margin-bottom: 30px;
            background: linear-gradient(90deg, #4285F4, #9B51E0, #34A853, #EA4335, #FBBC05, #FF6B35);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        label {
            display: block;
            color: #a0a0b0;
            font-size: 14px;
            margin-bottom: 8px;
        }
        
        input {
            width: 100%;
            padding: 14px 16px;
            background: rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            color: white;
            font-size: 15px;
        }
        
        input:focus {
            outline: none;
            border-color: #667eea;
        }
        
        .btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            border-radius: 12px;
            color: white;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-bottom: 10px;
        }
        
        .btn-register {
            background: #34A853;
        }
        
        .message {
            margin-top: 20px;
            padding: 12px;
            border-radius: 10px;
            text-align: center;
            font-size: 14px;
            display: none;
        }
        
        .message.error {
            background: rgba(234,67,53,0.2);
            border: 1px solid #EA4335;
            color: #EA4335;
            display: block;
        }
        
        .message.success {
            background: rgba(52,168,83,0.2);
            border: 1px solid #34A853;
            color: #34A853;
            display: block;
        }
        
        .link {
            text-align: center;
            margin-top: 20px;
            color: #a0a0b0;
            font-size: 14px;
        }
        
        .link a {
            color: #667eea;
            text-decoration: none;
            cursor: pointer;
        }
        
        .hidden {
            display: none;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="rainbow-title">CHFG社区</div>
            
            <div id="loginForm">
                <div class="form-group">
                    <label>邮箱</label>
                    <input type="email" id="loginEmail" placeholder="请输入邮箱">
                </div>
                <div class="form-group">
                    <label>密码</label>
                    <input type="password" id="loginPassword" placeholder="请输入密码">
                </div>
                <button class="btn" onclick="login()">登录</button>
                <button class="btn btn-register" onclick="showRegister()">注册</button>
            </div>
            
            <div id="registerForm" class="hidden">
                <div class="form-group">
                    <label>用户名</label>
                    <input type="text" id="regUsername" placeholder="请输入用户名">
                </div>
                <div class="form-group">
                    <label>邮箱</label>
                    <input type="email" id="regEmail" placeholder="请输入邮箱">
                </div>
                <div class="form-group">
                    <label>密码</label>
                    <input type="password" id="regPassword" placeholder="请输入密码">
                </div>
                <div class="form-group">
                    <label>确认密码</label>
                    <input type="password" id="regConfirm" placeholder="请再次输入密码">
                </div>
                <button class="btn" onclick="register()">注册</button>
                <button class="btn btn-register" onclick="showLogin()">返回登录</button>
            </div>
            
            <div id="message" class="message"></div>
            
            <div class="link">
                社区长邮箱：<span style="color:#FBBC05;">chfanguang@outlook.com</span>
            </div>
        </div>
    </div>

    <script>
        // ============ IPFS 配置 ============
        const IPFS_GATEWAY = 'https://ipfs.io/ipfs/';
        const WEB3_STORAGE = 'https://api.web3.storage/upload';
        const DATA_HASH_KEY = 'chfg_data_hash_v3';
        
        let allUsers = [];
        let userAvatars = {};

        // ============ 初始化 ============
        async function init() {
            const hash = localStorage.getItem(DATA_HASH_KEY);
            if (hash) {
                await loadFromIPFS(hash);
            }
        }

        // ============ 从 IPFS 加载 ============
        async function loadFromIPFS(hash) {
            try {
                const response = await fetch(IPFS_GATEWAY + hash);
                const data = await response.json();
                allUsers = data.users || [];
                userAvatars = data.avatars || {};
            } catch (error) {
                console.error('加载失败:', error);
            }
        }

        // ============ 保存到 IPFS ============
        async function saveToIPFS() {
            const data = {
                users: allUsers,
                avatars: userAvatars,
                timestamp: new Date().toISOString()
            };
            
            const jsonString = JSON.stringify(data);
            const blob = new Blob([jsonString], { type: 'application/json' });
            const formData = new FormData();
            formData.append('file', blob, 'data.json');
            
            try {
                const response = await fetch(WEB3_STORAGE, {
                    method: 'POST',
                    body: formData,
                    headers: { 'Accept': 'application/json' }
                });
                const result = await response.json();
                const cid = result.cid;
                localStorage.setItem(DATA_HASH_KEY, cid);
                return cid;
            } catch (error) {
                console.error('保存失败:', error);
                return null;
            }
        }

        // ============ 显示消息 ============
        function showMessage(text, type) {
            const msg = document.getElementById('message');
            msg.textContent = text;
            msg.className = `message ${type}`;
        }

        // ============ 切换表单 ============
        function showRegister() {
            document.getElementById('loginForm').classList.add('hidden');
            document.getElementById('registerForm').classList.remove('hidden');
            document.getElementById('message').className = 'message';
        }

        function showLogin() {
            document.getElementById('registerForm').classList.add('hidden');
            document.getElementById('loginForm').classList.remove('hidden');
            document.getElementById('message').className = 'message';
        }

        // ============ 登录 ============
        async function login() {
            const email = document.getElementById('loginEmail').value.trim();
            const password = document.getElementById('loginPassword').value.trim();
            
            if (!email || !password) {
                showMessage('请填写邮箱和密码', 'error');
                return;
            }
            
            await init(); // 确保数据最新
            
            const user = allUsers.find(u => u.email === email && u.password === password);
            if (!user) {
                showMessage('邮箱或密码错误', 'error');
                return;
            }
            
            // 保存登录状态
            localStorage.setItem('currentUser', JSON.stringify(user));
            showMessage('登录成功，正在跳转...', 'success');
            
            setTimeout(() => {
                window.location.href = 'ipfs-community.html';
            }, 1500);
        }

        // ============ 注册 ============
        async function register() {
            const username = document.getElementById('regUsername').value.trim();
            const email = document.getElementById('regEmail').value.trim();
            const password = document.getElementById('regPassword').value.trim();
            const confirm = document.getElementById('regConfirm').value.trim();
            
            if (!username || !email || !password || !confirm) {
                showMessage('请填写所有字段', 'error');
                return;
            }
            
            if (password !== confirm) {
                showMessage('两次密码不一致', 'error');
                return;
            }
            
            await init();
            
            if (allUsers.find(u => u.email === email)) {
                showMessage('邮箱已注册', 'error');
                return;
            }
            
            const role = email === 'chfanguang@outlook.com' ? 'community_leader' : 'user';
            
            const newUser = {
                id: Date.now(),
                username,
                email,
                password,
                role,
                created_at: new Date().toISOString()
            };
            
            allUsers.push(newUser);
            await saveToIPFS();
            
            localStorage.setItem('currentUser', JSON.stringify(newUser));
            showMessage('注册成功，正在跳转...', 'success');
            
            setTimeout(() => {
                window.location.href = 'ipfs-community.html';
            }, 1500);
        }

        // ============ 检查是否已登录 ============
        function checkLogin() {
            const user = localStorage.getItem('currentUser');
            if (user) {
                window.location.href = 'ipfs-community.html';
            }
        }

        checkLogin();
    </script>
</body>
</html>
