<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CHFG社区 · 登录</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", sans-serif;
            background: #0a0a0f;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            position: relative;
            overflow-x: hidden;
        }
        
        /* 星空背景 */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: radial-gradient(2px 2px at 15px 60px, #fff, rgba(0,0,0,0)),
                        radial-gradient(2px 2px at 72px 150px, #fff, rgba(0,0,0,0)),
                        radial-gradient(2px 2px at 145px 280px, #ffd700, rgba(0,0,0,0)),
                        radial-gradient(2px 2px at 220px 90px, #fff, rgba(0,0,0,0)),
                        radial-gradient(3px 3px at 350px 190px, #87ceeb, rgba(0,0,0,0)),
                        radial-gradient(2px 2px at 410px 310px, #fff, rgba(0,0,0,0)),
                        radial-gradient(3px 3px at 520px 130px, #ffd700, rgba(0,0,0,0)),
                        radial-gradient(2px 2px at 680px 250px, #fff, rgba(0,0,0,0)),
                        radial-gradient(2px 2px at 750px 380px, #87ceeb, rgba(0,0,0,0)),
                        radial-gradient(3px 3px at 820px 90px, #fff, rgba(0,0,0,0));
            background-size: 200px 200px;
            background-repeat: repeat;
            opacity: 0.6;
            animation: stars 180s linear infinite;
            pointer-events: none;
        }
        
        @keyframes stars {
            from { transform: translateY(0) translateX(0); }
            to { transform: translateY(-1000px) translateX(200px); }
        }
        
        /* 吸顶栏 */
        .top-bar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 60px;
            background: rgba(20, 20, 30, 0.8);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255,255,255,0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        
        .rainbow-text {
            font-size: 24px;
            font-weight: 800;
            background: linear-gradient(90deg, #4285F4, #9B51E0, #34A853, #EA4335, #FBBC05, #FF6B35);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        
        .container {
            width: 100%;
            max-width: 400px;
            margin-top: 40px;
            position: relative;
            z-index: 10;
        }
        
        .card {
            background: rgba(30, 30, 40, 0.6);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 30px;
            padding: 40px 30px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }
        
        .welcome-section {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .welcome-title {
            font-size: 28px;
            font-weight: 800;
            color: white;
            margin-bottom: 8px;
        }
        
        .welcome-subtitle {
            font-size: 15px;
            color: #a0a0b0;
        }
        
        .tab-bar {
            display: flex;
            gap: 8px;
            margin-bottom: 25px;
            background: rgba(0,0,0,0.2);
            padding: 4px;
            border-radius: 12px;
        }
        
        .tab {
            flex: 1;
            text-align: center;
            padding: 10px;
            border-radius: 10px;
            cursor: pointer;
            color: #a0a0b0;
            font-weight: 500;
            transition: all 0.3s;
        }
        
        .tab.active {
            background: rgba(102, 126, 234, 0.3);
            color: white;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        label {
            display: block;
            margin-bottom: 8px;
            color: #a0a0b0;
            font-size: 14px;
        }
        
        input {
            width: 100%;
            padding: 14px 16px;
            background: rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 14px;
            font-size: 15px;
            color: white;
        }
        
        input:focus {
            outline: none;
            border-color: #667eea;
        }
        
        .btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 14px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
        }
        
        .message {
            margin-top: 20px;
            padding: 12px;
            border-radius: 12px;
            text-align: center;
            display: none;
        }
        
        .message.success {
            background: rgba(52, 168, 83, 0.2);
            color: #34A853;
            border: 1px solid #34A853;
            display: block;
        }
        
        .message.error {
            background: rgba(234, 67, 53, 0.2);
            color: #EA4335;
            border: 1px solid #EA4335;
            display: block;
        }
        
        .hidden {
            display: none;
        }
    </style>
</head>
<body>
    <div class="top-bar">
        <span class="rainbow-text">CHFG社区</span>
    </div>

    <div class="container">
        <div class="card">
            <div class="welcome-section">
                <div class="welcome-title">CHFG社区</div>
                <div class="welcome-subtitle">現在開始您的探索之旅吧 ✓</div>
            </div>
            
            <div class="tab-bar">
                <div class="tab active" onclick="switchTab('login')">登錄</div>
                <div class="tab" onclick="switchTab('register')">註冊</div>
            </div>
            
            <!-- 登錄表單 -->
            <div id="loginForm">
                <div class="form-group">
                    <label>郵箱</label>
                    <input type="email" id="loginEmail" placeholder="請輸入郵箱">
                </div>
                <div class="form-group">
                    <label>密碼</label>
                    <input type="password" id="loginPassword" placeholder="請輸入密碼">
                </div>
                <button class="btn" onclick="login()">登錄</button>
            </div>
            
            <!-- 註冊表單 -->
            <div id="registerForm" class="hidden">
                <div class="form-group">
                    <label>用戶名</label>
                    <input type="text" id="regUsername" placeholder="請輸入用戶名">
                </div>
                <div class="form-group">
                    <label>郵箱</label>
                    <input type="email" id="regEmail" placeholder="請輸入郵箱">
                </div>
                <div class="form-group">
                    <label>密碼</label>
                    <input type="password" id="regPassword" placeholder="請輸入密碼">
                </div>
                <div class="form-group">
                    <label>確認密碼</label>
                    <input type="password" id="regConfirmPassword" placeholder="請再次輸入密碼">
                </div>
                <button class="btn" onclick="register()">註冊</button>
            </div>
            
            <div id="message" class="message"></div>
        </div>
    </div>
    <script>
        // ============ 数据存储 ============
        let users = JSON.parse(localStorage.getItem('users') || '[]');
        let currentUser = JSON.parse(localStorage.getItem('currentUser'));
        let notifications = JSON.parse(localStorage.getItem('notifications') || '[]');
        
        // 社区长专属邮箱
        const LEADER_EMAIL = 'chfanguang@outlook.com';
        
        // 检查是否已登录
        if (currentUser) {
            window.location.href = 'home.html';
        }

        // 切换标签
        function switchTab(tab) {
            document.querySelectorAll('.tab').forEach(t => {
                t.classList.remove('active');
            });
            event.target.classList.add('active');
            
            document.getElementById('loginForm').classList.add('hidden');
            document.getElementById('registerForm').classList.add('hidden');
            
            if (tab === 'login') {
                document.getElementById('loginForm').classList.remove('hidden');
            } else {
                document.getElementById('registerForm').classList.remove('hidden');
            }
            
            document.getElementById('message').style.display = 'none';
        }

        // 登录
        function login() {
            const email = document.getElementById('loginEmail').value.trim();
            const password = document.getElementById('loginPassword').value.trim();
            
            if (!email || !password) {
                showMessage('請輸入郵箱和密碼', 'error');
                return;
            }
            
            const user = users.find(u => u.email === email);
            if (!user) {
                showMessage('用戶不存在', 'error');
                return;
            }
            
            if (user.password !== password) {
                showMessage('密碼錯誤', 'error');
                return;
            }
            
            if (user.banned) {
                showMessage('賬號已被封禁', 'error');
                return;
            }
            
            localStorage.setItem('currentUser', JSON.stringify(user));
            showMessage('登錄成功，正在跳轉...', 'success');
            
            setTimeout(() => {
                window.location.href = 'home.html';
            }, 1500);
        }

        // 注册
        function register() {
            const username = document.getElementById('regUsername').value.trim();
            const email = document.getElementById('regEmail').value.trim();
            const password = document.getElementById('regPassword').value.trim();
            const confirmPassword = document.getElementById('regConfirmPassword').value.trim();
            
            if (!username || !email || !password || !confirmPassword) {
                showMessage('請填寫所有信息', 'error');
                return;
            }
            
            if (password !== confirmPassword) {
                showMessage('兩次輸入的密碼不一致', 'error');
                return;
            }
            
            if (password.length < 6) {
                showMessage('密碼至少6位', 'error');
                return;
            }
            
            // 檢查郵箱是否已註冊
            if (users.some(u => u.email === email)) {
                showMessage('該郵箱已註冊', 'error');
                return;
            }
            
            // 檢查用戶名是否已存在
            if (users.some(u => u.username === username)) {
                showMessage('用戶名已存在', 'error');
                return;
            }
            
            // 判斷是否為社區長
            let role = 'user';
            if (email === LEADER_EMAIL) {
                role = 'community_leader';
            }
            
            // 創建新用戶
            const newUser = {
                username,
                email,
                password,
                role,
                banned: 0,
                created_at: new Date().toISOString()
            };
            
            users.push(newUser);
            localStorage.setItem('users', JSON.stringify(users));
            
            // 如果不是社區長，發送通知給社區長
            if (role === 'user') {
                // 找到社區長
                const leader = users.find(u => u.email === LEADER_EMAIL);
                if (leader) {
                    notifications.push({
                        id: Date.now(),
                        username: leader.username,
                        type: 'new_user',
                        content: `新用戶註冊：${username} (${email})`,
                        read: false,
                        created_at: new Date().toISOString()
                    });
                    localStorage.setItem('notifications', JSON.stringify(notifications));
                }
            }
            
            // 自動登錄
            localStorage.setItem('currentUser', JSON.stringify(newUser));
            
            showMessage('註冊成功，正在跳轉...', 'success');
            
            setTimeout(() => {
                window.location.href = 'home.html';
            }, 1500);
        }

        // 顯示消息
        function showMessage(text, type) {
            const msgDiv = document.getElementById('message');
            msgDiv.textContent = text;
            msgDiv.className = `message ${type}`;
        }
    </script>
</body>
</html>
