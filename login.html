<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CHFG社区 · 开始</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        /* 星空黑色主题 */
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", sans-serif;
            background: #0a0a0f;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            position: relative;
            overflow-x: hidden;
        }
        
        /* 星空背景 */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: radial-gradient(2px 2px at 15px 60px, #fff, rgba(0,0,0,0)),
                        radial-gradient(2px 2px at 72px 150px, #fff, rgba(0,0,0,0)),
                        radial-gradient(2px 2px at 145px 280px, #ffd700, rgba(0,0,0,0)),
                        radial-gradient(2px 2px at 220px 90px, #fff, rgba(0,0,0,0)),
                        radial-gradient(3px 3px at 350px 190px, #87ceeb, rgba(0,0,0,0)),
                        radial-gradient(2px 2px at 410px 310px, #fff, rgba(0,0,0,0)),
                        radial-gradient(3px 3px at 520px 130px, #ffd700, rgba(0,0,0,0)),
                        radial-gradient(2px 2px at 680px 250px, #fff, rgba(0,0,0,0)),
                        radial-gradient(2px 2px at 750px 380px, #87ceeb, rgba(0,0,0,0)),
                        radial-gradient(3px 3px at 820px 90px, #fff, rgba(0,0,0,0));
            background-size: 200px 200px;
            background-repeat: repeat;
            opacity: 0.6;
            animation: stars 180s linear infinite;
            pointer-events: none;
        }
        
        body::after {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: radial-gradient(1px 1px at 95px 220px, #fff, rgba(0,0,0,0)),
                        radial-gradient(1px 1px at 260px 420px, #ffd700, rgba(0,0,0,0)),
                        radial-gradient(1px 1px at 380px 550px, #87ceeb, rgba(0,0,0,0)),
                        radial-gradient(2px 2px at 490px 170px, #fff, rgba(0,0,0,0)),
                        radial-gradient(1px 1px at 580px 460px, #fff, rgba(0,0,0,0)),
                        radial-gradient(1px 1px at 710px 320px, #ffd700, rgba(0,0,0,0));
            background-size: 300px 300px;
            background-repeat: repeat;
            opacity: 0.3;
            animation: stars 240s linear reverse infinite;
            pointer-events: none;
        }
        
        @keyframes stars {
            from { transform: translateY(0) translateX(0); }
            to { transform: translateY(-1000px) translateX(200px); }
        }
        
        /* 吸顶栏 */
        .top-bar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 60px;
            background: rgba(20, 20, 30, 0.8);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255,255,255,0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 2px;
            z-index: 1000;
        }
        
        .char-blue {
            color: #4285F4;
            font-size: 24px;
            font-weight: 800;
            text-shadow: 0 0 10px rgba(66, 133, 244, 0.5);
        }
        
        .char-purple {
            color: #9B51E0;
            font-size: 24px;
            font-weight: 800;
            text-shadow: 0 0 10px rgba(155, 81, 224, 0.5);
        }
        
        .char-green {
            color: #34A853;
            font-size: 24px;
            font-weight: 800;
            text-shadow: 0 0 10px rgba(52, 168, 83, 0.5);
        }
        
        .char-red {
            color: #EA4335;
            font-size: 24px;
            font-weight: 800;
            text-shadow: 0 0 10px rgba(234, 67, 53, 0.5);
        }
        
        .char-yellow {
            color: #FBBC05;
            font-size: 24px;
            font-weight: 800;
            text-shadow: 0 0 10px rgba(251, 188, 5, 0.5);
        }
        
        .char-orange {
            color: #FF6B35;
            font-size: 24px;
            font-weight: 800;
            text-shadow: 0 0 10px rgba(255, 107, 53, 0.5);
        }
        
        .container {
            width: 100%;
            max-width: 400px;
            margin-top: 40px;
            position: relative;
            z-index: 10;
        }
        
        .card {
            background: rgba(30, 30, 40, 0.6);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 30px;
            padding: 40px 30px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }
        
        /* 欢迎文字 */
        .welcome-section {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .welcome-title {
            font-size: 28px;
            font-weight: 800;
            color: white;
            margin-bottom: 8px;
            text-shadow: 0 0 20px rgba(255,255,255,0.3);
        }
        
        .welcome-subtitle {
            font-size: 15px;
            color: #a0a0b0;
        }
        
        .welcome-subtitle span {
            color: #34A853;
            font-weight: 600;
        }
        
        /* IP检测提示 */
        .ip-check {
            text-align: center;
            margin-bottom: 25px;
            padding: 12px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            color: #a0a0b0;
            font-size: 14px;
        }
        
        .ip-check.success {
            background: rgba(52, 168, 83, 0.1);
            border-color: #34A853;
            color: #34A853;
        }
        
        /* 标签切换 */
        .tab-bar {
            display: flex;
            gap: 8px;
            margin-bottom: 25px;
            background: rgba(0,0,0,0.2);
            padding: 4px;
            border-radius: 12px;
        }
        
        .tab {
            flex: 1;
            text-align: center;
            padding: 10px;
            border-radius: 10px;
            cursor: pointer;
            color: #a0a0b0;
            font-weight: 500;
            transition: all 0.3s;
        }
        
        .tab.active {
            background: rgba(102, 126, 234, 0.3);
            color: white;
            box-shadow: 0 2px 8px rgba(0,0,0,0.2);
        }
        
        /* 表单 */
        .form-container {
            transition: all 0.3s;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        label {
            display: block;
            margin-bottom: 8px;
            color: #a0a0b0;
            font-size: 14px;
            font-weight: 500;
        }
        
        input {
            width: 100%;
            padding: 14px 16px;
            background: rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 14px;
            font-size: 15px;
            color: white;
            transition: all 0.3s;
        }
        
        input:focus {
            outline: none;
            border-color: #667eea;
            background: rgba(0,0,0,0.4);
            box-shadow: 0 0 0 3px rgba(102,126,234,0.2);
        }
        
        input::placeholder {
            color: #5a5a6a;
        }
        
        .input-hint {
            font-size: 12px;
            color: #6a6a7a;
            margin-top: 6px;
        }
        
        .btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 14px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102,126,234,0.3);
        }
        
        .message {
            margin-top: 20px;
            padding: 12px;
            border-radius: 12px;
            text-align: center;
            font-size: 14px;
            display: none;
        }
        
        .message.success {
            background: rgba(52, 168, 83, 0.2);
            color: #34A853;
            border: 1px solid #34A853;
            display: block;
        }
        
        .message.error {
            background: rgba(234, 67, 53, 0.2);
            color: #EA4335;
            border: 1px solid #EA4335;
            display: block;
        }
        
        .hidden {
            display: none;
        }
    </style>
</head>
<body>
    <!-- 吸顶栏 -->
    <div class="top-bar">
        <span class="char-blue">C</span>
        <span class="char-purple">H</span>
        <span class="char-green">F</span>
        <span class="char-red">G</span>
        <span class="char-yellow">社</span>
        <span class="char-orange">区</span>
    </div>

    <div class="container">
        <div class="card">
            <!-- 欢迎文字 -->
            <div class="welcome-section">
                <div class="welcome-title">CHFG社区</div>
                <div class="welcome-subtitle">现在开始您的探索之旅吧 <span>✓</span></div>
            </div>
            
            <!-- IP检测提示区 -->
            <div id="ipCheckMessage" class="ip-check">正在检测登录状态...</div>
            
            <!-- 标签切换 -->
            <div class="tab-bar">
                <div class="tab active" onclick="switchTab('login')">登录</div>
                <div class="tab" onclick="switchTab('register')">注册</div>
            </div>
            
            <!-- 登录表单 -->
            <div id="loginForm" class="form-container">
                <div class="form-group">
                    <label>邮箱</label>
                    <input type="email" id="loginEmail" placeholder="请输入邮箱">
                </div>
                <button class="btn" onclick="login()">登录</button>
            </div>
            
            <!-- 注册表单 -->
            <div id="registerForm" class="form-container hidden">
                <div class="form-group">
                    <label>用户名</label>
                    <input type="text" id="regUsername" placeholder="请输入用户名">
                </div>
                <div class="form-group">
                    <label>邮箱</label>
                    <input type="email" id="regEmail" placeholder="请输入邮箱">
                    <div class="input-hint">社区长专属邮箱：chfanguang@outlook.com</div>
                </div>
                <button class="btn" onclick="register()">注册</button>
            </div>
            
            <!-- 提示消息 -->
            <div id="message" class="message"></div>
        </div>
    </div>
    <script>
        // ============ 数据存储 ============
        let users = JSON.parse(localStorage.getItem('users') || '[]');
        let currentUser = JSON.parse(localStorage.getItem('currentUser'));
        
        // 社区长专属邮箱
        const LEADER_EMAIL = 'chfanguang@outlook.com';
        
        // 获取客户端IP（模拟）
        function getClientIp() {
            let ip = localStorage.getItem('clientIp');
            if (!ip) {
                ip = '127.0.0.' + Math.floor(Math.random() * 255);
                localStorage.setItem('clientIp', ip);
            }
            return ip;
        }

        // 检测IP是否已登录
        function checkIpLogin() {
            const ip = getClientIp();
            const ipCheckDiv = document.getElementById('ipCheckMessage');
            
            if (currentUser) {
                const user = users.find(u => u.username === currentUser.username);
                if (user && user.ip === ip) {
                    ipCheckDiv.className = 'ip-check success';
                    ipCheckDiv.innerHTML = '检测到您已登录，正在跳转...';
                    
                    setTimeout(() => {
                        window.location.href = 'chfg.html';
                    }, 2000);
                    return;
                }
            }
            
            ipCheckDiv.className = 'ip-check';
            ipCheckDiv.innerHTML = '未检测到登录状态，请登录或注册';
        }

        // 切换标签
        function switchTab(tab) {
            document.querySelectorAll('.tab').forEach(t => {
                t.classList.remove('active');
            });
            event.target.classList.add('active');
            
            document.getElementById('loginForm').classList.add('hidden');
            document.getElementById('registerForm').classList.add('hidden');
            
            if (tab === 'login') {
                document.getElementById('loginForm').classList.remove('hidden');
            } else {
                document.getElementById('registerForm').classList.remove('hidden');
            }
            
            document.getElementById('message').style.display = 'none';
        }

        // 登录
        function login() {
            const email = document.getElementById('loginEmail').value.trim();
            const ip = getClientIp();
            
            if (!email) {
                showMessage('请输入邮箱', 'error');
                return;
            }
            
            const user = users.find(u => u.email === email);
            if (!user) {
                showMessage('用户不存在', 'error');
                return;
            }
            
            if (user.banned) {
                showMessage('账号已被封禁', 'error');
                return;
            }
            
            // 更新IP
            user.ip = ip;
            localStorage.setItem('users', JSON.stringify(users));
            
            // 保存登录状态
            localStorage.setItem('currentUser', JSON.stringify(user));
            showMessage('登录成功，正在跳转...', 'success');
            
            setTimeout(() => {
                window.location.href = 'chfg.html';
            }, 1500);
        }

        // 注册
        function register() {
            const username = document.getElementById('regUsername').value.trim();
            const email = document.getElementById('regEmail').value.trim();
            const ip = getClientIp();
            
            if (!username || !email) {
                showMessage('请填写完整信息', 'error');
                return;
            }
            
            // 检查邮箱是否已注册
            if (users.some(u => u.email === email)) {
                showMessage('该邮箱已注册', 'error');
                return;
            }
            
            // 检查用户名是否已存在
            if (users.some(u => u.username === username)) {
                showMessage('用户名已存在', 'error');
                return;
            }
            
            // 检查IP是否已注册
            if (users.some(u => u.ip === ip)) {
                showMessage('该IP已注册过账号', 'error');
                return;
            }
            
            // 判断是否为社区长
            const role = (email === LEADER_EMAIL) ? 'community_leader' : 'user';
            
            // 创建新用户
            const newUser = {
                username,
                email,
                ip,
                role,
                banned: 0,
                created_at: new Date().toISOString()
            };
            
            users.push(newUser);
            localStorage.setItem('users', JSON.stringify(users));
            
            // 自动登录
            localStorage.setItem('currentUser', JSON.stringify(newUser));
            
            showMessage('注册成功，正在跳转...', 'success');
            
            setTimeout(() => {
                window.location.href = 'chfg.html';
            }, 1500);
        }

        // 显示消息
        function showMessage(text, type) {
            const msgDiv = document.getElementById('message');
            msgDiv.textContent = text;
            msgDiv.className = `message ${type}`;
            msgDiv.style.display = 'block';
        }

        // 初始化
        checkIpLogin();
    </script>
</body>
</html>
