<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CHFG社区 · 星尘</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        /* ===== 动态星空背景 ===== */
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: linear-gradient(125deg, #0a0a2a, #1a1a3a, #0a0a2a);
            color: #fff;
            padding-top: 60px;
            min-height: 100vh;
            position: relative;
            overflow-x: hidden;
        }
        
        /* 星星动画 */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: radial-gradient(2px 2px at 20px 30px, #fff, rgba(0,0,0,0)),
                        radial-gradient(2px 2px at 40px 70px, #fff, rgba(0,0,0,0)),
                        radial-gradient(2px 2px at 80px 120px, #fff, rgba(0,0,0,0)),
                        radial-gradient(2px 2px at 160px 50px, #fff, rgba(0,0,0,0)),
                        radial-gradient(2px 2px at 300px 180px, #fff, rgba(0,0,0,0)),
                        radial-gradient(2px 2px at 450px 250px, #fff, rgba(0,0,0,0)),
                        radial-gradient(2px 2px at 600px 400px, #fff, rgba(0,0,0,0)),
                        radial-gradient(2px 2px at 750px 150px, #fff, rgba(0,0,0,0)),
                        radial-gradient(2px 2px at 900px 550px, #fff, rgba(0,0,0,0)),
                        radial-gradient(2px 2px at 100px 600px, #fff, rgba(0,0,0,0));
            background-size: 200px 200px;
            background-repeat: repeat;
            opacity: 0.5;
            animation: stars 120s linear infinite;
            pointer-events: none;
            z-index: 0;
        }
        
        /* 第二层星星 (小星星) */
        body::after {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: radial-gradient(1px 1px at 120px 230px, #ffd700, rgba(0,0,0,0)),
                        radial-gradient(1px 1px at 340px 670px, #87ceeb, rgba(0,0,0,0)),
                        radial-gradient(1px 1px at 580px 820px, #fff, rgba(0,0,0,0)),
                        radial-gradient(1px 1px at 720px 320px, #ffd700, rgba(0,0,0,0)),
                        radial-gradient(1px 1px at 880px 480px, #87ceeb, rgba(0,0,0,0)),
                        radial-gradient(1px 1px at 250px 750px, #fff, rgba(0,0,0,0)),
                        radial-gradient(1px 1px at 450px 150px, #ffd700, rgba(0,0,0,0)),
                        radial-gradient(1px 1px at 650px 950px, #87ceeb, rgba(0,0,0,0)),
                        radial-gradient(1px 1px at 850px 250px, #fff, rgba(0,0,0,0));
            background-size: 300px 300px;
            background-repeat: repeat;
            opacity: 0.3;
            animation: stars 180s linear reverse infinite;
            pointer-events: none;
            z-index: 0;
        }
        
        @keyframes stars {
            from { transform: translateY(0) translateX(0); }
            to { transform: translateY(-200px) translateX(100px); }
        }
        
        /* 所有内容都在星星上面 */
        .container, .sticky-bar, .modal-content, .card {
            position: relative;
            z-index: 10;
        }
        
        /* ===== 彩虹动态渐变吸顶栏 ===== */
        .sticky-bar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 60px;
            background: linear-gradient(
                90deg,
                #ff0000,
                #ff7f00,
                #ffff00,
                #00ff00,
                #0000ff,
                #4b0082,
                #8f00ff
            );
            background-size: 400% 100%;
            animation: rainbow 8s ease infinite;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            box-shadow: 0 2px 20px rgba(0,255,255,0.3);
            backdrop-filter: blur(5px);
        }
        
        @keyframes rainbow {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        
        .sticky-bar-content {
            font-size: 28px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 4px;
            color: white;
            text-shadow: 0 0 10px cyan, 0 0 20px blue, 2px 2px 4px rgba(0,0,0,0.3);
            animation: glow 2s ease-in-out infinite;
        }
        
        @keyframes glow {
            0%, 100% { text-shadow: 0 0 10px cyan, 0 0 20px blue; }
            50% { text-shadow: 0 0 20px cyan, 0 0 40px blue, 0 0 60px white; }
        }
        
        /* ===== 容器 ===== */
        .container {
            max-width: 600px;
            margin: 0 auto;
            padding: 20px;
        }
        
        /* ===== 液态玻璃卡片 ===== */
        .card {
            background: rgba(20, 30, 50, 0.3);
            backdrop-filter: blur(15px) saturate(180%);
            -webkit-backdrop-filter: blur(15px) saturate(180%);
            border: 1px solid rgba(0, 255, 255, 0.3);
            border-radius: 20px;
            padding: 25px;
            margin-bottom: 20px;
            box-shadow: 0 8px 32px rgba(0, 255, 255, 0.1),
                        inset 0 1px 1px rgba(255, 255, 255, 0.3);
            transition: all 0.3s ease;
        }
        
        .card:hover {
            border-color: rgba(0, 255, 255, 0.6);
            box-shadow: 0 8px 32px rgba(0, 255, 255, 0.2),
                        inset 0 1px 1px rgba(255, 255, 255, 0.5);
        }
        
        /* ===== 青色按钮 ===== */
        button {
            background: transparent;
            color: #00ffff;
            border: 2px solid #00ffff;
            padding: 10px 20px;
            border-radius: 30px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-right: 8px;
            box-shadow: 0 0 10px rgba(0, 255, 255, 0.3);
            text-transform: uppercase;
            letter-spacing: 1px;
            backdrop-filter: blur(5px);
        }
        
        button:hover {
            background: #00ffff;
            color: #0a0a2a;
            box-shadow: 0 0 20px #00ffff, 0 0 40px #00ffff;
            transform: translateY(-2px);
        }
        
        button.small {
            padding: 6px 15px;
            font-size: 12px;
        }
        
        button.danger {
            border-color: #ff4444;
            color: #ff4444;
            box-shadow: 0 0 10px rgba(255, 68, 68, 0.3);
        }
        
        button.danger:hover {
            background: #ff4444;
            color: #0a0a2a;
            box-shadow: 0 0 20px #ff4444;
        }
        
        button.warning {
            border-color: #ffaa00;
            color: #ffaa00;
            box-shadow: 0 0 10px rgba(255, 170, 0, 0.3);
        }
        
        button.warning:hover {
            background: #ffaa00;
            color: #0a0a2a;
            box-shadow: 0 0 20px #ffaa00;
        }
        
        button.success {
            border-color: #00ff88;
            color: #00ff88;
            box-shadow: 0 0 10px rgba(0, 255, 136, 0.3);
        }
        
        button.success:hover {
            background: #00ff88;
            color: #0a0a2a;
            box-shadow: 0 0 20px #00ff88;
        }
        
        /* ===== 输入框 ===== */
        input, textarea, select {
            width: 100%;
            padding: 12px;
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid rgba(0, 255, 255, 0.3);
            border-radius: 15px;
            font-size: 16px;
            color: #fff;
            transition: all 0.3s ease;
            backdrop-filter: blur(5px);
        }
        
        input:focus, textarea:focus, select:focus {
            outline: none;
            border-color: #00ffff;
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.5);
            background: rgba(255, 255, 255, 0.15);
        }
        
        input::placeholder, textarea::placeholder {
            color: rgba(255, 255, 255, 0.5);
        }
        
        /* ===== 用户信息 ===== */
        .user-info {
            background: rgba(0, 255, 255, 0.1);
            border: 1px solid #00ffff;
            padding: 8px 15px;
            border-radius: 30px;
            color: #00ffff;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 10px;
            backdrop-filter: blur(10px);
        }
        
        /* ===== 帖子样式 ===== */
        .post {
            border-bottom: 1px solid rgba(0, 255, 255, 0.2);
            padding: 15px 0;
        }
        
        .post:last-child {
            border-bottom: none;
        }
        
        .post-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            color: rgba(255, 255, 255, 0.7);
            font-size: 0.9em;
            align-items: center;
        }
        
        .post-author {
            font-weight: 600;
            color: #00ffff;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 5px;
            text-shadow: 0 0 5px rgba(0, 255, 255, 0.5);
        }
        
        .post-author:hover {
            text-decoration: underline;
        }
        
        .author-badge {
            font-size: 11px;
            padding: 2px 8px;
            border-radius: 30px;
            background: rgba(0, 255, 255, 0.2);
            border: 1px solid #00ffff;
            color: #00ffff;
        }
        
        .author-badge.leader {
            border-color: #ffaa00;
            color: #ffaa00;
        }
        
        .author-badge.admin {
            border-color: #ff4444;
            color: #ff4444;
        }
        
        .post-content {
            font-size: 1.1em;
            line-height: 1.5;
            white-space: pre-wrap;
            color: rgba(255, 255, 255, 0.9);
        }
        
        .post-time {
            color: rgba(255, 255, 255, 0.5);
            font-size: 0.85em;
        }
        
        .post-stats {
            display: flex;
            gap: 15px;
            margin-top: 10px;
            color: rgba(255, 255, 255, 0.7);
            font-size: 0.9em;
        }
        
        .post-actions {
            margin-top: 10px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            align-items: center;
        }
        
        /* ===== 点赞按钮特殊样式 ===== */
        .like-btn {
            background: transparent;
            border: 1px solid #ff4d4d;
            color: #ff4d4d;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 13px;
            box-shadow: 0 0 5px rgba(255, 77, 77, 0.3);
        }
        
        .like-btn:hover {
            background: #ff4d4d;
            color: #0a0a2a;
            box-shadow: 0 0 15px #ff4d4d;
        }
        
        .like-btn.liked {
            background: #ff4d4d;
            color: #0a0a2a;
        }
        
        .empty-state {
            text-align: center;
            color: rgba(255, 255, 255, 0.5);
            padding: 40px 20px;
        }
        
        .error-message {
            color: #ff4444;
            font-size: 0.9em;
            margin-top: 5px;
            text-shadow: 0 0 5px rgba(255, 68, 68, 0.5);
        }
        
        .success-message {
            color: #00ff88;
            font-size: 0.9em;
            margin-top: 5px;
            text-shadow: 0 0 5px rgba(0, 255, 136, 0.5);
        }
        
        .hidden {
            display: none;
        }
    </style>
</head>
<body>
    <!-- 彩虹动态渐变吸顶栏 -->
    <div class="sticky-bar">
        <div class="sticky-bar-content">CHFG社区 · 星尘</div>
    </div>

    <div class="container">
        <!-- 登录/注册卡片 -->
        <div class="card" id="authCard">
            <div id="unauthView">
                <div class="form-group">
                    <input type="text" id="username" placeholder="输入用户名（仅支持字母数字）" pattern="[A-Za-z0-9]+">
                </div>
                
                <div class="auth-section" style="display: flex; gap: 10px; flex-wrap: wrap;">
                    <button onclick="register()">普通用户注册</button>
                    <button onclick="login()">登录</button>
                </div>
                
                <div class="admin-link" style="color: #00ffff; cursor: pointer; font-size: 14px; margin-top: 10px; text-align: center; text-shadow: 0 0 5px cyan;" onclick="toggleAdminRegister()">
                    我是管理组或社区长？点这里
                </div>
                
                <div id="adminRegisterForm" class="hidden">
                    <div class="form-group" style="margin-top: 15px;">
                        <input type="text" id="adminUsername" placeholder="管理员账户名">
                    </div>
                    <div class="form-group">
                        <input type="password" id="adminPassword" placeholder="管理员密码">
                    </div>
                    <div class="password-hint" style="font-size: 12px; color: rgba(255,255,255,0.6); margin-top: 5px;">
                        社区长密码：chfanguang081205<br>
                        管理员密码：chfanguangfs, chfanguangglz, chfanguangglchan, chfanguangcnmwcnm, chfanguangvwws
                    </div>
                    <button onclick="registerAdmin()" class="success" style="margin-top: 10px;">管理员注册</button>
                </div>
                
                <div id="authMessage" class="error-message"></div>
            </div>
            
            <div id="authView" class="hidden">
                <div class="user-info" id="userInfo">
                    <span id="currentUsername"></span>
                    <span id="userRole" class="badge" style="background: transparent; border: 1px solid currentColor; padding: 2px 8px; border-radius: 30px;"></span>
                    <span id="notificationBadge" style="background: transparent; border: 1px solid #ffaa00; color: #ffaa00; padding: 2px 8px; border-radius: 30px; cursor: pointer;" class="hidden" onclick="showNotifications()">0</span>
                    <button class="small danger" onclick="logout()">退出</button>
                </div>
            </div>
        </div>
    <!-- 用户操作卡片 -->
    <div class="card hidden" id="userActionsCard">
        <div style="display: flex; gap: 10px; flex-wrap: wrap;">
            <button class="warning" onclick="showUserModal(currentUser.username)">👤 我的账号</button>
            <button class="warning" onclick="showFollowingList()">📋 我的关注</button>
            <button class="warning" onclick="showFollowersList()">👥 我的粉丝</button>
            <button class="warning" onclick="applyForAdmin()" id="applyAdminBtn">📝 申请管理组</button>
            <button class="danger hidden" id="adminPanelBtn" onclick="showAdminPanel()">⚡ 管理面板</button>
            <button class="warning" onclick="showNotifications()" id="notificationsBtn">📬 通知中心</button>
        </div>
    </div>

    <!-- 发帖卡片 -->
    <div class="card hidden" id="postCard">
        <div class="form-group">
            <textarea id="postContent" placeholder="分享你的想法...（7天后自动消失）" rows="3"></textarea>
        </div>
        <button onclick="createPost()">发布帖子</button>
        <div id="postMessage" class="error-message"></div>
    </div>

    <!-- 帖子列表 -->
    <div class="card" id="postsCard">
        <h3 style="margin-bottom: 15px; color: #00ffff; text-shadow: 0 0 10px cyan;">最新帖子</h3>
        <div id="postsList"></div>
    </div>
</div>

<!-- ===== 液态玻璃弹窗 ===== -->
<!-- 用户详情弹窗 -->
<div id="userModal" class="modal" style="position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.7); backdrop-filter: blur(10px); display: none; justify-content: center; align-items: center; z-index: 2000;">
    <div class="modal-content" style="background: rgba(20, 30, 50, 0.4); backdrop-filter: blur(30px); border: 1px solid rgba(0,255,255,0.5); border-radius: 30px; padding: 30px; max-width: 500px; width: 90%; max-height: 80vh; overflow-y: auto; box-shadow: 0 0 50px rgba(0,255,255,0.2);">
        <div style="display: flex; justify-content: space-between; align-items: center;">
            <h3 id="modalUsername" style="color: #00ffff;"></h3>
            <span id="modalUserRole" style="border: 1px solid currentColor; padding: 4px 12px; border-radius: 30px;"></span>
        </div>
        
        <!-- 标签栏 -->
        <div class="tab-bar" style="display: flex; gap: 10px; margin: 20px 0; border-bottom: 1px solid rgba(0,255,255,0.3); padding-bottom: 10px;">
            <span class="tab" style="cursor: pointer; padding: 5px 15px; color: rgba(255,255,255,0.7);" onclick="switchUserTab('info')">用户信息</span>
            <span class="tab" style="cursor: pointer; padding: 5px 15px; color: rgba(255,255,255,0.7);" onclick="switchUserTab('posts')">Ta的帖子</span>
        </div>
        
        <!-- 用户信息 -->
        <div id="userInfoTab">
            <div style="margin: 20px 0;">
                <p>注册时间：<span id="userJoinTime"></span></p>
                <p>粉丝数：<span id="userFollowerCount">0</span></p>
                <p>关注数：<span id="userFollowingCount">0</span></p>
                <p>帖子数：<span id="userPostCount">0</span></p>
            </div>
        </div>
        
        <!-- 用户帖子列表 -->
        <div id="userPostsTab" class="hidden">
            <div id="userPostsList" style="max-height: 300px; overflow-y: auto;"></div>
        </div>
        
        <div class="modal-buttons" style="display: flex; gap: 10px; margin-top: 20px; justify-content: flex-end; flex-wrap: wrap;">
            <button id="modalFollowBtn" onclick="handleFollow()"></button>
            <button id="modalReportBtn" onclick="showReportModal()">举报</button>
            <button class="danger" onclick="deleteAccount()" id="deleteAccountBtn">注销此账户</button>
            <button onclick="closeModal()">关闭</button>
        </div>
    </div>
</div>

<!-- 关注列表弹窗 -->
<div id="followingModal" class="modal" style="position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.7); backdrop-filter: blur(10px); display: none; justify-content: center; align-items: center; z-index: 2000;">
    <div class="modal-content" style="background: rgba(20, 30, 50, 0.4); backdrop-filter: blur(30px); border: 1px solid rgba(0,255,255,0.5); border-radius: 30px; padding: 30px; max-width: 500px; width: 90%; max-height: 80vh; overflow-y: auto;">
        <h3 style="color: #00ffff;">我的关注</h3>
        <div id="followingList" style="max-height: 400px; overflow-y: auto; margin: 20px 0;"></div>
        <div class="modal-buttons" style="display: flex; gap: 10px; justify-content: flex-end;">
            <button onclick="closeFollowingModal()">关闭</button>
        </div>
    </div>
</div>

<!-- 粉丝列表弹窗 -->
<div id="followersModal" class="modal" style="position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.7); backdrop-filter: blur(10px); display: none; justify-content: center; align-items: center; z-index: 2000;">
    <div class="modal-content" style="background: rgba(20, 30, 50, 0.4); backdrop-filter: blur(30px); border: 1px solid rgba(0,255,255,0.5); border-radius: 30px; padding: 30px; max-width: 500px; width: 90%; max-height: 80vh; overflow-y: auto;">
        <h3 style="color: #00ffff;">我的粉丝</h3>
        <div id="followersList" style="max-height: 400px; overflow-y: auto; margin: 20px 0;"></div>
        <div class="modal-buttons" style="display: flex; gap: 10px; justify-content: flex-end;">
            <button onclick="closeFollowersModal()">关闭</button>
        </div>
    </div>
</div>

<!-- 举报弹窗 -->
<div id="reportModal" class="modal" style="position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.7); backdrop-filter: blur(10px); display: none; justify-content: center; align-items: center; z-index: 2000;">
    <div class="modal-content" style="background: rgba(20, 30, 50, 0.4); backdrop-filter: blur(30px); border: 1px solid rgba(0,255,255,0.5); border-radius: 30px; padding: 30px; max-width: 500px; width: 90%;">
        <h3 style="color: #00ffff;">举报用户</h3>
        <div class="form-group" style="margin: 20px 0;">
            <select id="reportReason" style="background: rgba(255,255,255,0.1); color: white;">
                <option value="不当言论" style="background: #1a1a3a;">不当言论</option>
                <option value="骚扰行为" style="background: #1a1a3a;">骚扰行为</option>
                <option value="广告营销" style="background: #1a1a3a;">广告营销</option>
                <option value="其他" style="background: #1a1a3a;">其他</option>
            </select>
        </div>
        <div class="form-group">
            <textarea id="reportDetail" placeholder="详细说明（选填）" rows="3" style="background: rgba(255,255,255,0.1); color: white;"></textarea>
        </div>
        <div class="modal-buttons" style="display: flex; gap: 10px; justify-content: flex-end;">
            <button onclick="submitReport()" class="danger">提交举报</button>
            <button onclick="closeReportModal()">取消</button>
        </div>
    </div>
</div>
<!-- 通知中心弹窗 -->
<div id="notificationsModal" class="modal" style="position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.7); backdrop-filter: blur(10px); display: none; justify-content: center; align-items: center; z-index: 2000;">
    <div class="modal-content" style="background: rgba(20, 30, 50, 0.4); backdrop-filter: blur(30px); border: 1px solid rgba(0,255,255,0.5); border-radius: 30px; padding: 30px; max-width: 500px; width: 90%; max-height: 80vh; overflow-y: auto;">
        <h3 style="color: #00ffff;">通知中心</h3>
        <div style="margin: 20px 0;">
            <div id="notificationsList"></div>
        </div>
        <div class="modal-buttons" style="display: flex; gap: 10px; justify-content: flex-end;">
            <button onclick="closeNotificationsModal()">关闭</button>
        </div>
    </div>
</div>

<!-- 管理面板弹窗 -->
<div id="adminModal" class="modal" style="position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.7); backdrop-filter: blur(10px); display: none; justify-content: center; align-items: center; z-index: 2000;">
    <div class="modal-content" style="background: rgba(20, 30, 50, 0.4); backdrop-filter: blur(30px); border: 1px solid rgba(0,255,255,0.5); border-radius: 30px; padding: 30px; max-width: 600px; width: 90%; max-height: 80vh; overflow-y: auto;">
        <h3 style="color: #00ffff;">管理面板</h3>
        
        <div class="tab-bar" style="display: flex; gap: 10px; margin: 20px 0; border-bottom: 1px solid rgba(0,255,255,0.3); padding-bottom: 10px;">
            <span class="tab" style="cursor: pointer; padding: 5px 15px; color: rgba(255,255,255,0.7);" onclick="switchAdminTab('applications')">管理员申请</span>
            <span class="tab" style="cursor: pointer; padding: 5px 15px; color: rgba(255,255,255,0.7);" onclick="switchAdminTab('reports')">举报处理</span>
            <span class="tab" style="cursor: pointer; padding: 5px 15px; color: rgba(255,255,255,0.7);" onclick="switchAdminTab('notifications')">系统通知</span>
        </div>
        
        <div id="adminApplicationsTab">
            <div id="applicationsList" style="max-height: 300px; overflow-y: auto;"></div>
        </div>
        
        <div id="adminReportsTab" class="hidden">
            <div id="reportsList" style="max-height: 300px; overflow-y: auto;"></div>
        </div>
        
        <div id="adminNotificationsTab" class="hidden">
            <div id="adminNotificationsList" style="max-height: 300px; overflow-y: auto;"></div>
        </div>
        
        <div class="modal-buttons" style="display: flex; gap: 10px; margin-top: 20px; justify-content: flex-end;">
            <button onclick="closeAdminModal()">关闭</button>
        </div>
    </div>
</div>

<script>
    // ============ 数据存储（纯前端模拟） ============
    let currentUser = null;
    let currentToken = localStorage.getItem('token');
    let selectedUser = null;
    let posts = JSON.parse(localStorage.getItem('posts') || '[]');
    let users = JSON.parse(localStorage.getItem('users') || '[]');
    let follows = JSON.parse(localStorage.getItem('follows') || '[]');
    let likes = JSON.parse(localStorage.getItem('likes') || '[]');
    let reports = JSON.parse(localStorage.getItem('reports') || '[]');
    let notifications = JSON.parse(localStorage.getItem('notifications') || '[]');
    let applications = JSON.parse(localStorage.getItem('applications') || '[]');

    // 保存数据
    function saveData() {
        localStorage.setItem('posts', JSON.stringify(posts));
        localStorage.setItem('users', JSON.stringify(users));
        localStorage.setItem('follows', JSON.stringify(follows));
        localStorage.setItem('likes', JSON.stringify(likes));
        localStorage.setItem('reports', JSON.stringify(reports));
        localStorage.setItem('notifications', JSON.stringify(notifications));
        localStorage.setItem('applications', JSON.stringify(applications));
    }

    // 获取客户端IP（模拟）
    function getClientIp() {
        let ip = localStorage.getItem('clientIp');
        if (!ip) {
            ip = '127.0.0.' + Math.floor(Math.random() * 255);
            localStorage.setItem('clientIp', ip);
        }
        return ip;
    }

    // 初始化 - 修改版：先清除旧登录状态
    function init() {
        // 如果有旧的登录状态，先清除（解决一进去就显示管理面板的问题）
        if (localStorage.getItem('token')) {
            localStorage.removeItem('token');
            currentToken = null;
        }
        
        loadPosts();
    }

    // 切换管理员注册表单
    function toggleAdminRegister() {
        document.getElementById('adminRegisterForm').classList.toggle('hidden');
    }

    // 管理员注册
    function registerAdmin() {
        const username = document.getElementById('adminUsername').value.trim();
        const password = document.getElementById('adminPassword').value.trim();

        if (!username || !password) {
            showMessage('authMessage', '请输入用户名和密码');
            return;
        }

        const ip = getClientIp();
        
        // 检查IP
        if (users.some(u => u.ip === ip)) {
            showMessage('authMessage', '该IP已注册过账号');
            return;
        }

        // 检查用户名
        if (users.some(u => u.username === username)) {
            showMessage('authMessage', '用户名已存在');
            return;
        }

        // 验证密码
        let role = null;
        if (password === 'chfanguang081205') {
            role = 'community_leader';
        } else if (['chfanguangfs', 'chfanguangglz', 'chfanguangglchan', 'chfanguangcnmwcnm', 'chfanguangvwws'].includes(password)) {
            role = 'admin';
        }

        if (!role) {
            showMessage('authMessage', '管理员密码错误');
            return;
        }

        // 创建用户
        const newUser = {
            username,
            ip,
            role,
            banned: 0,
            created_at: new Date().toISOString()
        };
        users.push(newUser);
        
        // 创建欢迎通知
        notifications.push({
            id: Date.now(),
            type: 'welcome',
            content: `欢迎 ${role === 'community_leader' ? '社区长' : '管理员'} ${username} 加入CHFG社区！`,
            related_user: username,
            status: 'unread',
            created_at: new Date().toISOString()
        });

        saveData();

        const token = btoa(username + ':' + Date.now());
        localStorage.setItem('token', token);
        currentToken = token;
        currentUser = newUser;
        
        updateUIForAuth();
        showMessage('authMessage', `${role === 'community_leader' ? '社区长' : '管理员'}注册成功！`, 'success');
        loadPosts();
        toggleAdminRegister();
    }

    // 普通用户注册
    function register() {
        const username = document.getElementById('username').value.trim();
        if (!username) {
            showMessage('authMessage', '请输入用户名');
            return;
        }

        const ip = getClientIp();
        
        if (users.some(u => u.ip === ip)) {
            showMessage('authMessage', '该IP已注册过账号');
            return;
        }

        if (users.some(u => u.username === username)) {
            showMessage('authMessage', '用户名已存在');
            return;
        }

        const newUser = {
            username,
            ip,
            role: 'user',
            banned: 0,
            created_at: new Date().toISOString()
        };
        users.push(newUser);
        saveData();

        const token = btoa(username + ':' + Date.now());
        localStorage.setItem('token', token);
        currentToken = token;
        currentUser = newUser;
        
        updateUIForAuth();
        showMessage('authMessage', '注册成功！', 'success');
        loadPosts();
    }

    // 登录
    function login() {
        const username = document.getElementById('username').value.trim();
        if (!username) {
            showMessage('authMessage', '请输入用户名');
            return;
        }

        const user = users.find(u => u.username === username);
        if (!user) {
            showMessage('authMessage', '用户不存在');
            return;
        }

        if (user.banned) {
            showMessage('authMessage', '账号已被封禁');
            return;
        }

        const token = btoa(user.username + ':' + Date.now());
        localStorage.setItem('token', token);
        currentToken = token;
        currentUser = user;
        
        updateUIForAuth();
        showMessage('authMessage', '登录成功！', 'success');
        loadPosts();
    }

    // 退出登录
    function logout() {
        currentToken = null;
        currentUser = null;
        localStorage.removeItem('token');
        document.getElementById('unauthView').classList.remove('hidden');
        document.getElementById('authView').classList.add('hidden');
        document.getElementById('userActionsCard').classList.add('hidden');
        document.getElementById('postCard').classList.add('hidden');
        document.getElementById('username').value = '';
        document.getElementById('adminUsername').value = '';
        document.getElementById('adminPassword').value = '';
    }

    // 更新UI
    function updateUIForAuth() {
        document.getElementById('unauthView').classList.add('hidden');
        document.getElementById('authView').classList.remove('hidden');
        document.getElementById('userActionsCard').classList.remove('hidden');
        document.getElementById('postCard').classList.remove('hidden');
        document.getElementById('currentUsername').textContent = currentUser.username;
        
        const roleBadge = document.getElementById('userRole');
        let roleText = '普通用户';
        if (currentUser.role === 'admin') roleText = '管理员';
        if (currentUser.role === 'community_leader') roleText = '社区长';
        
        roleBadge.textContent = roleText;
        roleBadge.style.borderColor = currentUser.role === 'admin' ? '#ff4444' : currentUser.role === 'community_leader' ? '#ffaa00' : '#00ffff';
        roleBadge.style.color = currentUser.role === 'admin' ? '#ff4444' : currentUser.role === 'community_leader' ? '#ffaa00' : '#00ffff';
        
        if (currentUser.role === 'admin' || currentUser.role === 'community_leader') {
            document.getElementById('adminPanelBtn').classList.remove('hidden');
            document.getElementById('applyAdminBtn').classList.add('hidden');
        }
        
        loadUnreadCount();
    }
        // 加载未读通知
        function loadUnreadCount() {
            const count = notifications.filter(n => 
                n.related_user === currentUser.username && n.status === 'unread'
            ).length;
            
            const badge = document.getElementById('notificationBadge');
            if (count > 0) {
                badge.textContent = count;
                badge.classList.remove('hidden');
            } else {
                badge.classList.add('hidden');
            }
        }

        // 显示通知
        function showNotifications() {
            const userNotifs = notifications.filter(n => n.related_user === currentUser.username);
            
            const list = document.getElementById('notificationsList');
            list.innerHTML = userNotifs.map(n => `
                <div style="border-bottom: 1px solid rgba(0,255,255,0.2); padding: 10px; cursor: pointer; ${n.status === 'unread' ? 'background: rgba(0,255,255,0.1);' : ''}" onclick="markNotificationRead(${n.id})">
                    <div style="color: ${n.status === 'unread' ? '#00ffff' : 'rgba(255,255,255,0.7)'};">${n.content}</div>
                    <div style="font-size: 12px; color: rgba(255,255,255,0.4);">${formatTime(n.created_at)}</div>
                </div>
            `).join('');
            
            document.getElementById('notificationsModal').style.display = 'flex';
        }

        // 标记通知已读
        function markNotificationRead(id) {
            const notif = notifications.find(n => n.id === id);
            if (notif) {
                notif.status = 'read';
                saveData();
            }
            loadUnreadCount();
            showNotifications();
        }

        // 发帖
        function createPost() {
            const content = document.getElementById('postContent').value.trim();
            if (!content) return;

            const newPost = {
                id: Date.now(),
                username: currentUser.username,
                content,
                likes: 0,
                created_at: new Date().toISOString()
            };
            posts.push(newPost);
            saveData();

            document.getElementById('postContent').value = '';
            showMessage('postMessage', '发布成功！', 'success');
            loadPosts();
        }

        // 加载帖子
        function loadPosts() {
            // 过滤7天前的帖子
            const sevenDaysAgo = new Date();
            sevenDaysAgo.setDate(sevenDaysAgo.getDate() - 7);
            
            const recentPosts = posts.filter(p => new Date(p.created_at) > sevenDaysAgo);
            
            const postsWithStatus = recentPosts.map(post => {
                const user = users.find(u => u.username === post.username);
                let isFollowed = false;
                let hasReported = false;
                let hasLiked = false;
                
                if (currentUser && post.username !== currentUser.username) {
                    isFollowed = follows.some(f => 
                        f.follower === currentUser.username && f.followed === post.username
                    );
                    hasReported = reports.some(r => 
                        r.reporter === currentUser.username && 
                        r.reported_user === post.username && 
                        r.status === 'pending'
                    );
                    hasLiked = likes.some(l => 
                        l.username === currentUser.username && l.post_id === post.id
                    );
                }
                
                return {
                    ...post,
                    isFollowed,
                    hasReported,
                    hasLiked,
                    role: user?.role || 'user'
                };
            });
            
            // 按时间倒序
            postsWithStatus.sort((a, b) => new Date(b.created_at) - new Date(a.created_at));
            
            const postsList = document.getElementById('postsList');
            if (postsWithStatus.length === 0) {
                postsList.innerHTML = '<div class="empty-state">✨ 暂无帖子，来发布第一条吧～</div>';
                return;
            }

            postsList.innerHTML = postsWithStatus.map(post => {
                let roleBadge = '';
                if (post.role === 'community_leader') {
                    roleBadge = '<span class="author-badge leader">社区长</span>';
                } else if (post.role === 'admin') {
                    roleBadge = '<span class="author-badge admin">管理员</span>';
                }
                
                const canDelete = currentUser && 
                    (currentUser.role === 'admin' || currentUser.role === 'community_leader') &&
                    post.username !== currentUser.username;
                
                return `
                <div class="post" id="post-${post.id}">
                    <div class="post-header">
                        <span class="post-author" onclick="openUserModal('${post.username}')">
                            ${post.username}
                            ${roleBadge}
                            ${post.username === currentUser?.username ? ' (你)' : ''}
                        </span>
                        <span class="post-time">${formatTime(post.created_at)}</span>
                    </div>
                    <div class="post-content">${escapeHtml(post.content)}</div>
                    <div class="post-stats">
                        <span>❤️ ${post.likes || 0} 点赞</span>
                    </div>
                    <div class="post-actions">
                        ${currentUser && post.username !== currentUser?.username ? `
                            <button class="small like-btn ${post.hasLiked ? 'liked' : ''}" 
                                    onclick="toggleLike(${post.id}, ${post.hasLiked})">
                                ${post.hasLiked ? '❤️ 已点赞' : '🤍 点赞'}
                            </button>
                            <button class="small ${post.isFollowed ? 'unfollow-btn' : 'follow-btn'}" 
                                    onclick="toggleFollow('${post.username}', ${post.isFollowed})">
                                ${post.isFollowed ? '取消关注' : '关注'}
                            </button>
                            <button class="small report-btn" 
                                    onclick="reportUser('${post.username}')"
                                    ${post.hasReported ? 'disabled' : ''}>
                                ${post.hasReported ? '已举报' : '举报'}
                            </button>
                        ` : ''}
                        ${canDelete ? `
                            <button class="small delete-btn" onclick="deletePost(${post.id})">
                                删除帖子
                            </button>
                        ` : ''}
                    </div>
                </div>
            `}).join('');
        }

        // 点赞/取消点赞
        function toggleLike(postId, hasLiked) {
            if (!currentUser) {
                alert('请先登录');
                return;
            }

            const post = posts.find(p => p.id === postId);
            
            if (hasLiked) {
                const index = likes.findIndex(l => 
                    l.username === currentUser.username && l.post_id === postId
                );
                if (index !== -1) {
                    likes.splice(index, 1);
                    post.likes = Math.max(0, (post.likes || 0) - 1);
                }
            } else {
                likes.push({
                    username: currentUser.username,
                    post_id: postId,
                    created_at: new Date().toISOString()
                });
                post.likes = (post.likes || 0) + 1;
            }
            
            saveData();
            loadPosts();
        }

        // 关注/取消关注
        function toggleFollow(targetUsername, isFollowed) {
            if (!currentUser) {
                alert('请先登录');
                return;
            }

            if (isFollowed) {
                const index = follows.findIndex(f => 
                    f.follower === currentUser.username && f.followed === targetUsername
                );
                if (index !== -1) {
                    follows.splice(index, 1);
                }
            } else {
                follows.push({
                    follower: currentUser.username,
                    followed: targetUsername,
                    created_at: new Date().toISOString()
                });
            }
            
            saveData();
            loadPosts();
        }

        // 显示关注列表
        function showFollowingList() {
            const followingList = follows
                .filter(f => f.follower === currentUser.username)
                .map(f => {
                    const user = users.find(u => u.username === f.followed);
                    return {
                        username: f.followed,
                        role: user?.role || 'user'
                    };
                });
            
            const list = document.getElementById('followingList');
            list.innerHTML = followingList.map(f => `
                <div class="user-list-item" style="display: flex; justify-content: space-between; align-items: center; padding: 10px; border-bottom: 1px solid rgba(0,255,255,0.2);">
                    <span style="color: #00ffff; cursor: pointer;" onclick="openUserModal('${f.username}')">${f.username}</span>
                    <span style="border: 1px solid ${f.role === 'admin' ? '#ff4444' : f.role === 'community_leader' ? '#ffaa00' : '#00ffff'}; color: ${f.role === 'admin' ? '#ff4444' : f.role === 'community_leader' ? '#ffaa00' : '#00ffff'}; padding: 2px 8px; border-radius: 30px; font-size: 11px;">${f.role === 'admin' ? '管理员' : f.role === 'community_leader' ? '社区长' : '普通用户'}</span>
                </div>
            `).join('');
            
            document.getElementById('followingModal').style.display = 'flex';
        }

        // 显示粉丝列表
        function showFollowersList() {
            const followersList = follows
                .filter(f => f.followed === currentUser.username)
                .map(f => {
                    const user = users.find(u => u.username === f.follower);
                    return {
                        username: f.follower,
                        role: user?.role || 'user'
                    };
                });
            
            const list = document.getElementById('followersList');
            list.innerHTML = followersList.map(f => `
                <div class="user-list-item" style="display: flex; justify-content: space-between; align-items: center; padding: 10px; border-bottom: 1px solid rgba(0,255,255,0.2);">
                    <span style="color: #00ffff; cursor: pointer;" onclick="openUserModal('${f.username}')">${f.username}</span>
                    <span style="border: 1px solid ${f.role === 'admin' ? '#ff4444' : f.role === 'community_leader' ? '#ffaa00' : '#00ffff'}; color: ${f.role === 'admin' ? '#ff4444' : f.role === 'community_leader' ? '#ffaa00' : '#00ffff'}; padding: 2px 8px; border-radius: 30px; font-size: 11px;">${f.role === 'admin' ? '管理员' : f.role === 'community_leader' ? '社区长' : '普通用户'}</span>
                </div>
            `).join('');
            
            document.getElementById('followersModal').style.display = 'flex';
        }

        // 打开用户弹窗
        function openUserModal(username) {
            selectedUser = username;
            document.getElementById('modalUsername').textContent = username;
            
            const user = users.find(u => u.username === username);
            const userPosts = posts.filter(p => p.username === username);
            
            const roleBadge = document.getElementById('modalUserRole');
            let roleText = '普通用户';
            if (user?.role === 'admin') roleText = '管理员';
            if (user?.role === 'community_leader') roleText = '社区长';
            roleBadge.textContent = roleText;
            roleBadge.style.borderColor = user?.role === 'admin' ? '#ff4444' : user?.role === 'community_leader' ? '#ffaa00' : '#00ffff';
            roleBadge.style.color = user?.role === 'admin' ? '#ff4444' : user?.role === 'community_leader' ? '#ffaa00' : '#00ffff';
            
            document.getElementById('userJoinTime').textContent = user?.created_at ? formatTime(user.created_at) : '未知';
            document.getElementById('userPostCount').textContent = userPosts.length;
            
            loadUserPosts(username);
            
            const modalFollowBtn = document.getElementById('modalFollowBtn');
            const modalReportBtn = document.getElementById('modalReportBtn');
            const deleteAccountBtn = document.getElementById('deleteAccountBtn');
            
            if (currentUser && username === currentUser.username) {
                modalFollowBtn.style.display = 'none';
                modalReportBtn.style.display = 'none';
                deleteAccountBtn.style.display = 'block';
            } else {
                modalFollowBtn.style.display = 'block';
                modalReportBtn.style.display = 'block';
                deleteAccountBtn.style.display = 'none';
                
                const isFollowed = follows.some(f => 
                    f.follower === currentUser?.username && f.followed === username
                );
                modalFollowBtn.textContent = isFollowed ? '取消关注' : '关注';
            }
            
            switchUserTab('info');
            document.getElementById('userModal').style.display = 'flex';
        }

        // 加载用户帖子
        function loadUserPosts(username) {
            const userPosts = posts
                .filter(p => p.username === username)
                .sort((a, b) => new Date(b.created_at) - new Date(a.created_at));
            
            const list = document.getElementById('userPostsList');
            if (userPosts.length === 0) {
                list.innerHTML = '<div class="empty-state">✨ 暂无帖子</div>';
                return;
            }
            
            list.innerHTML = userPosts.map(post => `
                <div style="border-bottom: 1px solid rgba(0,255,255,0.2); padding: 10px 0;">
                    <div style="color: rgba(255,255,255,0.9);">${escapeHtml(post.content)}</div>
                    <div style="font-size: 12px; color: rgba(255,255,255,0.4); margin-top: 5px;">${formatTime(post.created_at)}</div>
                </div>
            `).join('');
        }

        // 切换用户弹窗标签
        function switchUserTab(tab) {
            document.querySelectorAll('#userModal .tab').forEach(t => {
                t.style.color = 'rgba(255,255,255,0.7)';
                t.style.borderBottom = 'none';
            });
            event.target.style.color = '#00ffff';
            event.target.style.borderBottom = '2px solid #00ffff';
            
            if (tab === 'info') {
                document.getElementById('userInfoTab').classList.remove('hidden');
                document.getElementById('userPostsTab').classList.add('hidden');
            } else {
                document.getElementById('userInfoTab').classList.add('hidden');
                document.getElementById('userPostsTab').classList.remove('hidden');
            }
        }

        // 处理关注
        function handleFollow() {
            const isFollowed = follows.some(f => 
                f.follower === currentUser?.username && f.followed === selectedUser
            );
            toggleFollow(selectedUser, isFollowed);
            closeModal();
        }

        // 显示举报弹窗
        function showReportModal() {
            document.getElementById('userModal').style.display = 'none';
            document.getElementById('reportModal').style.display = 'flex';
        }

        // 提交举报
        function submitReport() {
            const reason = document.getElementById('reportReason').value;
            const detail = document.getElementById('reportDetail').value.trim();
            const fullReason = detail ? `${reason}：${detail}` : reason;
            
            reports.push({
                id: Date.now(),
                reporter: currentUser.username,
                reported_user: selectedUser,
                reason: fullReason,
                status: 'pending',
                created_at: new Date().toISOString()
            });
            
            notifications.push({
                id: Date.now() + 1,
                type: 'report',
                content: `用户 ${currentUser.username} 举报了 ${selectedUser}：${fullReason}`,
                related_user: 'all_admins',
                status: 'unread',
                created_at: new Date().toISOString()
            });
            
            saveData();
            
            alert('举报已提交');
            closeReportModal();
            loadPosts();
        }

        // 快捷举报
        function reportUser(username) {
            selectedUser = username;
            showReportModal();
        }

        // 删除帖子
        function deletePost(postId) {
            if (!confirm('确定要删除这个帖子吗？')) return;
            
            const postIndex = posts.findIndex(p => p.id === postId);
            if (postIndex !== -1) {
                const post = posts[postIndex];
                posts.splice(postIndex, 1);
                
                notifications.push({
                    id: Date.now(),
                    type: 'system',
                    content: '你的一个帖子已被管理员删除',
                    related_user: post.username,
                    status: 'unread',
                    created_at: new Date().toISOString()
                });
                
                saveData();
                alert('帖子已删除');
                loadPosts();
            }
        }

        // 注销账户
        function deleteAccount() {
            if (!confirm('确定要注销账户吗？')) return;
            
            posts = posts.filter(p => p.username !== currentUser.username);
            follows = follows.filter(f => 
                f.follower !== currentUser.username && f.followed !== currentUser.username
            );
            likes = likes.filter(l => l.username !== currentUser.username);
            reports = reports.filter(r => 
                r.reporter !== currentUser.username && r.reported_user !== currentUser.username
            );
            users = users.filter(u => u.username !== currentUser.username);
            
            saveData();
            logout();
            loadPosts();
        }

        // 申请成为管理员
        function applyForAdmin() {
            if (applications.some(a => a.username === currentUser.username && a.status === 'pending')) {
                alert('已有待处理的申请');
                return;
            }
            
            applications.push({
                id: Date.now(),
                username: currentUser.username,
                status: 'pending',
                created_at: new Date().toISOString()
            });
            
            notifications.push({
                id: Date.now(),
                type: 'application',
                content: `用户 ${currentUser.username} 申请成为管理员`,
                related_user: 'all_admins',
                status: 'unread',
                created_at: new Date().toISOString()
            });
            
            saveData();
            alert('申请已提交');
        }

        // 显示管理面板
        function showAdminPanel() {
            const appsList = document.getElementById('applicationsList');
            appsList.innerHTML = applications.map(app => `
                <div style="border-bottom: 1px solid rgba(0,255,255,0.2); padding: 10px;">
                    <div>用户: <span style="color: #00ffff;">${app.username}</span></div>
                    <div>状态: <span style="color: ${app.status === 'pending' ? '#ffaa00' : app.status === 'approved' ? '#00ff88' : '#ff4444'};">${app.status === 'pending' ? '待处理' : app.status === 'approved' ? '已批准' : '已拒绝'}</span></div>
                    <div style="font-size: 12px; color: rgba(255,255,255,0.4);">${formatTime(app.created_at)}</div>
                    ${app.status === 'pending' ? `
                        <div style="margin-top: 10px;">
                            <button class="small success" onclick="handleApplication(${app.id}, true)">批准</button>
                            <button class="small danger" onclick="handleApplication(${app.id}, false)">拒绝</button>
                        </div>
                    ` : ''}
                </div>
            `).join('');
            
            const reportsList = document.getElementById('reportsList');
            const pendingReports = reports.filter(r => r.status === 'pending');
            reportsList.innerHTML = pendingReports.map(r => `
                <div style="border-bottom: 1px solid rgba(0,255,255,0.2); padding: 10px;">
                    <div>举报人: <span style="color: #00ffff;">${r.reporter}</span> → <span style="color: #ffaa00;">${r.reported_user}</span></div>
                    <div>原因: ${r.reason}</div>
                    <div style="font-size: 12px; color: rgba(255,255,255,0.4);">${formatTime(r.created_at)}</div>
                    <div style="margin-top: 10px;">
                        <button class="small success" onclick="handleReport(${r.id})">标记已处理</button>
                    </div>
                </div>
            `).join('');
            
            const adminNotifs = notifications.filter(n => n.related_user === 'all_admins');
            document.getElementById('adminNotificationsList').innerHTML = adminNotifs.map(n => `
                <div style="border-bottom: 1px solid rgba(0,255,255,0.2); padding: 10px; ${n.status === 'unread' ? 'background: rgba(0,255,255,0.1);' : ''}">
                    <div>${n.content}</div>
                    <div style="font-size: 12px; color: rgba(255,255,255,0.4);">${formatTime(n.created_at)}</div>
                </div>
            `).join('');
            
            document.getElementById('adminModal').style.display = 'flex';
        }

        // 处理申请
        function handleApplication(applicationId, approve) {
            const app = applications.find(a => a.id === applicationId);
            if (app) {
                app.status = approve ? 'approved' : 'rejected';
                
                if (approve) {
                    const user = users.find(u => u.username === app.username);
                    if (user) {
                        user.role = 'admin';
                        
                        notifications.push({
                            id: Date.now(),
                            type: 'system',
                            content: '恭喜！你的管理员申请已通过',
                            related_user: app.username,
                            status: 'unread',
                            created_at: new Date().toISOString()
                        });
                    }
                }
                
                saveData();
                showAdminPanel();
            }
        }

        // 处理举报
        function handleReport(reportId) {
            const report = reports.find(r => r.id === reportId);
            if (report) {
                report.status = 'resolved';
                saveData();
                showAdminPanel();
            }
        }

        // 切换管理面板标签
        function switchAdminTab(tab) {
            document.querySelectorAll('#adminModal .tab').forEach(t => {
                t.style.color = 'rgba(255,255,255,0.7)';
                t.style.borderBottom = 'none';
            });
            event.target.style.color = '#00ffff';
            event.target.style.borderBottom = '2px solid #00ffff';
            
            document.getElementById('adminApplicationsTab').classList.add('hidden');
            document.getElementById('adminReportsTab').classList.add('hidden');
            document.getElementById('adminNotificationsTab').classList.add('hidden');
            
            if (tab === 'applications') {
                document.getElementById('adminApplicationsTab').classList.remove('hidden');
            } else if (tab === 'reports') {
                document.getElementById('adminReportsTab').classList.remove('hidden');
            } else {
                document.getElementById('adminNotificationsTab').classList.remove('hidden');
            }
        }

        // 辅助函数
        function showMessage(elementId, message, type = 'error') {
            const element = document.getElementById(elementId);
            element.textContent = message;
            element.className = type === 'error' ? 'error-message' : 'success-message';
            setTimeout(() => {
                element.textContent = '';
            }, 3000);
        }

        function formatTime(timestamp) {
            const date = new Date(timestamp);
            return `${date.getFullYear()}-${String(date.getMonth()+1).padStart(2,'0')}-${String(date.getDate()).padStart(2,'0')} ${String(date.getHours()).padStart(2,'0')}:${String(date.getMinutes()).padStart(2,'0')}`;
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function closeModal() {
            document.getElementById('userModal').style.display = 'none';
        }

        function closeFollowingModal() {
            document.getElementById('followingModal').style.display = 'none';
        }

        function closeFollowersModal() {
            document.getElementById('followersModal').style.display = 'none';
        }

        function closeReportModal() {
            document.getElementById('reportModal').style.display = 'none';
            document.getElementById('reportDetail').value = '';
            document.getElementById('userModal').style.display = 'flex';
        }

        function closeNotificationsModal() {
            document.getElementById('notificationsModal').style.display = 'none';
        }

        function closeAdminModal() {
            document.getElementById('adminModal').style.display = 'none';
        }

        // 定时刷新
        setInterval(() => {
            const sevenDaysAgo = new Date();
            sevenDaysAgo.setDate(sevenDaysAgo.getDate() - 7);
            posts = posts.filter(p => new Date(p.created_at) > sevenDaysAgo);
            saveData();
            loadPosts();
            if (currentToken) loadUnreadCount();
        }, 60000);
        
        // 启动
        init();
    </script>
</body>
</html>
