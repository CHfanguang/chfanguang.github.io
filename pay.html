<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
<title>Shadow Moon · 自助购买</title>
<!-- 像素字体保留供其他元素使用，但吸顶栏不用这个字体 -->
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box}
body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"PingFang SC","Microsoft YaHei";
  background:linear-gradient(135deg,#cfcfcf,#f6f6f6 30%,#bdbdbd 60%,#f0f0f0);
  color:#000;
  -webkit-overflow-scrolling: touch;
  min-height: 100vh;
}

/* 吸顶栏 – 方框型吸顶，非胶囊，直角边框，保留毛玻璃半透明及彩虹色文字 */
.top-logo{
  position:sticky;
  top:0;                       /* 紧贴顶部，体现方框吸顶 */
  z-index:999;
  width:100%;                  /* 方框型通常撑满宽度，但为了内容居中内部用flex处理 */
  background:rgba(255,255,255,.45);
  backdrop-filter:blur(30px) saturate(220%);
  -webkit-backdrop-filter:blur(30px) saturate(220%);
  /* 去掉大圆角，改为0或极小圆角，呈现方框感 */
  border-radius:0;
  box-shadow:inset 0 1px 1px rgba(255,255,255,.7), 0 8px 20px rgba(0,0,0,.18);
  padding: 14px 0;              /* 上下内边距保留，左右由内部控制 */
}

/* 内部容器让内容保持与主页一致的视觉对齐，宽度限定，左右留白 */
.logo-container {
  max-width: 900px;
  margin: 0 auto;
  padding: 0 20px;              /* 左右留白，使文字不贴边 */
}

.logo{
  font-size:30px;
  font-weight:900;
  letter-spacing:.6px;
  display: flex;
  gap: 2px;                     /* 字间距微调 */
}
.logo span {
  text-shadow: none;
}
/* 吸顶栏内文字颜色按主页彩虹顺序：自(类似S:#4285F4) 助(类似h:#EA4335) 购(类似a:#FBBC05) 买(类似d:#4285F4) */
.logo .char1 { color:#4285F4; }  /* 自 */
.logo .char2 { color:#EA4335; }  /* 助 */
.logo .char3 { color:#FBBC05; }  /* 购 */
.logo .char4 { color:#4285F4; }  /* 买 */

/* 主容器 – 保留主页的淡入动画 */
.container{
  max-width:900px;
  margin:auto;
  padding:20px 20px 100px;
  animation:iosIn .9s ease-out both;
}
@keyframes iosIn{
  from{opacity:0;transform:translateY(70px)}
  to{opacity:1;transform:translateY(0)}
}

/* 内容毛玻璃卡片，与主页glass一致，增强可读性 */
.glass{
  background:rgba(255,255,255,.45);
  backdrop-filter:blur(30px) saturate(220%);
  -webkit-backdrop-filter:blur(30px) saturate(220%);
  border-radius:28px;
  padding:30px;
  line-height:1.7;
  box-shadow:inset 0 1px 1px rgba(255,255,255,.7), 0 30px 50px rgba(0,0,0,.18);
  position: relative;
  overflow: hidden;
}

/* 自助付款说明 (居中，粗黑体) —— 现在作为页内第一个视觉元素 */
.sub-title{
  text-align: center;
  font-size: 26px;
  font-weight: 700;
  margin: 0 0 30px 0;           /* 去掉上边距，因为不再有main-title */
  letter-spacing: 1px;
  color: #111;
  text-shadow: 0 2px 5px rgba(0,0,0,0.05);
}
@media (max-width:550px){
  .sub-title{ font-size: 22px; }
}

/* 普通说明段落：不使用任何特殊字体样式，仅系统默认，灰色斜体不要，就是纯黑/深灰 */
.plain-instruction {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "PingFang SC", "Microsoft YaHei", sans-serif;
  font-style: normal;
  font-weight: 400;
  color: #1e1e1e;
  font-size: 18px;
  text-align: left;
  margin: 30px 0 30px 0;
  line-height: 1.8;
  background: rgba(255,255,255,0.2);
  padding: 20px 25px;
  border-radius: 20px;
  backdrop-filter: blur(4px);
  border: 1px solid rgba(255,255,255,0.3);
}
.plain-instruction p {
  margin: 8px 0;
}
/* 备注后面的四个空格效果：已经直接在html中加入四个空格字符 (&nbsp;&nbsp;&nbsp;&nbsp;) 更稳妥 */
/* 但保留样式，实际在p中内联添加 */

/* 二维码图片区域 – 使截图显示 */
.qr-image {
  text-align: center;
  margin: 30px 0 40px;
}
.qr-image img {
  max-width: 280px;
  width: 100%;
  height: auto;
  border-radius: 28px;
  box-shadow: 0 20px 35px rgba(0,0,0,0.25), inset 0 1px 4px rgba(255,255,255,0.6);
  background: white;
  padding: 12px;
  border: 1px solid rgba(255,255,255,0.5);
  backdrop-filter: blur(2px);
}

/* 返回按钮 – 完全模仿主页底部导航中的单个按钮风格，但只做一个返回 */
.return-wrapper {
  display: flex;
  justify-content: center;
  margin: 50px 0 20px;
}
.return-btn {
  display: inline-block;
  padding: 14px 42px;
  background: rgba(255,255,255,0.4);
  backdrop-filter: blur(30px) saturate(220%);
  -webkit-backdrop-filter: blur(30px) saturate(220%);
  border-radius: 40px;
  color: #000;
  font-weight: 700;
  font-size: 20px;
  text-decoration: none;
  box-shadow: inset 0 1px 1px rgba(255,255,255,0.8), 0 15px 25px rgba(0,0,0,0.2);
  border: 1px solid rgba(255,255,255,0.4);
  transition: 0.2s;
  letter-spacing: 1px;
}
.return-btn:hover {
  transform: translateY(-3px);
  background: rgba(255,255,255,0.6);
}

/* 辅助间距 */
.spacer {
  height: 10px;
}

/* 底部不需要导航，所以没有bottom-nav */
</style>
</head>
<body>

<!-- 吸顶栏：方框型，直角，毛玻璃半透明，彩虹色“自助购买” -->
<div class="top-logo">
  <div class="logo-container">
    <div class="logo">
      <span class="char1">自</span>
      <span class="char2">助</span>
      <span class="char3">购</span>
      <span class="char4">买</span>
    </div>
  </div>
</div>

<div class="container">
  <div class="glass">
    <!-- 自助付款说明（居中，粗黑体），已删除页面内大标题“自助购买” -->
    <div class="sub-title">自助付款说明</div>

    <!-- 中间隔一行：即上面已经有标题间距，此处直接放说明块 -->
    <!-- 本段不采用任何字体样式：纯默认，半透明块内 -->
    <div class="plain-instruction">
      <p>请将二维码保存至本地后在微信扫描并打开</p>
      <p>付款金额请选择1元</p>
      <!-- 在“手机号”后加上四个空格，用 &nbsp; 实体实现可见空格 -->
      <p>付款备注请写您的QQ号/QID/手机号&nbsp;&nbsp;&nbsp;&nbsp;（此处为四个空格）</p>
      <p>付款后30分钟内会有客服添加您的第三方社交平台好友</p>
    </div>

    <!-- 放置截图图片：文件名为 Screenshot_20251118_190336.jpg，与index同目录 -->
    <div class="qr-image">
      <img src="Screenshot_20251118_190336.jpg" alt="微信支付二维码示例" onerror="this.onerror=null; this.src='data:image/svg+xml,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20width%3D%22280%22%20height%3D%22280%22%20viewBox%3D%220%200%20280%20280%22%3E%3Crect%20width%3D%22280%22%20height%3D%22280%22%20fill%3D%22%23f0f0f0%22%2F%3E%3Ctext%20x%3D%2220%22%20y%3D%22140%22%20font-family%3D%22Arial%22%20font-size%3D%2218%22%20fill%3D%22%23555%22%3E%E4%BA%8C%E7%BB%B4%E7%A0%81%E7%A4%BA%E4%BE%8B%3C%2Ftext%3E%3Ctext%20x%3D%2220%22%20y%3D%22170%22%20font-family%3D%22Arial%22%20font-size%3D%2216%22%20fill%3D%22%23555%22%3EScreenshot_20251118_190336.jpg%3C%2Ftext%3E%3C%2Fsvg%3E';">
    </div>

    <!-- 返回按钮，文字改成“返回主页”更清晰，您之前用了“点击back主页”，这里统一为“返回主页”但保留您最后的用词也行？根据您上次改为“点击back主页”，本次保留您修改的版本。 -->
    <div class="return-wrapper">
      <a href="index.html" class="return-btn">点击back主页</a>
    </div>

  </div>
</div>

<!-- 无多余注释 -->
</body>
</html>
