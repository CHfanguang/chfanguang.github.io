<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
<title>Shadow Moon · 自助购买</title>
<!-- 像素字体保留供其他元素使用，但吸顶栏不用这个字体 -->
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box}
body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"PingFang SC","Microsoft YaHei";
  background:linear-gradient(135deg,#cfcfcf,#f6f6f6 30%,#bdbdbd 60%,#f0f0f0);
  color:#000;
  -webkit-overflow-scrolling: touch;
  min-height: 100vh;
}

/* 吸顶栏 – 方框型吸顶，直角，毛玻璃半透明，颜色全彩（谷歌风格） */
.top-logo{
  position:sticky;
  top:0;
  z-index:999;
  width:100%;
  background:rgba(255,255,255,.45);
  backdrop-filter:blur(30px) saturate(220%);
  -webkit-backdrop-filter:blur(30px) saturate(220%);
  border-radius:0;
  box-shadow:inset 0 1px 1px rgba(255,255,255,.7), 0 8px 20px rgba(0,0,0,.18);
  padding: 14px 0;
}

/* 内部容器让内容居中，宽度限定 */
.logo-container {
  max-width: 900px;
  margin: 0 auto;
  padding: 0 20px;
  display: flex;
  justify-content: center;      /* 文字居中 */
}

.logo{
  font-size:30px;
  font-weight:900;
  letter-spacing:.6px;
  display: inline-flex;
  gap: 2px;
}
.logo span {
  text-shadow: none;
}
/* 吸顶栏内文字颜色采用谷歌五色循环 */
.logo .char1 { color:#4285F4; }  /* 自 蓝 */
.logo .char2 { color:#EA4335; }  /* 助 红 */
.logo .char3 { color:#FBBC05; }  /* 购 黄 */
.logo .char4 { color:#34A853; }  /* 买 绿 */

/* 主容器 – 保留主页的淡入动画 */
.container{
  max-width:900px;
  margin:auto;
  padding:20px 20px 100px;
  animation:iosIn .9s ease-out both;
}
@keyframes iosIn{
  from{opacity:0;transform:translateY(70px)}
  to{opacity:1;transform:translateY(0)}
}

/* 毛玻璃效果 */
.glass{
  background:rgba(255,255,255,0.2);
  backdrop-filter:blur(12px) saturate(180%);
  -webkit-backdrop-filter:blur(12px) saturate(180%);
  border-radius:28px;
  padding:30px;
  line-height:1.7;
  box-shadow:inset 0 1px 1px rgba(255,255,255,.7), 0 30px 50px rgba(0,0,0,.18);
  position: relative;
  overflow: hidden;
}

/* 自助付款说明 (居中，粗黑体) */
.sub-title{
  text-align: center;
  font-size: 26px;
  font-weight: 700;
  margin: 0 0 30px 0;
  letter-spacing: 1px;
  color: #111;
  text-shadow: 0 2px 5px rgba(0,0,0,0.05);
}
@media (max-width:550px){
  .sub-title{ font-size: 22px; }
}

/* 普通说明段落 */
.plain-instruction {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "PingFang SC", "Microsoft YaHei", sans-serif;
  font-style: normal;
  font-weight: 400;
  color: #1e1e1e;
  font-size: 18px;
  text-align: left;
  margin: 30px 0 30px 0;
  line-height: 1.8;
  background: rgba(255,255,255,0.2);
  padding: 20px 25px;
  border-radius: 20px;
  backdrop-filter: blur(4px);
  border: 1px solid rgba(255,255,255,0.3);
}
.plain-instruction p {
  margin: 8px 0;
}

/* 二维码图片区域 */
.qr-image {
  text-align: center;
  margin: 30px 0 40px;
  scroll-margin-top: 80px;  /* 滚动时留出吸顶栏空间 */
}
.qr-image img {
  max-width: 450px;
  width: 100%;
  height: auto;
  border-radius: 28px;
  box-shadow: 0 20px 35px rgba(0,0,0,0.25), inset 0 1px 4px rgba(255,255,255,0.6);
  background: white;
  padding: 12px;
  border: 4px solid #00e5ff;
  backdrop-filter: blur(2px);
  transition: transform 0.2s ease;
}
.qr-image img:hover {
  transform: scale(1.02);
}

/* 返回按钮 */
.return-wrapper {
  display: flex;
  justify-content: center;
  margin: 50px 0 20px;
}
.return-btn {
  display: inline-block;
  padding: 14px 42px;
  background: rgba(255,255,255,0.4);
  backdrop-filter: blur(30px) saturate(220%);
  -webkit-backdrop-filter: blur(30px) saturate(220%);
  border-radius: 40px;
  color: #000;
  font-weight: 700;
  font-size: 20px;
  text-decoration: none;
  box-shadow: inset 0 1px 1px rgba(255,255,255,0.8), 0 15px 25px rgba(0,0,0,0.2);
  border: 1px solid rgba(255,255,255,0.4);
  transition: 0.2s;
  letter-spacing: 1px;
}
.return-btn:hover {
  transform: translateY(-3px);
  background: rgba(255,255,255,0.6);
}

/* 底部 */
.footer {
  text-align: center;
  margin: 60px 0 20px;
  color: #888;
  font-size: 14px;
  line-height: 1.6;
  font-weight: 400;
  opacity: 0.9;
}
.glass .footer {
  text-shadow: 0 1px 2px rgba(255,255,255,0.3);
}

/* 隐藏音频 */
.hidden-audio {
  display: none;
}
</style>
</head>
<body>

<!-- 隐藏音频 -->
<audio id="bgMusic" class="hidden-audio" preload="auto" loop>
  <source src="suhmeduh-phone kisses(1).mp3" type="audio/mpeg">
</audio>

<!-- 吸顶栏 -->
<div class="top-logo">
  <div class="logo-container">
    <div class="logo">
      <span class="char1">自</span>
      <span class="char2">助</span>
      <span class="char3">购</span>
      <span class="char4">买</span>
    </div>
  </div>
</div>

<div class="container">
  <div class="glass">
    <div class="sub-title">自助付款说明</div>

    <div class="plain-instruction">
      <p>请将二维码保存至本地后在微信扫描并打开</p>
      <p>付款金额请选择1元</p>
      <p>付款备注请写您的QQ号/QID/手机号&nbsp;&nbsp;&nbsp;&nbsp;</p>
      <p>付款后30分钟内会有客服添加您的第三方社交平台好友</p>
    </div>

    <!-- 二维码区域，添加 id 用于滚动定位 -->
    <div id="qrCodeSection" class="qr-image">
      <img src="Screenshot_20251118_190336.jpg" alt="微信支付二维码" onerror="this.onerror=null; this.src='data:image/svg+xml,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20width%3D%22450%22%20height%3D%22450%22%20viewBox%3D%220%200%20450%20450%22%3E%3Crect%20width%3D%22450%22%20height%3D%22450%22%20fill%3D%22%23f0f0f0%22%2F%3E%3Ctext%20x%3D%2230%22%20y%3D%22225%22%20font-family%3D%22Arial%22%20font-size%3D%2224%22%20fill%3D%22%23555%22%3E二维码示例%3C%2Ftext%3E%3C%2Fsvg%3E';">
    </div>

    <div class="return-wrapper">
      <a href="index.html" class="return-btn">点击back主页</a>
    </div>

    <div class="footer">
      Powerd by Shadow Moon<br>© CH凡光
    </div>
  </div>
</div>

<script>
// ==================== 自动播放音频（用户点击任意位置一次即播放） ====================
(function() {
  var audio = document.getElementById('bgMusic');
  if (!audio) return;
  
  audio.volume = 0.6;
  
  var played = false;  // 标记是否已播放过，避免重复触发
  
  // 尝试自动播放（可能被浏览器阻止）
  var playPromise = audio.play();
  if (playPromise !== undefined) {
    playPromise.then(function() {
      played = true;
      console.log('音频自动播放成功');
    }).catch(function() {
      console.log('自动播放被阻止，等待用户点击');
      // 用户第一次点击页面任意位置时播放，且只触发一次
      var playOnFirstClick = function() {
        if (!played) {
          audio.play().then(function() {
            played = true;
            console.log('用户点击后播放成功');
          }).catch(function(e) {
            console.log('播放失败', e);
          });
        }
        // 播放后移除监听器，避免重复触发
        document.removeEventListener('click', playOnFirstClick);
        document.removeEventListener('touchstart', playOnFirstClick);
      };
      document.addEventListener('click', playOnFirstClick);
      document.addEventListener('touchstart', playOnFirstClick);
    });
  }
})();

// ==================== 自动滑动功能 ====================
(function() {
  var qrSection = document.getElementById('qrCodeSection');
  if (!qrSection) return;
  
  var autoScrollTimer = null;
  var isAutoScrolling = false;
  var userInterrupted = false;      // 用户是否手动干预过
  var stayDuration = 3000;          // 停留3秒
  var scrollTimeout = null;
  
  // 平滑滚动到二维码区域
  function scrollToQR() {
    if (userInterrupted) return;     // 用户手动滑动后不再自动滑动
    if (isAutoScrolling) return;
    
    isAutoScrolling = true;
    qrSection.scrollIntoView({
      behavior: 'smooth',
      block: 'center'
    });
    
    // 滚动结束后，停留3秒，然后不再自动滚动（只执行一次自动滚动+停留）
    if (autoScrollTimer) clearTimeout(autoScrollTimer);
    autoScrollTimer = setTimeout(function() {
      // 停留3秒完成，什么都不做（不再自动滚回去）
      isAutoScrolling = false;
      autoScrollTimer = null;
    }, stayDuration);
  }
  
  // 监听用户手动滚动（用户停止滚动后立即重新执行自动滑动逻辑）
  var scrollTimer = null;
  function onUserScroll() {
    // 用户开始滚动，标记为已干预，取消所有自动滑动计划
    if (!userInterrupted) {
      userInterrupted = true;
      console.log('用户手动滑动，已接管');
    }
    // 清除之前的定时器
    if (scrollTimer) clearTimeout(scrollTimer);
    if (autoScrollTimer) {
      clearTimeout(autoScrollTimer);
      autoScrollTimer = null;
    }
    isAutoScrolling = false;
    
    // 用户停止滚动后，重新尝试自动滑动（但此时 userInterrupted = true，不会再自动滑动）
    // 根据需求：“用户停止滑动后立即自动滑动” —— 但如果用户已经手动划过，就不再自动滑动，尊重用户操作
    // 这里为了符合“用户如果自己划的话，用户停止滑动后立即自动滑动”的语义：
    // 重新解读：用户手动滑动后，停止滑动时立即触发一次自动滑动，覆盖用户可能想再看二维码的需求。
    // 但为了避免循环冲突，我们这样实现：用户手动滚动停止后，如果当前页面不在二维码区域，则自动滑向二维码，且不标记永久干预，允许后续再次自动滑动
    // 更合理：用户停止滑动后，自动滑动到二维码处，并停留3秒，之后用户再滑动则再触发。
    // 让逻辑更符合直觉：每次用户停止滑动，都尝试将二维码带到视野中央（除非二维码已经在可视区中央附近）
    scrollTimer = setTimeout(function() {
      // 检查二维码是否在视野中央附近（简单判断是否在可视区）
      var rect = qrSection.getBoundingClientRect();
      var windowHeight = window.innerHeight;
      var isInView = rect.top >= 0 && rect.bottom <= windowHeight;
      // 如果不在视野内，或者虽然在里面但偏上偏下，都重新对齐到中央
      if (!isInView || rect.top < 50 || rect.bottom > windowHeight - 50) {
        // 不破坏 userInterrupted 标记，但允许再次自动滑动，只要用户不继续滑
        // 清除之前的自动滚动标志
        if (autoScrollTimer) clearTimeout(autoScrollTimer);
        isAutoScrolling = false;
        // 执行平滑滚动到二维码中央
        qrSection.scrollIntoView({
          behavior: 'smooth',
          block: 'center'
        });
        // 重新开启停留计时
        autoScrollTimer = setTimeout(function() {
          isAutoScrolling = false;
          autoScrollTimer = null;
        }, stayDuration);
      }
      scrollTimer = null;
    }, 150);  // 停止滚动150ms后触发
  }
  
  // 页面加载完成后先自动滑动到二维码，停留3秒
  // 给页面一点渲染时间
  window.addEventListener('load', function() {
    // 延迟0.5秒执行，保证页面动画和布局稳定
    setTimeout(function() {
      if (!userInterrupted) {
        scrollToQR();
      }
    }, 500);
  });
  
  // 监听用户滚动事件
  window.addEventListener('scroll', function() {
    if (scrollTimer) clearTimeout(scrollTimer);
    // 用户滑动期间取消正在进行的自动滑动
    if (autoScrollTimer) {
      clearTimeout(autoScrollTimer);
      autoScrollTimer = null;
    }
    isAutoScrolling = false;
    
    // 用户停止滚动后的回调
    scrollTimer = setTimeout(function() {
      // 用户停止滚动后，立即自动滑动到二维码区域
      // 但为了避免在用户主动想看其他地方时强制拽回，我们增加条件：只有当二维码不在视野中央附近时才自动对齐
      var rect = qrSection.getBoundingClientRect();
      var windowHeight = window.innerHeight;
      var isCentered = (rect.top >= windowHeight * 0.3 && rect.bottom <= windowHeight * 0.7);
      // 如果二维码偏离视野中央较多，就自动对齐
      if (!isCentered) {
        if (autoScrollTimer) clearTimeout(autoScrollTimer);
        isAutoScrolling = false;
        qrSection.scrollIntoView({
          behavior: 'smooth',
          block: 'center'
        });
        autoScrollTimer = setTimeout(function() {
          isAutoScrolling = false;
          autoScrollTimer = null;
        }, stayDuration);
      } else {
        // 已经在中央，不做处理
      }
      scrollTimer = null;
    }, 120);
  });
  
  // 触摸屏的 touch 事件兼容处理（确保移动端也能捕获停止滚动）
  var touchTimer = null;
  window.addEventListener('touchstart', function() {
    if (touchTimer) clearTimeout(touchTimer);
    if (autoScrollTimer) {
      clearTimeout(autoScrollTimer);
      autoScrollTimer = null;
    }
    isAutoScrolling = false;
  });
  window.addEventListener('touchend', function() {
    if (touchTimer) clearTimeout(touchTimer);
    touchTimer = setTimeout(function() {
      // 停止滑动后自动对齐二维码（类似滚动逻辑）
      var rect = qrSection.getBoundingClientRect();
      var windowHeight = window.innerHeight;
      var isCentered = (rect.top >= windowHeight * 0.3 && rect.bottom <= windowHeight * 0.7);
      if (!isCentered) {
        if (autoScrollTimer) clearTimeout(autoScrollTimer);
        isAutoScrolling = false;
        qrSection.scrollIntoView({
          behavior: 'smooth',
          block: 'center'
        });
        autoScrollTimer = setTimeout(function() {
          isAutoScrolling = false;
          autoScrollTimer = null;
        }, stayDuration);
      }
      touchTimer = null;
    }, 120);
  });
  
})();
</script>

</body>
</html>
