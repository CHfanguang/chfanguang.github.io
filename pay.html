<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
<title>Shadow Moon · 自助购买</title>
<!-- 像素字体保留供其他元素使用，但吸顶栏不用这个字体 -->
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box}
body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"PingFang SC","Microsoft YaHei";
  background:linear-gradient(135deg,#cfcfcf,#f6f6f6 30%,#bdbdbd 60%,#f0f0f0);
  color:#000;
  -webkit-overflow-scrolling: touch;
  min-height: 100vh;
}

/* 吸顶栏 – 方框型吸顶，直角，毛玻璃半透明，颜色全彩（谷歌风格） */
.top-logo{
  position:sticky;
  top:0;
  z-index:999;
  width:100%;
  background:rgba(255,255,255,.45);
  backdrop-filter:blur(30px) saturate(220%);
  -webkit-backdrop-filter:blur(30px) saturate(220%);
  border-radius:0;
  box-shadow:inset 0 1px 1px rgba(255,255,255,.7), 0 8px 20px rgba(0,0,0,.18);
  padding: 14px 0;
}

/* 内部容器让内容居中，宽度限定 */
.logo-container {
  max-width: 900px;
  margin: 0 auto;
  padding: 0 20px;
  display: flex;
  justify-content: center;      /* 文字居中 */
}

.logo{
  font-size:30px;
  font-weight:900;
  letter-spacing:.6px;
  display: inline-flex;
  gap: 2px;
}
.logo span {
  text-shadow: none;
}
/* 吸顶栏内文字颜色采用谷歌五色循环，保证每个字颜色明亮，几乎全彩 */
/* 自 - 蓝 助 - 红 购 - 黄 买 - 绿 (再加个尾字可循环, 但只有四字, 就这样) */
.logo .char1 { color:#4285F4; }  /* 自 蓝 */
.logo .char2 { color:#EA4335; }  /* 助 红 */
.logo .char3 { color:#FBBC05; }  /* 购 黄 */
.logo .char4 { color:#34A853; }  /* 买 绿 —— 用谷歌绿，鲜艳 */

/* 主容器 – 保留主页的淡入动画 */
.container{
  max-width:900px;
  margin:auto;
  padding:20px 20px 100px;
  animation:iosIn .9s ease-out both;
}
@keyframes iosIn{
  from{opacity:0;transform:translateY(70px)}
  to{opacity:1;transform:translateY(0)}
}

/* ========= 调整毛玻璃：更透明、更薄 (降低背景不透明度、减弱模糊强度) ========= */
.glass{
  background:rgba(255,255,255,0.2);      /* 更透明：从0.45 -> 0.2 */
  backdrop-filter:blur(12px) saturate(180%);  /* 更薄：模糊从30px降到12px */
  -webkit-backdrop-filter:blur(12px) saturate(180%);
  border-radius:28px;
  padding:30px;
  line-height:1.7;
  box-shadow:inset 0 1px 1px rgba(255,255,255,.7), 0 30px 50px rgba(0,0,0,.18);
  position: relative;
  overflow: hidden;
}

/* 自助付款说明 (居中，粗黑体) */
.sub-title{
  text-align: center;
  font-size: 26px;
  font-weight: 700;
  margin: 0 0 30px 0;
  letter-spacing: 1px;
  color: #111;
  text-shadow: 0 2px 5px rgba(0,0,0,0.05);
}
@media (max-width:550px){
  .sub-title{ font-size: 22px; }
}

/* 普通说明段落：不使用任何特殊字体样式，仅系统默认，没有任何多余的括号提示 */
.plain-instruction {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "PingFang SC", "Microsoft YaHei", sans-serif;
  font-style: normal;
  font-weight: 400;
  color: #1e1e1e;
  font-size: 18px;
  text-align: left;
  margin: 30px 0 30px 0;
  line-height: 1.8;
  background: rgba(255,255,255,0.2);
  padding: 20px 25px;
  border-radius: 20px;
  backdrop-filter: blur(4px);
  border: 1px solid rgba(255,255,255,0.3);
}
.plain-instruction p {
  margin: 8px 0;
}
/* 修正说明文字：去掉多余的“此处为四个空格”的提示，只保留实际需要的空格 */
/* 空格在html中用四个&nbsp;实现，后面不加注释文字 */

/* ========= 二维码图片区域：图片进一步扩大，并添加青色边框 ========= */
.qr-image {
  text-align: center;
  margin: 30px 0 40px;
}
.qr-image img {
  max-width: 450px;          /* 从380px进一步扩大到450px，更大更醒目 */
  width: 100%;
  height: auto;
  border-radius: 28px;
  box-shadow: 0 20px 35px rgba(0,0,0,0.25), inset 0 1px 4px rgba(255,255,255,0.6);
  background: white;
  padding: 12px;
  /* 青色边框：亮青色 #00e5ff，稍粗一些 4px 更明显 */
  border: 4px solid #00e5ff;  
  backdrop-filter: blur(2px);
  transition: transform 0.2s ease; /* 加个微动效 */
}
.qr-image img:hover {
  transform: scale(1.02);      /* 悬停轻微放大，增加互动 */
}

/* 返回按钮 – 完全模仿主页底部导航中的单个按钮风格 */
.return-wrapper {
  display: flex;
  justify-content: center;
  margin: 50px 0 20px;
}
.return-btn {
  display: inline-block;
  padding: 14px 42px;
  background: rgba(255,255,255,0.4);
  backdrop-filter: blur(30px) saturate(220%);
  -webkit-backdrop-filter: blur(30px) saturate(220%);
  border-radius: 40px;
  color: #000;
  font-weight: 700;
  font-size: 20px;
  text-decoration: none;
  box-shadow: inset 0 1px 1px rgba(255,255,255,0.8), 0 15px 25px rgba(0,0,0,0.2);
  border: 1px solid rgba(255,255,255,0.4);
  transition: 0.2s;
  letter-spacing: 1px;
}
.return-btn:hover {
  transform: translateY(-3px);
  background: rgba(255,255,255,0.6);
}

/* ========= 底部 powerd by 区域 - 完全匹配主页颜色 (#888 更淡灰色，符合主页风格) ========= */
.footer {
  text-align: center;
  margin: 60px 0 20px;
  color: #888;                /* 从 #555 修正为 #888，与主页完全一致 */
  font-size: 14px;
  line-height: 1.6;
  font-weight: 400;           /* 确保字重正常，不粗不细 */
  opacity: 0.9;               /* 微微透一点，和主页footer感觉一样 */
}

/* 可选的微调，让footer在玻璃内更和谐 */
.glass .footer {
  text-shadow: 0 1px 2px rgba(255,255,255,0.3);
}

/* 音频播放器隐藏 - 不可见但用于自动播放 */
.hidden-audio {
  display: none;
}
</style>
</head>
<body>

<!-- 隐藏的音频元素，用于自动播放背景音乐 -->
<audio id="bgMusic" class="hidden-audio" preload="auto" loop>
  <source src="suhmeduh-phone kisses(1).mp3" type="audio/mpeg">
  您的浏览器不支持音频播放。
</audio>

<!-- 吸顶栏：方框型，直角，毛玻璃，文字全彩居中 -->
<div class="top-logo">
  <div class="logo-container">
    <div class="logo">
      <span class="char1">自</span>
      <span class="char2">助</span>
      <span class="char3">购</span>
      <span class="char4">买</span>
    </div>
  </div>
</div>

<div class="container">
  <!-- glass 已调整为更透明、模糊更薄 -->
  <div class="glass">
    <!-- 自助付款说明（居中，粗黑体） -->
    <div class="sub-title">自助付款说明</div>

    <!-- 说明区：修正文字，去掉多余提示，保留四个空格（用 &nbsp; 实现）且不加括号说明 -->
    <div class="plain-instruction">
      <p>请将二维码保存至本地后在微信扫描并打开</p>
      <p>付款金额请选择1元</p>
      <!-- 四个空格真实呈现，后面不跟任何额外文字 -->
      <p>付款备注请写您的QQ号/QID/手机号&nbsp;&nbsp;&nbsp;&nbsp;</p>
      <p>付款后30分钟内会有客服添加您的第三方社交平台好友</p>
    </div>

    <!-- 截图图片：Screenshot_20251118_190336.jpg 图片尺寸进一步扩大，并添加青色边框 -->
    <div class="qr-image">
      <img src="Screenshot_20251118_190336.jpg" alt="微信支付二维码" onerror="this.onerror=null; this.src='data:image/svg+xml,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20width%3D%22450%22%20height%3D%22450%22%20viewBox%3D%220%200%20450%20450%22%3E%3Crect%20width%3D%22450%22%20height%3D%22450%22%20fill%3D%22%23f0f0f0%22%2F%3E%3Ctext%20x%3D%2230%22%20y%3D%22225%22%20font-family%3D%22Arial%22%20font-size%3D%2224%22%20fill%3D%22%23555%22%3E二维码示例%3C%2Ftext%3E%3C%2Fsvg%3E';">
    </div>

    <!-- 返回按钮 -->
    <div class="return-wrapper">
      <a href="index.html" class="return-btn">点击back主页</a>
    </div>

    <!-- 最下面加powerd by - 颜色已修正为 #888，完全匹配主页 -->
    <div class="footer">
      Powerd by Shadow Moon<br>© CH凡光
    </div>
  </div>
</div>

<script>
// 自动播放音频（进站就播，支持循环播放）
(function() {
  var audio = document.getElementById('bgMusic');
  if (!audio) return;
  
  // 设置音量（可选，设为适中音量）
  audio.volume = 0.6;
  
  // 尝试自动播放
  var playPromise = audio.play();
  
  if (playPromise !== undefined) {
    playPromise.then(function() {
      // 自动播放成功
      console.log('音频自动播放成功');
    }).catch(function(error) {
      // 自动播放被浏览器阻止，静默处理或尝试用户交互后播放
      console.log('自动播放被阻止，等待用户交互');
      
      // 方案：用户首次点击页面任意位置时播放
      var playOnInteraction = function() {
        audio.play().then(function() {
          console.log('用户交互后播放成功');
          // 播放成功后移除监听
          document.removeEventListener('click', playOnInteraction);
          document.removeEventListener('touchstart', playOnInteraction);
        }).catch(function(e) {
          console.log('播放仍然失败', e);
        });
      };
      
      document.addEventListener('click', playOnInteraction);
      document.addEventListener('touchstart', playOnInteraction);
    });
  }
})();
</script>

<!-- 无多余注释 -->
</body>
</html>
