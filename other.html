<style>
*{box-sizing:border-box}
body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"PingFang SC","Microsoft YaHei";
  background:linear-gradient(135deg,#cfcfcf,#f6f6f6 30%,#bdbdbd 60%,#f0f0f0);
  color:#000;
}

/* 吸顶 LOGO */
.top-logo{
  position:sticky;
  top:14px;
  z-index:999;
  margin:14px auto 30px;
  width:fit-content;
  padding:14px 28px;
  background:rgba(255,255,255,.45);
  backdrop-filter:blur(30px) saturate(220%);
  -webkit-backdrop-filter:blur(30px) saturate(220%);
  border-radius:30px;
  box-shadow:
    inset 0 1px 1px rgba(255,255,255,.7),
    0 18px 40px rgba(0,0,0,.18);
}

.logo{
  font-size:30px;
  font-weight:900;
  letter-spacing:.6px;
}

/* 内容动画 */
.container{
  max-width:900px;
  margin:auto;
  padding:20px 20px 140px;
  animation:iosIn .9s ease-out both;
}
@keyframes iosIn{
  from{opacity:0;transform:translateY(70px)}
  to{opacity:1;transform:translateY(0)}
}

/* iOS 液态玻璃 */
.glass{
  background:rgba(255,255,255,.45);
  backdrop-filter:blur(30px) saturate(220%);
  -webkit-backdrop-filter:blur(30px) saturate(220%);
  border-radius:28px;
  padding:30px;
  line-height:1.7;
  box-shadow:
    inset 0 1px 1px rgba(255,255,255,.7),
    0 30px 50px rgba(0,0,0,.18);
}

/* 下载链接样式 */
.download a {
  color: #0066cc;
  text-decoration: underline;
  word-break: break-all;
}
.download a:hover {
  color: #004499;
}

/* ----- 专注飞机按钮容器 + 小号笼罩 ----- */
.focus-wrapper {
  margin-top: 28px;           /* 与上方内容间距 */
  display: flex;
  justify-content: center;    /* 水平居中 */
}

/* 笼罩框 — 缩小版 */
.focus-frame {
  background: rgba(255, 255, 255, 0.35);
  backdrop-filter: blur(28px) saturate(200%);
  -webkit-backdrop-filter: blur(28px) saturate(200%);
  border-radius: 40px;                      /* 稍小圆角，配合小尺寸 */
  padding: 10px 28px;                       /* 内缩，让按钮更紧凑 */
  border: 1.5px solid rgba(255, 255, 255, 0.7);
  box-shadow: 
    0 8px 18px rgba(0,0,0,0.15),
    inset 0 1px 3px rgba(255,255,255,0.8);
  display: inline-block;                    /* 紧缩宽度 */
}

/* 专注飞机按钮 — 小一号，但依然醒目 */
.focus-btn {
  display: inline-block;
  background: rgba(50, 100, 200, 0.25);
  backdrop-filter: blur(15px);
  -webkit-backdrop-filter: blur(15px);
  border: 2px solid rgba(255, 255, 255, 0.8);
  border-radius: 36px;
  padding: 10px 38px;                       /* 水平内缩，竖直减少 */
  color: #000;
  font-weight: 700;
  font-size: 1.3rem;                        /* 从1.8rem降下来 */
  letter-spacing: 2px;
  text-decoration: none;
  box-shadow: 0 8px 16px rgba(0, 0, 0, 0.2), inset 0 1px 4px white;
  transition: all 0.1s ease;
  text-shadow: 0 2px 4px rgba(255,255,200,0.5);
  line-height: 1.2;
}

.focus-btn:hover {
  transform: scale(1.02);
  background: rgba(70, 130, 230, 0.4);
  box-shadow: 0 10px 20px rgba(0,0,0,0.25), inset 0 2px 6px white;
}

.focus-btn:active {
  transform: scale(0.98);
  box-shadow: 0 5px 10px rgba(0,0,0,0.25);
}

.footer{
  text-align:center;
  margin:40px 0 100px;
  color:#888;
  font-size:14px;
  line-height:1.6;
}

/* ===== 底部导航 ===== */

  left:50%;

  width:82%;
  max-width:420px;

  -webkit-backdrop-filter:blur(30px) saturate(220%);
  border-radius:30px;
  display:flex;
  justify-content:space-evenly;
  padding:16px 0;
}
.bottom-nav a{
  text-decoration:none;
  font-weight:700;
  color:#000;
  padding: 0 8px;
}
</style>
