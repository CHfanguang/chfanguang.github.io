<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CHFG社区 · 首頁</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", sans-serif;
            background: #0a0a0f;
            min-height: 100vh;
            padding-bottom: 70px;
            position: relative;
        }
        
        /* 星空背景 */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: radial-gradient(2px 2px at 15px 60px, #fff, rgba(0,0,0,0)),
                        radial-gradient(2px 2px at 72px 150px, #fff, rgba(0,0,0,0)),
                        radial-gradient(2px 2px at 145px 280px, #ffd700, rgba(0,0,0,0)),
                        radial-gradient(2px 2px at 220px 90px, #fff, rgba(0,0,0,0)),
                        radial-gradient(3px 3px at 350px 190px, #87ceeb, rgba(0,0,0,0)),
                        radial-gradient(2px 2px at 410px 310px, #fff, rgba(0,0,0,0)),
                        radial-gradient(3px 3px at 520px 130px, #ffd700, rgba(0,0,0,0)),
                        radial-gradient(2px 2px at 680px 250px, #fff, rgba(0,0,0,0)),
                        radial-gradient(2px 2px at 750px 380px, #87ceeb, rgba(0,0,0,0)),
                        radial-gradient(3px 3px at 820px 90px, #fff, rgba(0,0,0,0));
            background-size: 200px 200px;
            background-repeat: repeat;
            opacity: 0.6;
            animation: stars 180s linear infinite;
            pointer-events: none;
        }
        
        @keyframes stars {
            from { transform: translateY(0) translateX(0); }
            to { transform: translateY(-1000px) translateX(200px); }
        }
        
        /* 吸頂欄 */
        .top-bar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 60px;
            background: rgba(20, 20, 30, 0.8);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255,255,255,0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        
        .rainbow-text {
            font-size: 24px;
            font-weight: 800;
            background: linear-gradient(90deg, #4285F4, #9B51E0, #34A853, #EA4335, #FBBC05, #FF6B35);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        
        /* 主要內容 */
        .container {
            max-width: 600px;
            margin: 0 auto;
            padding: 80px 16px 20px;
            position: relative;
            z-index: 10;
        }
        
        /* 用戶卡片 */
        .profile-card {
            background: rgba(30, 30, 40, 0.6);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 20px;
        }
        
        .profile-header {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 15px;
        }
        
        .avatar-container {
            position: relative;
            width: 70px;
            height: 70px;
        }
        
        .profile-avatar {
            width: 70px;
            height: 70px;
            border-radius: 35px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 28px;
            font-weight: 600;
            cursor: pointer;
            object-fit: cover;
        }
        
        .avatar-upload {
            position: absolute;
            bottom: 0;
            right: 0;
            width: 24px;
            height: 24px;
            background: #667eea;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 14px;
            cursor: pointer;
            border: 2px solid rgba(255,255,255,0.2);
        }
        
        .profile-info h3 {
            font-size: 18px;
            color: white;
            margin-bottom: 4px;
        }
        
        .user-badge {
            display: inline-block;
            padding: 4px 12px;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 20px;
            font-size: 12px;
            color: #a0a0b0;
        }
        
        .user-badge.admin {
            border-color: #EA4335;
            color: #EA4335;
        }
        
        .user-badge.leader {
            border-color: #FBBC05;
            color: #FBBC05;
        }
        
        /* 統計數字 */
        .stats-row {
            display: flex;
            justify-content: space-around;
            padding: 15px 0;
            border-top: 1px solid rgba(255,255,255,0.1);
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        
        .stat-block {
            text-align: center;
            cursor: pointer;
        }
        
        .stat-number {
            font-size: 20px;
            font-weight: 600;
            color: white;
        }
        
        .stat-label {
            font-size: 13px;
            color: #a0a0b0;
            margin-top: 4px;
        }
        
        /* 面板切換 */
        .panel {
            display: none;
        }
        
        .panel.active {
            display: block;
        }
        
        /* 空狀態 */
        .empty-state {
            text-align: center;
            color: #6a6a7a;
            padding: 40px;
        }
        
        .hidden {
            display: none !important;
        }
    </style>
</head>
<body>
    <div class="top-bar">
        <span class="rainbow-text">CHFG社区</span>
    </div>

    <div class="container">
        <!-- 用戶卡片（所有面板共用） -->
        <div class="profile-card">
            <div class="profile-header">
                <div class="avatar-container">
                    <img id="profileAvatar" class="profile-avatar" src="" alt="avatar" style="display: none;">
                    <div id="profileAvatarText" class="profile-avatar"></div>
                    <input type="file" id="avatarUpload" accept="image/*" style="display: none;">
                    <div class="avatar-upload" onclick="document.getElementById('avatarUpload').click()">✏️</div>
                </div>
                <div class="profile-info">
                    <h3 id="userName"></h3>
                    <span class="user-badge" id="userRole"></span>
                </div>
            </div>
            
            <div class="stats-row">
                <div class="stat-block" onclick="showFollowers()">
                    <div class="stat-number" id="userFollowerCount">0</div>
                    <div class="stat-label">粉絲</div>
                </div>
                <div class="stat-block" onclick="showFollowing()">
                    <div class="stat-number" id="userFollowingCount">0</div>
                    <div class="stat-label">關注</div>
                </div>
            </div>
        </div>

        <!-- 面板切換區域 -->
        <div id="homePanel" class="panel active">
            <!-- 首頁 - 完全空白 -->
        </div>

        <div id="notificationsPanel" class="panel">
            <!-- 通知 - 完全空白 -->
        </div>

        <div id="postPanel" class="panel">
            <!-- 發布頁面 -->
            <div class="profile-card">
                <h3 style="color: white; margin-bottom: 20px;">發布新貼文</h3>
                <textarea id="postContent" placeholder="分享你的想法..." rows="6" style="width: 100%; padding: 15px; background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.1); border-radius: 15px; color: white; font-size: 16px; resize: vertical; margin-bottom: 20px;"></textarea>
                <button onclick="submitPost()" style="width: 100%; padding: 15px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); border: none; border-radius: 15px; color: white; font-size: 16px; font-weight: 600; cursor: pointer;">發布</button>
            </div>
        </div>

        <div id="profilePanel" class="panel">
            <!-- 個人主頁 -->
            <div class="profile-card">
                <h3 style="color: white; margin-bottom: 15px;">我的帖子</h3>
                <div id="myPostsList"></div>
            </div>
            
            <div class="profile-card">
                <h3 style="color: white; margin-bottom: 15px;">我的關注</h3>
                <div id="myFollowingList"></div>
            </div>
            
            <button class="danger-btn" onclick="logout()" style="width: 100%; padding: 15px; background: rgba(234, 67, 53, 0.2); border: 1px solid #EA4335; border-radius: 15px; color: #EA4335; font-size: 16px; font-weight: 600; cursor: pointer; margin-top: 20px;">退出登錄</button>
        </div>

        <div id="adminPanel" class="panel">
            <!-- 管理面板 - 完全空白 -->
        </div>
    </div>
