<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CHFG社区 · 首頁</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", sans-serif;
            background: #0a0a0f;
            min-height: 100vh;
            padding-bottom: 70px;
            position: relative;
        }
        
        /* 星空背景 */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: radial-gradient(2px 2px at 15px 60px, #fff, rgba(0,0,0,0)),
                        radial-gradient(2px 2px at 72px 150px, #fff, rgba(0,0,0,0)),
                        radial-gradient(2px 2px at 145px 280px, #ffd700, rgba(0,0,0,0)),
                        radial-gradient(2px 2px at 220px 90px, #fff, rgba(0,0,0,0)),
                        radial-gradient(3px 3px at 350px 190px, #87ceeb, rgba(0,0,0,0)),
                        radial-gradient(2px 2px at 410px 310px, #fff, rgba(0,0,0,0)),
                        radial-gradient(3px 3px at 520px 130px, #ffd700, rgba(0,0,0,0)),
                        radial-gradient(2px 2px at 680px 250px, #fff, rgba(0,0,0,0)),
                        radial-gradient(2px 2px at 750px 380px, #87ceeb, rgba(0,0,0,0)),
                        radial-gradient(3px 3px at 820px 90px, #fff, rgba(0,0,0,0));
            background-size: 200px 200px;
            background-repeat: repeat;
            opacity: 0.6;
            animation: stars 180s linear infinite;
            pointer-events: none;
        }
        
        @keyframes stars {
            from { transform: translateY(0) translateX(0); }
            to { transform: translateY(-1000px) translateX(200px); }
        }
        
        /* 吸頂欄 */
        .top-bar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 60px;
            background: rgba(20, 20, 30, 0.8);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255,255,255,0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        
        .rainbow-text {
            font-size: 24px;
            font-weight: 800;
            background: linear-gradient(90deg, #4285F4, #9B51E0, #34A853, #EA4335, #FBBC05, #FF6B35);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        
        /* 主要內容 */
        .container {
            max-width: 600px;
            margin: 0 auto;
            padding: 80px 16px 20px;
            position: relative;
            z-index: 10;
        }
        
        /* 面板切換 */
        .panel {
            display: none;
        }
        
        .panel.active {
            display: block;
        }
        
        /* 空狀態 */
        .empty-state {
            text-align: center;
            color: #6a6a7a;
            padding: 40px;
            font-size: 16px;
        }
        
        .clickable-btn {
            display: inline-block;
            margin-top: 15px;
            padding: 10px 25px;
            background: #667eea;
            border: none;
            border-radius: 25px;
            color: white;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
        }
        
        .hidden {
            display: none !important;
        }
        
        /* 卡片樣式 */
        .card {
            background: rgba(30, 30, 40, 0.6);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 20px;
            padding: 25px;
            margin-bottom: 20px;
        }
        
        .card-title {
            color: white;
            font-size: 20px;
            margin-bottom: 20px;
        }
        
        textarea {
            width: 100%;
            padding: 15px;
            background: rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 15px;
            color: white;
            font-size: 16px;
            resize: vertical;
            margin-bottom: 20px;
        }
        
        textarea:focus {
            outline: none;
            border-color: #667eea;
        }
        
        .post-btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            border-radius: 15px;
            color: white;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
        }
        
        /* 帖子樣式 */
        .post-item {
            padding: 20px 0;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        
        .post-item:last-child {
            border-bottom: none;
        }
        
        .post-author {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 8px;
        }
        
        .post-author-name {
            color: white;
            font-weight: 600;
            font-size: 16px;
            cursor: pointer;
        }
        
        .post-author-name:hover {
            text-decoration: underline;
        }
        
        .post-verified {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 18px;
            height: 18px;
            background: #1DA1F2;
            border-radius: 50%;
            color: white;
            font-size: 11px;
            font-weight: bold;
        }
        
        .post-content {
            color: #e0e0e0;
            font-size: 15px;
            line-height: 1.6;
            margin-bottom: 10px;
            white-space: pre-wrap;
        }
        
        .post-time {
            color: #6a6a7a;
            font-size: 12px;
            margin-bottom: 10px;
        }
        
        .post-stats {
            display: flex;
            gap: 15px;
            color: #a0a0a0;
            font-size: 13px;
            margin-bottom: 10px;
        }
        
        .post-actions {
            display: flex;
            gap: 10px;
        }
        
        .action-btn {
            padding: 6px 16px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 20px;
            color: #a0a0b0;
            font-size: 13px;
            cursor: pointer;
        }
        
        .action-btn:hover {
            background: rgba(255,255,255,0.1);
        }
        
        .action-btn.liked {
            background: #EA4335;
            border-color: #EA4335;
            color: white;
        }
        
        .action-btn.following {
            background: #34A853;
            border-color: #34A853;
            color: white;
        }
        
        /* 我的頁面專用樣式 */
        .profile-card {
            background: rgba(30, 30, 40, 0.6);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 20px;
        }
        
        .profile-header {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 15px;
        }
        
        .avatar-container {
            position: relative;
            width: 70px;
            height: 70px;
        }
        
        .profile-avatar {
            width: 70px;
            height: 70px;
            border-radius: 35px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 28px;
            font-weight: 600;
            object-fit: cover;
        }
        
        .avatar-upload {
            position: absolute;
            bottom: 0;
            right: 0;
            width: 24px;
            height: 24px;
            background: #667eea;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 14px;
            cursor: pointer;
            border: 2px solid rgba(255,255,255,0.2);
        }
        
        .profile-info {
            display: flex;
            align-items: center;
            gap: 5px;
        }
        
        .profile-info h3 {
            font-size: 18px;
            color: white;
        }
        
        /* 蓝色对号徽章 */
        .verified-badge {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 22px;
            height: 22px;
            background: #1DA1F2;
            border-radius: 50%;
            color: white;
            font-size: 14px;
            font-weight: bold;
        }
        
        .stats-row {
            display: flex;
            justify-content: space-around;
            padding: 15px 0;
            border-top: 1px solid rgba(255,255,255,0.1);
        }
        
        .stat-block {
            text-align: center;
            cursor: pointer;
        }
        
        .stat-number {
            font-size: 20px;
            font-weight: 600;
            color: white;
        }
        
        .stat-label {
            font-size: 13px;
            color: #a0a0b0;
            margin-top: 4px;
        }
        
        .profile-section {
            background: rgba(255,255,255,0.05);
            border-radius: 15px;
            padding: 15px;
            margin-bottom: 20px;
        }
        
        .profile-section h4 {
            color: white;
            margin-bottom: 15px;
            font-size: 16px;
        }
        
        .danger-btn {
            width: 100%;
            padding: 15px;
            background: rgba(234, 67, 53, 0.2);
            border: 1px solid #EA4335;
            border-radius: 15px;
            color: #EA4335;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
        }
        
        /* 用戶列表樣式 */
        .user-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        
        .user-item:last-child {
            border-bottom: none;
        }
        
        .user-info {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .user-avatar-small {
            width: 40px;
            height: 40px;
            border-radius: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 16px;
            font-weight: 600;
            background-size: cover;
        }
        
        .user-details {
            display: flex;
            flex-direction: column;
        }
        
        .user-name {
            color: white;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 4px;
        }
        
        .user-email {
            font-size: 12px;
            color: #a0a0b0;
        }
    </style>
</head>
<body>
    <div class="top-bar">
        <span class="rainbow-text">CHFG社区</span>
    </div>

    <div class="container">
        <!-- 面板切換區域 -->
        <div id="homePanel" class="panel active">
            <div id="homePostsList"></div>
        </div>

        <div id="notificationsPanel" class="panel">

        <div id="postPanel" class="panel">

                <button class="post-btn" onclick="submitPost()">發布</button>
            </div>

        <div id="profilePanel" class="panel">
            <div class="profile-card" id="profileCard"></div>
            
            <div class="profile-section">
                <h4>我的帖子</h4>
                <div id="myPostsList"></div>

            <div class="profile-section">
                <h4>我的關注</h4>
                <div id="myFollowingList"></div>

            <button class="danger-btn" onclick="logout()">退出登錄</button>

        <div id="adminPanel" class="panel"></div>
    </div>
<!-- 底部导航栏 -->
<div class="bottom-nav">
    <div class="nav-item active" onclick="switchPanel('home')">
        <div class="nav-icon">🏠</div>
        <div class="nav-text">首頁</div>
    </div>
    <div class="nav-item" onclick="switchPanel('notifications')">

        <div class="nav-icon">⚡</div>
        <div class="nav-text">管理</div>

</div>

<!-- 用戶資料卡彈窗（查看他人） -->
<div id="userProfileModal" class="modal">
    <div class="modal-content">
        <div style="display: flex; align-items: center; gap: 15px; margin-bottom: 20px;">

        <div class="stats-row" style="margin-bottom: 20px;">

            <div class="stat-block">
                <div class="stat-number" id="modalFollowerCount">0</div>

        <h4 style="color: white; margin-bottom: 15px;">TA的動態</h4>
        <div id="modalUserPosts" style="max-height: 300px; overflow-y: auto;"></div>
        
        <div class="modal-buttons" style="margin-top: 20px;">
            <button class="modal-btn cancel" onclick="closeUserModal()">關閉</button>

</div>

<!-- 粉絲列表彈窗 -->
<div id="followersModal" class="modal">
    <div class="modal-content">
        <h3 style="color: white; margin-bottom: 15px;">粉絲列表</h3>
        <div id="followersList" style="max-height: 400px; overflow-y: auto;"></div>
        <div class="modal-buttons">
            <button class="modal-btn cancel" onclick="closeFollowersModal()">關閉</button>

</div>

<!-- 關注列表彈窗 -->
<div id="followingModal" class="modal">
    <div class="modal-content">
        <h3 style="color: white; margin-bottom: 15px;">關注列表</h3>
        <div id="followingList" style="max-height: 400px; overflow-y: auto;"></div>
        <div class="modal-buttons">
            <button class="modal-btn cancel" onclick="closeFollowingModal()">關閉</button>
        </div>
    </div>
</div>

<style>

        justify-content: center;
        z-index: 2000;
    }

        max-width: 400px;
        background: rgba(30, 30, 40, 0.9);
        backdrop-filter: blur(15px);

<script>
    // ============ 数据初始化 ============
    let currentUser = JSON.parse(localStorage.getItem('currentUser'));
    let users = JSON.parse(localStorage.getItem('users') || '[]');
    let posts = JSON.parse(localStorage.getItem('posts') || '[]');
    let follows = JSON.parse(localStorage.getItem('follows') || '[]');
    let likes = JSON.parse(localStorage.getItem('likes') || '[]');
    let notifications = JSON.parse(localStorage.getItem('notifications') || '[]');
    let userAvatars = JSON.parse(localStorage.getItem('userAvatars') || '{}');
    
    // 检查登录状态
    if (!currentUser) {
        window.location.href = 'login.html';
    }

    // 社区长专属邮箱
    const LEADER_EMAIL = 'chfanguang@outlook.com';

    // ============ DOM 元素 ============
    const adminNavItem = document.getElementById('adminNavItem');
    const notifBadge = document.getElementById('notifBadge');
    
    // ============ 当前面板 ============
    let currentPanel = 'home';
    let currentViewingUser = null;

    // ============ 切换面板 ============
    function switchPanel(panel) {
        document.querySelectorAll('.nav-item').forEach(item => {
            item.classList.remove('active');
        });
        event.currentTarget.classList.add('active');
        
        document.querySelectorAll('.panel').forEach(p => {
            p.classList.remove('active');
        });
        
        currentPanel = panel;
        document.getElementById(panel + 'Panel').classList.add('active');
        
        if (panel === 'home') {
            loadHomePosts();
        } else if (panel === 'notifications') {
            loadNotificationsList();
        } else if (panel === 'profile') {
            loadProfileCard();
            loadMyPosts();
            loadMyFollowing();
        }
    }

    // ============ 初始化页面 ============
    function initPage() {
        if (currentUser.role === 'community_leader') {
            adminNavItem.classList.remove('hidden');
        }
        
        switchPanel('home');
        updateNotifBadge();
        loadHomePosts();
        loadNotificationsList();
    }

    // ============ 更新通知角标 ============
    function updateNotifBadge() {
        const unread = notifications.filter(n => n.username === currentUser.username && !n.read).length;
        if (unread > 0) {
            notifBadge.textContent = unread;
            notifBadge.classList.remove('hidden');
        } else {
            notifBadge.classList.add('hidden');
        }
    }

    // ============ 发布帖子 ============
    function submitPost() {
        const content = document.getElementById('postContent').value.trim();
        if (!content) {
            alert('請輸入內容');
            return;
        }
        
        const newPost = {
            id: Date.now(),
            username: currentUser.username,
            content: content,
            likes: 0,
            created_at: new Date().toISOString()
        };
        
        posts.push(newPost);
        localStorage.setItem('posts', JSON.stringify(posts));
        
        document.getElementById('postContent').value = '';
        alert('發布成功！');
        
        if (currentPanel === 'home') {
            loadHomePosts();
        }
    }

    // ============ 加载首页帖子 ============
    function loadHomePosts() {
        const homePostsList = document.getElementById('homePostsList');
        const sevenDaysAgo = new Date();
        sevenDaysAgo.setDate(sevenDaysAgo.getDate() - 7);
        
        const recentPosts = posts
            .filter(p => new Date(p.created_at) > sevenDaysAgo)
            .sort((a, b) => new Date(b.created_at) - new Date(a.created_at));
        
        if (recentPosts.length === 0) {
            homePostsList.innerHTML = `
                <div class="empty-state">
                    還沒有帖子喔<br><br>
                    <button class="clickable-btn" onclick="switchPanel('post')">快來發布</button>
                </div>
            `;
            return;
        }
        
        let html = '';
        recentPosts.forEach(post => {
            const user = users.find(u => u.username === post.username);
            const hasLiked = likes.some(l => l.username === currentUser.username && l.post_id === post.id);
            const isFollowed = follows.some(f => f.follower === currentUser.username && f.followed === post.username);
            const isVerified = (user?.role === 'admin' || user?.role === 'community_leader');
            
            html += `
                <div class="post-item">
                    <div class="post-author">
                        <span class="post-author-name" onclick="viewUserProfile('${post.username}')">${post.username}</span>
                        ${isVerified ? '<span class="post-verified">✓</span>' : ''}
                    </div>
                    <div class="post-content">${escapeHtml(post.content)}</div>
                    <div class="post-time">${formatTime(post.created_at)}</div>
                    <div class="post-stats">
                        <span>❤️ ${post.likes}</span>
                    </div>
                    <div class="post-actions">
                        <button class="action-btn ${hasLiked ? 'liked' : ''}" onclick="toggleLike(${post.id})">
                            ${hasLiked ? '已讚' : '讚'}
                        </button>
                        ${post.username !== currentUser.username ? `
                            <button class="action-btn ${isFollowed ? 'following' : ''}" onclick="toggleFollow('${post.username}')">
                                ${isFollowed ? '取消關注' : '關注'}
                            </button>
                        ` : ''}
                    </div>
                </div>
            `;
        });
        
        homePostsList.innerHTML = html;
    }

    // ============ 加载通知列表 ============
    function loadNotificationsList() {
        const notificationsList = document.getElementById('notificationsList');
        const userNotifs = notifications
            .filter(n => n.username === currentUser.username)
            .sort((a, b) => new Date(b.created_at) - new Date(a.created_at));
        
        if (userNotifs.length === 0) {
            notificationsList.innerHTML = '<div class="empty-state">暫無通知</div>';
            return;
        }
        
        notificationsList.innerHTML = userNotifs.map(n => `
            <div class="post-item" onclick="markNotificationRead(${n.id})">
                <div class="post-content">${n.content}</div>
                <div class="post-time">${formatTime(n.created_at)}</div>
            </div>
        `).join('');
    }

    // ============ 标记通知已读 ============
    function markNotificationRead(id) {
        const notif = notifications.find(n => n.id === id);
        if (notif) {
            notif.read = true;
            localStorage.setItem('notifications', JSON.stringify(notifications));
            updateNotifBadge();
            loadNotificationsList();
        }
    }
// ============ 点赞 ============
function toggleLike(postId) {
    const existing = likes.find(l => l.username === currentUser.username && l.post_id === postId);
    const post = posts.find(p => p.id === postId);
    
    if (existing) {
        const index = likes.findIndex(l => l.username === currentUser.username && l.post_id === postId);
        likes.splice(index, 1);
        post.likes--;
    } else {
        likes.push({
            username: currentUser.username,
            post_id: postId,
            created_at: new Date().toISOString()
        });
        post.likes++;
    }
    
    localStorage.setItem('likes', JSON.stringify(likes));
    localStorage.setItem('posts', JSON.stringify(posts));
    
    if (currentPanel === 'home') {
        loadHomePosts();
    }
}

// ============ 关注/取消关注 ============
function toggleFollow(targetUsername) {
    const existing = follows.find(f => f.follower === currentUser.username && f.followed === targetUsername);
    
    if (existing) {
        const index = follows.findIndex(f => f.follower === currentUser.username && f.followed === targetUsername);
        follows.splice(index, 1);
    } else {
        follows.push({
            follower: currentUser.username,
            followed: targetUsername,
            created_at: new Date().toISOString()
        });
    }
    
    localStorage.setItem('follows', JSON.stringify(follows));
    
    if (currentViewingUser) {
        viewUserProfile(currentViewingUser);
    }
    if (currentPanel === 'home') {
        loadHomePosts();
    } else if (currentPanel === 'profile') {
        loadMyFollowing();
        loadProfileCard();
    }
}

// ============ 加载个人资料卡 ============
function loadProfileCard() {
    const profileCard = document.getElementById('profileCard');
    
    let avatarHtml = '';
    if (userAvatars[currentUser.username]) {
        avatarHtml = `<img class="profile-avatar" src="${userAvatars[currentUser.username]}" style="width: 100%; height: 100%; object-fit: cover;">`;
    } else {
        avatarHtml = `<div class="profile-avatar">${currentUser.username.charAt(0).toUpperCase()}</div>`;
    }
    
    const isVerified = (currentUser.role === 'admin' || currentUser.role === 'community_leader');
    
    const myFollowers = follows.filter(f => f.followed === currentUser.username).length;
    const myFollowing = follows.filter(f => f.follower === currentUser.username).length;
    
    profileCard.innerHTML = `
        <div class="profile-header">
            <div class="avatar-container">
                ${avatarHtml}
                <input type="file" id="avatarUpload" accept="image/*" style="display: none;">
                <div class="avatar-upload" onclick="document.getElementById('avatarUpload').click()">✏️</div>
            </div>
            <div class="profile-info">
                <h3>${currentUser.username}</h3>
                ${isVerified ? '<span class="verified-badge">✓</span>' : ''}
            </div>
        </div>
        <div class="stats-row">
            <div class="stat-block" onclick="showFollowers()">
                <div class="stat-number">${myFollowers}</div>
                <div class="stat-label">粉絲</div>
            </div>
            <div class="stat-block" onclick="showFollowing()">
                <div class="stat-number">${myFollowing}</div>
                <div class="stat-label">關注</div>
            </div>
        </div>
    `;
    
    document.getElementById('avatarUpload').addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (file) {
            const reader = new FileReader();
            reader.onload = function(e) {
                userAvatars[currentUser.username] = e.target.result;
                localStorage.setItem('userAvatars', JSON.stringify(userAvatars));
                loadProfileCard();
            };
            reader.readAsDataURL(file);
        }
    });
}

// ============ 加载我的帖子 ============
function loadMyPosts() {
    const myPosts = posts.filter(p => p.username === currentUser.username)
        .sort((a, b) => new Date(b.created_at) - new Date(a.created_at));
    
    const list = document.getElementById('myPostsList');
    
    if (myPosts.length === 0) {
        list.innerHTML = '<div class="empty-state">暫無貼文</div>';
        return;
    }
    
    list.innerHTML = myPosts.map(post => `
        <div class="post-item">
            <div class="post-content">${escapeHtml(post.content)}</div>
            <div class="post-time">${formatTime(post.created_at)}</div>
            <div class="post-actions">
                <button class="action-btn" onclick="deletePost(${post.id})" style="border-color:#EA4335; color:#EA4335;">刪除</button>
            </div>
        </div>
    `).join('');
}

// ============ 加载我的关注 ============
function loadMyFollowing() {
    const myFollowing = follows.filter(f => f.follower === currentUser.username);
    const list = document.getElementById('myFollowingList');
    
    if (myFollowing.length === 0) {
        list.innerHTML = '<div class="empty-state">暫無關注</div>';
        return;
    }
    
    list.innerHTML = myFollowing.map(f => {
        const user = users.find(u => u.username === f.followed);
        const isVerified = (user?.role === 'admin' || user?.role === 'community_leader');
        const avatar = userAvatars[f.followed] ? userAvatars[f.followed] : null;
        
        return `
        <div class="user-item">
            <div class="user-info">
                <div class="user-avatar-small" ${avatar ? `style="background-image: url(${avatar}); background-size: cover;"` : ''}>
                    ${avatar ? '' : f.followed.charAt(0).toUpperCase()}
                </div>
                <div class="user-details">
                    <div class="user-name">
                        ${f.followed}
                        ${isVerified ? '<span class="post-verified">✓</span>' : ''}
                    </div>
                    <div class="user-email">${user?.email || ''}</div>
                </div>
            </div>
            <button class="action-btn following" onclick="toggleFollow('${f.followed}')">取消關注</button>
        </div>
    `}).join('');
}
// ============ 删除帖子 ============
function deletePost(postId) {
    if (!confirm('確定要刪除這篇貼文嗎？')) return;
    
    const index = posts.findIndex(p => p.id === postId);
    if (index !== -1) {
        posts.splice(index, 1);
        localStorage.setItem('posts', JSON.stringify(posts));
        loadMyPosts();
        if (currentPanel === 'home') {
            loadHomePosts();
        }
    }
}

// ============ 查看用户资料 ============
function viewUserProfile(username) {
    currentViewingUser = username;
    const user = users.find(u => u.username === username);
    
    document.getElementById('modalUserName').textContent = username;
    
    const modalAvatar = document.getElementById('modalUserAvatar');
    if (userAvatars[username]) {
        modalAvatar.style.backgroundImage = `url(${userAvatars[username]})`;
        modalAvatar.style.backgroundSize = 'cover';
        modalAvatar.textContent = '';
    } else {
        modalAvatar.style.backgroundImage = '';
        modalAvatar.textContent = username.charAt(0).toUpperCase();
    }
    
    const isVerified = (user?.role === 'admin' || user?.role === 'community_leader');
    const verifiedBadge = document.getElementById('modalUserVerified');
    if (isVerified) {
        verifiedBadge.style.display = 'inline-flex';
    } else {
        verifiedBadge.style.display = 'none';
    }
    
    const userPosts = posts.filter(p => p.username === username);
    const userFollowers = follows.filter(f => f.followed === username);
    const userFollowing = follows.filter(f => f.follower === username);
    
    document.getElementById('modalPostCount').textContent = userPosts.length;
    document.getElementById('modalFollowerCount').textContent = userFollowers.length;
    document.getElementById('modalFollowingCount').textContent = userFollowing.length;
    
    const followBtn = document.getElementById('modalFollowBtn');
    if (username === currentUser.username) {
        followBtn.style.display = 'none';
    } else {
        followBtn.style.display = 'block';
        const isFollowed = follows.some(f => f.follower === currentUser.username && f.followed === username);
        const isFollowedBy = follows.some(f => f.follower === username && f.followed === currentUser.username);
        
        followBtn.classList.remove('following');
        if (isFollowed && isFollowedBy) {
            followBtn.textContent = '互相關注';
            followBtn.classList.add('following');
        } else if (isFollowed) {
            followBtn.textContent = '取消關注';
            followBtn.classList.add('following');
        } else if (isFollowedBy) {
            followBtn.textContent = '回粉';
            followBtn.classList.add('following');
        } else {
            followBtn.textContent = '關注';
        }
    }
    
    const modalPosts = document.getElementById('modalUserPosts');
    if (userPosts.length === 0) {
        modalPosts.innerHTML = '<div class="empty-state">暫無貼文</div>';
    } else {
        modalPosts.innerHTML = userPosts.slice(0, 5).sort((a, b) => new Date(b.created_at) - new Date(a.created_at)).map(post => `
            <div class="post-item" style="border: none; padding: 10px 0;">
                <div class="post-content">${escapeHtml(post.content)}</div>
                <div class="post-time">${formatTime(post.created_at)}</div>
            </div>
        `).join('');
    }
    
    document.getElementById('userProfileModal').style.display = 'flex';
}

// ============ 处理关注（从弹窗） ============
function handleFollow() {
    toggleFollow(currentViewingUser);
    viewUserProfile(currentViewingUser);
}

// ============ 显示粉丝列表 ============
function showFollowers() {
    const followers = follows.filter(f => f.followed === currentUser.username);
    const list = document.getElementById('followersList');
    
    if (followers.length === 0) {
        list.innerHTML = '<div class="empty-state">暫無粉絲</div>';
        document.getElementById('followersModal').style.display = 'flex';
        return;
    }
    
    list.innerHTML = followers.map(f => {
        const user = users.find(u => u.username === f.follower);
        const isFollowing = follows.some(f2 => f2.follower === currentUser.username && f2.followed === f.follower);
        const isVerified = (user?.role === 'admin' || user?.role === 'community_leader');
        const avatar = userAvatars[f.follower] ? userAvatars[f.follower] : null;
        
        return `
        <div class="user-item">
            <div class="user-info">
                <div class="user-avatar-small" ${avatar ? `style="background-image: url(${avatar}); background-size: cover;"` : ''}>
                    ${avatar ? '' : f.follower.charAt(0).toUpperCase()}
                </div>
                <div class="user-details">
                    <div class="user-name">
                        ${f.follower}
                        ${isVerified ? '<span class="post-verified">✓</span>' : ''}
                    </div>
                    <div class="user-email">${user?.email || ''}</div>
                </div>
            </div>
            <button class="action-btn ${isFollowing ? 'following' : ''}" onclick="toggleFollow('${f.follower}')">
                ${isFollowing ? '取消關注' : '回粉'}
            </button>
        </div>
    `}).join('');
    
    document.getElementById('followersModal').style.display = 'flex';
}

// ============ 显示关注列表 ============
function showFollowing() {
    const following = follows.filter(f => f.follower === currentUser.username);
    const list = document.getElementById('followingList');
    
    if (following.length === 0) {
        list.innerHTML = '<div class="empty-state">暫無關注</div>';
        document.getElementById('followingModal').style.display = 'flex';
        return;
    }
    
    list.innerHTML = following.map(f => {
        const user = users.find(u => u.username === f.followed);
        const isVerified = (user?.role === 'admin' || user?.role === 'community_leader');
        const avatar = userAvatars[f.followed] ? userAvatars[f.followed] : null;
        
        return `
        <div class="user-item">
            <div class="user-info">
                <div class="user-avatar-small" ${avatar ? `style="background-image: url(${avatar}); background-size: cover;"` : ''}>
                    ${avatar ? '' : f.followed.charAt(0).toUpperCase()}
                </div>
                <div class="user-details">
                    <div class="user-name">
                        ${f.followed}
                        ${isVerified ? '<span class="post-verified">✓</span>' : ''}
                    </div>
                    <div class="user-email">${user?.email || ''}</div>
                </div>
            </div>
            <button class="action-btn following" onclick="toggleFollow('${f.followed}')">取消關注</button>
        </div>
    `}).join('');
    
    document.getElementById('followingModal').style.display = 'flex';
}
        // ============ 关闭弹窗 ============
        function closeUserModal() {
            document.getElementById('userProfileModal').style.display = 'none';
            currentViewingUser = null;
        }
        
        function closeFollowersModal() {
            document.getElementById('followersModal').style.display = 'none';
        }
        
        function closeFollowingModal() {
            document.getElementById('followingModal').style.display = 'none';
        }

        // ============ 退出登录 ============
        function logout() {
            localStorage.removeItem('currentUser');
            window.location.href = 'login.html';
        }

        // ============ 辅助函数 ============
        function formatTime(timestamp) {
            const date = new Date(timestamp);
            const now = new Date();
            const diff = Math.floor((now - date) / 1000 / 60);
            
            if (diff < 1) return '剛剛';
            if (diff < 60) return diff + '分鐘前';
            if (diff < 1440) return Math.floor(diff / 60) + '小時前';
            return `${date.getMonth()+1}月${date.getDate()}日`;
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // ============ 定时刷新 ============
        setInterval(() => {
            const sevenDaysAgo = new Date();
            sevenDaysAgo.setDate(sevenDaysAgo.getDate() - 7);
            posts = posts.filter(p => new Date(p.created_at) > sevenDaysAgo);
            localStorage.setItem('posts', JSON.stringify(posts));
            
            if (currentPanel === 'home') {
                loadHomePosts();
            } else if (currentPanel === 'notifications') {
                loadNotificationsList();
            }
            updateNotifBadge();
        }, 30000);

        // ============ 初始化 ============
        initPage();
    </script>
</body>
