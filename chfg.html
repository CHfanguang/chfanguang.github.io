<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CHFG社区 · 首頁</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", sans-serif;
            background: #0a0a0f;
            min-height: 100vh;
            padding-bottom: 70px;
            position: relative;
        }
        
        /* 星空背景 */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: radial-gradient(2px 2px at 15px 60px, #fff, rgba(0,0,0,0)),
                        radial-gradient(2px 2px at 72px 150px, #fff, rgba(0,0,0,0)),
                        radial-gradient(2px 2px at 145px 280px, #ffd700, rgba(0,0,0,0)),
                        radial-gradient(2px 2px at 220px 90px, #fff, rgba(0,0,0,0)),
                        radial-gradient(3px 3px at 350px 190px, #87ceeb, rgba(0,0,0,0)),
                        radial-gradient(2px 2px at 410px 310px, #fff, rgba(0,0,0,0)),
                        radial-gradient(3px 3px at 520px 130px, #ffd700, rgba(0,0,0,0)),
                        radial-gradient(2px 2px at 680px 250px, #fff, rgba(0,0,0,0)),
                        radial-gradient(2px 2px at 750px 380px, #87ceeb, rgba(0,0,0,0)),
                        radial-gradient(3px 3px at 820px 90px, #fff, rgba(0,0,0,0));
            background-size: 200px 200px;
            background-repeat: repeat;
            opacity: 0.6;
            animation: stars 180s linear infinite;
            pointer-events: none;
        }
        
        @keyframes stars {
            from { transform: translateY(0) translateX(0); }
            to { transform: translateY(-1000px) translateX(200px); }
        }
        
        /* 吸頂欄 */
        .top-bar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 60px;
            background: rgba(20, 20, 30, 0.8);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255,255,255,0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        
        .rainbow-text {
            font-size: 24px;
            font-weight: 800;
            background: linear-gradient(90deg, #4285F4, #9B51E0, #34A853, #EA4335, #FBBC05, #FF6B35);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        
        /* 主要內容 */
        .container {
            max-width: 600px;
            margin: 0 auto;
            padding: 80px 16px 20px;
            position: relative;
            z-index: 10;
        }
        
        /* 用戶卡片 - 新設計 */
        .profile-card {
            background: rgba(30, 30, 40, 0.6);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 20px;
        }
        
        .profile-header {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 15px;
        }
        
        .avatar-container {
            position: relative;
            width: 70px;
            height: 70px;
        }
        
        .profile-avatar {
            width: 70px;
            height: 70px;
            border-radius: 35px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 28px;
            font-weight: 600;
            cursor: pointer;
            object-fit: cover;
        }
        
        .avatar-upload {
            position: absolute;
            bottom: 0;
            right: 0;
            width: 24px;
            height: 24px;
            background: #667eea;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 14px;
            cursor: pointer;
            border: 2px solid rgba(255,255,255,0.2);
        }
        
        .profile-info h3 {
            font-size: 18px;
            color: white;
            margin-bottom: 4px;
        }
        
        /* 統計數字 */
        .stats-row {
            display: flex;
            justify-content: space-around;
            padding: 15px 0;
            border-top: 1px solid rgba(255,255,255,0.1);
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        
        .stat-block {
            text-align: center;
            cursor: pointer;
        }
        
        .stat-number {
            font-size: 20px;
            font-weight: 600;
            color: white;
        }
        
        .stat-label {
            font-size: 13px;
            color: #a0a0b0;
            margin-top: 4px;
        }
        
        /* 面板切換 */
        .panel {
            display: none;
        }
        
        .panel.active {
            display: block;
        }
        
        /* 帖子列表 */
        .feed {
            background: rgba(30, 30, 40, 0.6);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 20px;
            padding: 20px;
        }
        
        .feed-title {
            font-size: 16px;
            color: #a0a0b0;
            margin-bottom: 16px;
            padding-bottom: 8px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        
        .post-item {
            padding: 16px 0;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        
        .post-item:last-child {
            border-bottom: none;
        }
        
        .post-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }
        
        .post-author {
            font-weight: 600;
            color: white;
            display: flex;
            align-items: center;
            gap: 6px;
            cursor: pointer;
        }
        
        .post-author-badge {
            font-size: 10px;
            padding: 2px 8px;
            background: rgba(255,255,255,0.1);
            border-radius: 12px;
            color: #a0a0b0;
        }
        
        .post-time {
            font-size: 12px;
            color: #6a6a7a;
        }
        
        .post-content {
            font-size: 15px;
            color: #d0d0e0;
            line-height: 1.6;
            margin-bottom: 12px;
            white-space: pre-wrap;
        }
        
        .post-stats {
            display: flex;
            gap: 16px;
            color: #a0a0b0;
            font-size: 13px;
            margin-bottom: 10px;
        }
        
        .post-actions {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        
        .action-btn {
            padding: 6px 16px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 20px;
            color: #a0a0b0;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .action-btn:hover {
            background: rgba(255,255,255,0.1);
        }
        
        .action-btn.liked {
            background: #EA4335;
            border-color: #EA4335;
            color: white;
        }
        
        .action-btn.following {
            background: #34A853;
            border-color: #34A853;
            color: white;
        }
        
        .action-btn.danger {
            border-color: #EA4335;
            color: #EA4335;
        }
        
        .action-btn.danger:hover {
            background: #EA4335;
            color: white;
        }
        
        /* 通知列表 */
        .notification-item {
            padding: 16px 0;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            cursor: pointer;
        }
        
        .notification-item:last-child {
            border-bottom: none;
        }
        
        .notification-content {
            color: #d0d0e0;
            font-size: 15px;
            margin-bottom: 8px;
        }
        
        .notification-time {
            font-size: 12px;
            color: #6a6a7a;
        }
        
        /* 个人主页 */
        .profile-section {
            background: rgba(255,255,255,0.05);
            border-radius: 15px;
            padding: 15px;
            margin-bottom: 20px;
        }
        
        .profile-section h4 {
            color: white;
            margin-bottom: 15px;
            font-size: 16px;
        }
        
        .danger-btn {
            width: 100%;
            padding: 12px;
            background: rgba(234, 67, 53, 0.2);
            border: 1px solid #EA4335;
            border-radius: 10px;
            color: #EA4335;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
        }
        
        /* 管理面板 */
        .admin-section {
            background: rgba(255,255,255,0.05);
            border-radius: 15px;
            padding: 15px;
            margin-bottom: 20px;
        }
        
        .admin-section h4 {
            color: white;
            margin-bottom: 15px;
            font-size: 16px;
        }
        
        .admin-stats {
            display: flex;
            gap: 20px;
            justify-content: space-around;
            margin-bottom: 20px;
        }
        
        .admin-stat-item {
            text-align: center;
        }
        
        .admin-stat-value {
            font-size: 28px;
            font-weight: 600;
            color: #667eea;
        }
        
        .admin-stat-label {
            font-size: 13px;
            color: #a0a0b0;
        }
        
        .reported-item {
            padding: 12px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        
        .reported-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
        }
        
        .reported-type {
            font-size: 12px;
            padding: 2px 8px;
            background: rgba(234, 67, 53, 0.2);
            border-radius: 10px;
            color: #EA4335;
        }
        
        .reported-content {
            color: #d0d0e0;
            font-size: 14px;
            margin-bottom: 8px;
        }
        
        .reported-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .reported-action {
            display: flex;
            gap: 10px;
        }
        
        .ban-btn {
            padding: 4px 12px;
            background: rgba(234, 67, 53, 0.2);
            border: 1px solid #EA4335;
            border-radius: 15px;
            color: #EA4335;
            font-size: 12px;
            cursor: pointer;
        }
        
        .ignore-btn {
            padding: 4px 12px;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 15px;
            color: #a0a0b0;
            font-size: 12px;
            cursor: pointer;
        }
        
        .announcement-input {
            width: 100%;
            padding: 12px;
            background: rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 10px;
            color: white;
            margin-bottom: 10px;
        }
        
        .announcement-btn {
            width: 100%;
            padding: 10px;
            background: #667eea;
            border: none;
            border-radius: 10px;
            color: white;
            font-weight: 600;
            cursor: pointer;
        }
        
        .search-input {
            width: 100%;
            padding: 12px;
            background: rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 10px;
            color: white;
            margin-bottom: 15px;
        }
        
        .user-list {
            max-height: 200px;
            overflow-y: auto;
        }
        
        .user-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        
        .user-item:last-child {
            border-bottom: none;
        }
        
        .user-info-small {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        
        .user-name {
            color: white;
            font-weight: 500;
        }
        
        .user-email {
            font-size: 12px;
            color: #a0a0b0;
        }
        
        .empty-state {
            text-align: center;
            color: #6a6a7a;
            padding: 40px;
        }
        
        .hidden {
            display: none !important;
        }
    </style>
</head>
<body>
    <div class="top-bar">
        <span class="rainbow-text">CHFG社区</span>
    </div>

    <div class="container">
        <!-- 用戶卡片（所有面板共用）- 新設計 -->
        <div class="profile-card">
            <div class="profile-header">
                <div class="avatar-container">
                    <img id="profileAvatar" class="profile-avatar" src="" alt="avatar" style="display: none;">
                    <div id="profileAvatarText" class="profile-avatar"></div>
                    <input type="file" id="avatarUpload" accept="image/*" style="display: none;">
                    <div class="avatar-upload" onclick="document.getElementById('avatarUpload').click()">✏️</div>
                </div>
                <div class="profile-info">
                    <h3 id="userName"></h3>
                    <span class="user-badge" id="userRole"></span>
                </div>
            </div>
            
            <div class="stats-row">
                <div class="stat-block" onclick="showUserPosts(currentUser.username)">
                    <div class="stat-number" id="userPostCount">0</div>
                    <div class="stat-label">帖子</div>
                </div>
                <div class="stat-block" onclick="showFollowers()">
                    <div class="stat-number" id="userFollowerCount">0</div>
                    <div class="stat-label">粉絲</div>
                </div>
                <div class="stat-block" onclick="showFollowing()">
                    <div class="stat-number" id="userFollowingCount">0</div>
                    <div class="stat-label">關注</div>
                </div>
            </div>
        </div>

        <!-- 面板切換區域 -->
        <div id="homePanel" class="panel active">
            <!-- 首頁內容 - 帖子列表 -->
            <div class="feed">
                <div class="feed-title">✨ 最新動態</div>
                <div id="postsList"></div>
            </div>
        </div>

        <div id="notificationsPanel" class="panel">
            <!-- 通知內容 -->
            <div class="feed">
                <div class="feed-title">🔔 通知中心</div>
                <div id="notificationsList"></div>
            </div>
        </div>

        <div id="profilePanel" class="panel">
            <!-- 個人主頁內容 -->
            <div class="profile-section">
                <h4>我的帖子</h4>
                <div id="myPostsList"></div>
            </div>
            
            <div class="profile-section">
                <h4>我的關注</h4>
                <div id="myFollowingList"></div>
            </div>
            
            <button class="danger-btn" onclick="logout()">退出登錄</button>
        </div>

        <div id="adminPanel" class="panel">
            <!-- 管理面板 - 僅社區長可見 -->
            <div class="admin-section">
                <h4>社區統計</h4>
                <div class="admin-stats">
                    <div class="admin-stat-item">
                        <div class="admin-stat-value" id="totalUsers">0</div>
                        <div class="admin-stat-label">總人數</div>
                    </div>
                    <div class="admin-stat-item">
                        <div class="admin-stat-value" id="adminCount">0</div>
                        <div class="admin-stat-label">管理組</div>
                    </div>
                </div>
            </div>
            
            <div class="admin-section">
                <h4>發布置頂公告</h4>
                <textarea class="announcement-input" id="announcementContent" placeholder="請輸入公告內容..." rows="3"></textarea>
                <button class="announcement-btn" onclick="postAnnouncement()">發布公告</button>
            </div>
            
            <div class="admin-section">
                <h4>被舉報的內容</h4>
                <div id="reportedList" class="user-list"></div>
            </div>
            
            <div class="admin-section">
                <h4>封禁用戶</h4>
                <input type="text" class="search-input" id="banSearch" placeholder="搜索用戶名...">
                <div id="banUserList" class="user-list"></div>
            </div>
        </div>
    </div>
<!-- 底部导航栏 -->
<div class="bottom-nav">
    <div class="nav-item active" onclick="switchPanel('home')">
        <div class="nav-icon">🏠</div>
        <div class="nav-text">首頁</div>
    </div>
    <div class="nav-item" onclick="switchPanel('notifications')">
        <div class="nav-icon">🔔</div>
        <div class="nav-text">通知</div>
        <span class="nav-badge hidden" id="notifBadge">0</span>
    </div>
    <div class="nav-item" onclick="openPostModal()">
        <div class="nav-icon">✏️</div>
        <div class="nav-text">發布</div>
    </div>
    <div class="nav-item" onclick="switchPanel('profile')">
        <div class="nav-icon">👤</div>
        <div class="nav-text">我的</div>
    </div>
    <div class="nav-item hidden" id="adminNavItem" onclick="switchPanel('admin')">
        <div class="nav-icon">⚡</div>
        <div class="nav-text">管理</div>
    </div>
</div>

<!-- 發布貼文彈窗 -->
<div id="postModal" class="modal">
    <div class="modal-content">
        <h3 style="color: white; margin-bottom: 15px;">發布新貼文</h3>
        <textarea class="modal-input" id="postContent" placeholder="分享你的想法..." rows="4"></textarea>
        <div class="modal-buttons">
            <button class="modal-btn cancel" onclick="closePostModal()">取消</button>
            <button class="modal-btn confirm" onclick="submitPost()">發布</button>
        </div>
    </div>
</div>

<!-- 用戶資料卡彈窗（查看他人） -->
<div id="userProfileModal" class="modal">
    <div class="modal-content" style="max-width: 500px;">
        <div style="display: flex; align-items: center; gap: 15px; margin-bottom: 20px;">
            <div class="modal-avatar" id="modalUserAvatar"></div>
            <div>
                <h3 id="modalUserName" style="color: white; margin-bottom: 5px;"></h3>
                <span class="user-badge" id="modalUserRole"></span>
            </div>
        </div>
        
        <div class="stats-row" style="margin-bottom: 20px;">
            <div class="stat-block">
                <div class="stat-number" id="modalPostCount">0</div>
                <div class="stat-label">帖子</div>
            </div>
            <div class="stat-block">
                <div class="stat-number" id="modalFollowerCount">0</div>
                <div class="stat-label">粉絲</div>
            </div>
            <div class="stat-block">
                <div class="stat-number" id="modalFollowingCount">0</div>
                <div class="stat-label">關注</div>
            </div>
        </div>
        
        <div style="display: flex; gap: 10px; margin-bottom: 20px;">
            <button class="action-btn" style="flex: 1;" id="modalFollowBtn" onclick="handleFollow()"></button>
        </div>
        
        <h4 style="color: white; margin-bottom: 15px;">TA的動態</h4>
        <div id="modalUserPosts" style="max-height: 300px; overflow-y: auto;"></div>
        
        <div class="modal-buttons" style="margin-top: 20px;">
            <button class="modal-btn cancel" onclick="closeUserModal()">關閉</button>
        </div>
    </div>
</div>

<!-- 粉絲列表彈窗 -->
<div id="followersModal" class="modal">
    <div class="modal-content">
        <h3 style="color: white; margin-bottom: 15px;">粉絲列表</h3>
        <div id="followersList" style="max-height: 400px; overflow-y: auto;"></div>
        <div class="modal-buttons">
            <button class="modal-btn cancel" onclick="closeFollowersModal()">關閉</button>
        </div>
    </div>
</div>

<!-- 關注列表彈窗 -->
<div id="followingModal" class="modal">
    <div class="modal-content">
        <h3 style="color: white; margin-bottom: 15px;">關注列表</h3>
        <div id="followingList" style="max-height: 400px; overflow-y: auto;"></div>
        <div class="modal-buttons">
            <button class="modal-btn cancel" onclick="closeFollowingModal()">關閉</button>
        </div>
    </div>
</div>

<style>
    /* 底部导航栏 */
    .bottom-nav {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        height: 70px;
        background: rgba(20, 20, 30, 0.8);
        backdrop-filter: blur(15px);
        border-top: 1px solid rgba(255,255,255,0.1);
        display: flex;
        justify-content: space-around;
        align-items: center;
        z-index: 1000;
    }
    
    .nav-item {
        position: relative;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 4px;
        padding: 8px 12px;
        border-radius: 12px;
        cursor: pointer;
        transition: all 0.3s;
    }
    
    .nav-item.active {
        background: rgba(102, 126, 234, 0.2);
    }
    
    .nav-item.active .nav-icon,
    .nav-item.active .nav-text {
        color: #667eea;
    }
    
    .nav-icon {
        font-size: 22px;
        color: #a0a0b0;
    }
    
    .nav-text {
        font-size: 12px;
        color: #a0a0b0;
    }
    
    .nav-badge {
        position: absolute;
        top: 0;
        right: 0;
        min-width: 18px;
        height: 18px;
        background: #EA4335;
        border-radius: 9px;
        color: white;
        font-size: 11px;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 0 4px;
    }
    
    /* 弹窗 */
    .modal {
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background: rgba(0,0,0,0.7);
        backdrop-filter: blur(5px);
        align-items: center;
        justify-content: center;
        z-index: 2000;
    }
    
    .modal-content {
        width: 90%;
        max-width: 400px;
        background: rgba(30, 30, 40, 0.9);
        backdrop-filter: blur(15px);
        border: 1px solid rgba(255,255,255,0.1);
        border-radius: 20px;
        padding: 25px;
    }
    
    .modal-input {
        width: 100%;
        padding: 12px;
        background: rgba(0,0,0,0.3);
        border: 1px solid rgba(255,255,255,0.1);
        border-radius: 12px;
        color: white;
        font-size: 15px;
        margin: 15px 0;
        resize: vertical;
    }
    
    .modal-input:focus {
        outline: none;
        border-color: #667eea;
    }
    
    .modal-buttons {
        display: flex;
        gap: 10px;
        justify-content: flex-end;
    }
    
    .modal-btn {
        padding: 10px 20px;
        border: none;
        border-radius: 10px;
        font-size: 14px;
        cursor: pointer;

<script>
    // ============ 数据初始化 ============
    let currentUser = JSON.parse(localStorage.getItem('currentUser'));
    let users = JSON.parse(localStorage.getItem('users') || '[]');
    let posts = JSON.parse(localStorage.getItem('posts') || '[]');
    let follows = JSON.parse(localStorage.getItem('follows') || '[]');
    let likes = JSON.parse(localStorage.getItem('likes') || '[]');
    let notifications = JSON.parse(localStorage.getItem('notifications') || '[]');
    let reports = JSON.parse(localStorage.getItem('reports') || '[]');
    let announcements = JSON.parse(localStorage.getItem('announcements') || '[]');
    let userAvatars = JSON.parse(localStorage.getItem('userAvatars') || '{}');
    
    // 检查登录状态
    if (!currentUser) {
        window.location.href = 'login.html';
    }

    // 社区长专属邮箱
    const LEADER_EMAIL = 'chfanguang@outlook.com';

    // ============ DOM 元素 ============
    const userNameEl = document.getElementById('userName');
    const profileAvatar = document.getElementById('profileAvatar');
    const profileAvatarText = document.getElementById('profileAvatarText');
    const userRoleEl = document.getElementById('userRole');
    const adminNavItem = document.getElementById('adminNavItem');
    const notifBadge = document.getElementById('notifBadge');
    
    // ============ 当前面板 ============
    let currentPanel = 'home';
    let currentViewingUser = null;

    // ============ 初始化用户信息 ============
    function initUserInfo() {
        userNameEl.textContent = currentUser.username;
        
        // 头像处理
        if (userAvatars[currentUser.username]) {
            profileAvatar.src = userAvatars[currentUser.username];
            profileAvatar.style.display = 'block';
            profileAvatarText.style.display = 'none';
        } else {
            profileAvatar.style.display = 'none';
            profileAvatarText.style.display = 'flex';
            profileAvatarText.textContent = currentUser.username.charAt(0).toUpperCase();
        }
        
        let roleText = '一般用戶';
        userRoleEl.className = 'user-badge';
        
        if (currentUser.role === 'admin') {
            roleText = '管理員';
            userRoleEl.classList.add('admin');
        } else if (currentUser.role === 'community_leader') {
            roleText = '社區長';
            userRoleEl.classList.add('leader');
            adminNavItem.classList.remove('hidden');
        }
        userRoleEl.textContent = roleText;
        
        updateUserStats();
        updateNotifBadge();
    }

    // ============ 头像上传 ============
    document.getElementById('avatarUpload').addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (file) {
            const reader = new FileReader();
            reader.onload = function(e) {
                userAvatars[currentUser.username] = e.target.result;
                localStorage.setItem('userAvatars', JSON.stringify(userAvatars));
                
                profileAvatar.src = e.target.result;
                profileAvatar.style.display = 'block';
                profileAvatarText.style.display = 'none';
            };
            reader.readAsDataURL(file);
        }
    });

    // ============ 更新用户统计 ============
    function updateUserStats() {
        const myPosts = posts.filter(p => p.username === currentUser.username);
        const myFollowers = follows.filter(f => f.followed === currentUser.username);
        const myFollowing = follows.filter(f => f.follower === currentUser.username);
        
        document.getElementById('userPostCount').textContent = myPosts.length;
        document.getElementById('userFollowerCount').textContent = myFollowers.length;
        document.getElementById('userFollowingCount').textContent = myFollowing.length;
    }

    // ============ 更新通知角标 ============
    function updateNotifBadge() {
        const unread = notifications.filter(n => n.username === currentUser.username && !n.read).length;
        if (unread > 0) {
            notifBadge.textContent = unread;
            notifBadge.classList.remove('hidden');
        } else {
            notifBadge.classList.add('hidden');
        }
    }

    // ============ 面板切换 ============
    function switchPanel(panel) {
        document.querySelectorAll('.nav-item').forEach(item => {
            item.classList.remove('active');
        });
        event.currentTarget.classList.add('active');
        
        document.querySelectorAll('.panel').forEach(p => {
            p.classList.remove('active');
        });
        
        currentPanel = panel;
        document.getElementById(panel + 'Panel').classList.add('active');
        
        if (panel === 'notifications') {
            loadNotifications();
        } else if (panel === 'profile') {
            loadProfile();
        } else if (panel === 'admin' && currentUser.role === 'community_leader') {
            loadAdminPanel();
        }
    }

    // ============ 发布弹窗 ============
    function openPostModal() {
        document.getElementById('postModal').style.display = 'flex';
    }
    
    function closePostModal() {
        document.getElementById('postModal').style.display = 'none';
        document.getElementById('postContent').value = '';
    }
    
    function submitPost() {
        const content = document.getElementById('postContent').value.trim();
        if (!content) {
            alert('請輸入內容');
            return;
        }
        
        const newPost = {
            id: Date.now(),
            username: currentUser.username,
            content: content,
            likes: 0,
            created_at: new Date().toISOString()
        };
        
        posts.push(newPost);
        localStorage.setItem('posts', JSON.stringify(posts));
        
        closePostModal();
        loadPosts();
        updateUserStats();
    }

    // ============ 加载帖子 ============
    function loadPosts() {
        const sevenDaysAgo = new Date();
        sevenDaysAgo.setDate(sevenDaysAgo.getDate() - 7);
        
        // 合并公告和普通帖子
        let allPosts = [...posts];
        announcements.forEach(a => {
            allPosts.push({
                id: a.id,
                username: '📢 公告',
                content: a.content,
                isAnnouncement: true,
                created_at: a.created_at
            });
        });
        
        const recentPosts = allPosts
            .filter(p => new Date(p.created_at) > sevenDaysAgo)
            .sort((a, b) => new Date(b.created_at) - new Date(a.created_at));
        
        const postsList = document.getElementById('postsList');
        
        if (recentPosts.length === 0) {
            postsList.innerHTML = '<div class="empty-state">✨ 尚無貼文，來發布第一條吧～</div>';
            return;
        }
        
        postsList.innerHTML = recentPosts.map(post => {
            if (post.isAnnouncement) {
                return `
                <div class="post-item" style="background: rgba(251, 188, 5, 0.1); border-radius: 10px; padding: 15px;">
                    <div class="post-header">
                        <div class="post-author" style="color: #FBBC05;">
                            📢 ${post.username}
                        </div>
                        <div class="post-time">${formatTime(post.created_at)}</div>
                    </div>
                    <div class="post-content" style="color: #FBBC05;">${escapeHtml(post.content)}</div>
                </div>
            `;
            }
            
            const user = users.find(u => u.username === post.username);
            const hasLiked = likes.some(l => l.username === currentUser.username && l.post_id === post.id);
            const isFollowed = follows.some(f => f.follower === currentUser.username && f.followed === post.username);
            const canDelete = (currentUser.role === 'community_leader' || currentUser.role === 'admin') && post.username !== currentUser.username;
            
            let roleBadge = '';
            if (user?.role === 'community_leader') {
                roleBadge = '<span class="post-author-badge">社區長</span>';
            } else if (user?.role === 'admin') {
                roleBadge = '<span class="post-author-badge">管理員</span>';
            }
            
            return `
            <div class="post-item">
                <div class="post-header">
                    <div class="post-author" onclick="viewUserProfile('${post.username}')">
                        ${post.username} ${roleBadge}
                    </div>
                    <div class="post-time">${formatTime(post.created_at)}</div>
                </div>
                <div class="post-content">${escapeHtml(post.content)}</div>
                <div class="post-stats">
                    <span>❤️ ${post.likes}</span>
                </div>
                <div class="post-actions">
                    ${post.username !== currentUser.username ? `
                        <button class="action-btn ${hasLiked ? 'liked' : ''}" onclick="toggleLike(${post.id})">
                            ${hasLiked ? '已按讚' : '按讚'}
                        </button>
                        <button class="action-btn ${isFollowed ? 'following' : ''}" onclick="toggleFollow('${post.username}')">
                            ${isFollowed ? '取消關注' : '關注'}
                        </button>
                        <button class="action-btn" onclick="reportPost('${post.id}', '${post.username}')">舉報</button>
                    ` : ''}
                    ${canDelete ? `
                        <button class="action-btn danger" onclick="deletePost(${post.id})">刪除</button>
                    ` : ''}
                </div>
            </div>
        `}).join('');
    }
// ============ 点赞功能 ============
function toggleLike(postId) {
    const existing = likes.find(l => l.username === currentUser.username && l.post_id === postId);
    const post = posts.find(p => p.id === postId);
    
    if (existing) {
        const index = likes.findIndex(l => l.username === currentUser.username && l.post_id === postId);
        likes.splice(index, 1);
        post.likes--;
    } else {
        likes.push({
            username: currentUser.username,
            post_id: postId,
            created_at: new Date().toISOString()
        });
        post.likes++;
    }
    
    localStorage.setItem('likes', JSON.stringify(likes));
    localStorage.setItem('posts', JSON.stringify(posts));
    loadPosts();
}

// ============ 关注/取消关注 ============
function toggleFollow(targetUsername) {
    const existing = follows.find(f => f.follower === currentUser.username && f.followed === targetUsername);
    
    if (existing) {
        const index = follows.findIndex(f => f.follower === currentUser.username && f.followed === targetUsername);
        follows.splice(index, 1);
    } else {
        follows.push({
            follower: currentUser.username,
            followed: targetUsername,
            created_at: new Date().toISOString()
        });
        
        // 发送通知
        notifications.push({
            id: Date.now(),
            username: targetUsername,
            type: 'follow',
            content: `用戶 ${currentUser.username} 關注了你`,
            read: false,
            created_at: new Date().toISOString()
        });
        localStorage.setItem('notifications', JSON.stringify(notifications));
    }
    
    localStorage.setItem('follows', JSON.stringify(follows));
    
    if (currentViewingUser) {
        viewUserProfile(currentViewingUser);
    }
    loadPosts();
    updateUserStats();
}

// ============ 举报帖子 ============
function reportPost(postId, reportedUser) {
    const reason = prompt('請輸入舉報原因：');
    if (!reason) return;
    
    reports.push({
        id: Date.now(),
        post_id: postId,
        reported_user: reportedUser,
        reporter: currentUser.username,
        reason: reason,
        status: 'pending',
        created_at: new Date().toISOString()
    });
    
    localStorage.setItem('reports', JSON.stringify(reports));
    
    // 通知社区长
    const leader = users.find(u => u.email === LEADER_EMAIL);
    if (leader) {
        notifications.push({
            id: Date.now(),
            username: leader.username,
            type: 'report',
            content: `用戶 ${currentUser.username} 舉報了 ${reportedUser}：${reason}`,
            read: false,
            created_at: new Date().toISOString()
        });
        localStorage.setItem('notifications', JSON.stringify(notifications));
    }
    
    alert('舉報已提交');
}

// ============ 删除帖子 ============
function deletePost(postId) {
    if (!confirm('確定要刪除這篇貼文嗎？')) return;
    
    const index = posts.findIndex(p => p.id === postId);
    if (index !== -1) {
        const post = posts[index];
        posts.splice(index, 1);
        localStorage.setItem('posts', JSON.stringify(posts));
        
        // 如果不是自己的帖子，通知作者
        if (post.username !== currentUser.username) {
            notifications.push({
                id: Date.now(),
                username: post.username,
                type: 'system',
                content: `你的貼文已被管理員刪除`,
                read: false,
                created_at: new Date().toISOString()
            });
            localStorage.setItem('notifications', JSON.stringify(notifications));
        }
        
        loadPosts();
        updateUserStats();
    }
}

// ============ 查看用户资料 ============
function viewUserProfile(username) {
    currentViewingUser = username;
    const user = users.find(u => u.username === username);
    
    document.getElementById('modalUserName').textContent = username;
    
    // 头像
    const modalAvatar = document.getElementById('modalUserAvatar');
    if (userAvatars[username]) {
        modalAvatar.style.backgroundImage = `url(${userAvatars[username]})`;
        modalAvatar.style.backgroundSize = 'cover';
        modalAvatar.textContent = '';
    } else {
        modalAvatar.style.backgroundImage = '';
        modalAvatar.textContent = username.charAt(0).toUpperCase();
    }
    
    // 角色
    let roleText = '一般用戶';
    if (user?.role === 'admin') roleText = '管理員';
    if (user?.role === 'community_leader') roleText = '社區長';
    document.getElementById('modalUserRole').textContent = roleText;
    
    // 统计
    const userPosts = posts.filter(p => p.username === username);
    const userFollowers = follows.filter(f => f.followed === username);
    const userFollowing = follows.filter(f => f.follower === username);
    
    document.getElementById('modalPostCount').textContent = userPosts.length;
    document.getElementById('modalFollowerCount').textContent = userFollowers.length;
    document.getElementById('modalFollowingCount').textContent = userFollowing.length;
    
    // 关注按钮
    const followBtn = document.getElementById('modalFollowBtn');
    if (username === currentUser.username) {
        followBtn.style.display = 'none';
    } else {
        followBtn.style.display = 'block';
        const isFollowed = follows.some(f => f.follower === currentUser.username && f.followed === username);
        const isFollowedBy = follows.some(f => f.follower === username && f.followed === currentUser.username);
        
        if (isFollowed && isFollowedBy) {
            followBtn.textContent = '互相關注';
            followBtn.classList.add('following');
        } else if (isFollowed) {
            followBtn.textContent = '取消關注';
            followBtn.classList.add('following');
        } else if (isFollowedBy) {
            followBtn.textContent = '回粉';
            followBtn.classList.add('following');
        } else {
            followBtn.textContent = '關注';
            followBtn.classList.remove('following');
        }
    }
    
    // 加载用户帖子
    const modalPosts = document.getElementById('modalUserPosts');
    if (userPosts.length === 0) {
        modalPosts.innerHTML = '<div class="empty-state">暫無貼文</div>';
    } else {
        modalPosts.innerHTML = userPosts.slice(0, 5).map(post => `
            <div class="post-item" style="border: none; padding: 10px 0;">
                <div class="post-content">${escapeHtml(post.content)}</div>
                <div class="post-time">${formatTime(post.created_at)}</div>
            </div>
        `).join('');
    }
    
    document.getElementById('userProfileModal').style.display = 'flex';
}

// ============ 处理关注（从弹窗） ============
function handleFollow() {
    toggleFollow(currentViewingUser);
    viewUserProfile(currentViewingUser);
}

// ============ 显示粉丝列表 ============
function showFollowers() {
    const followers = follows.filter(f => f.followed === currentUser.username);
    const list = document.getElementById('followersList');
    
    if (followers.length === 0) {
        list.innerHTML = '<div class="empty-state">暫無粉絲</div>';
    } else {
        list.innerHTML = followers.map(f => {
            const user = users.find(u => u.username === f.follower);
            const isFollowing = follows.some(f2 => f2.follower === currentUser.username && f2.followed === f.follower);
            return `
            <div class="user-item">
                <div class="user-info-small">
                    <span class="user-name">${f.follower}</span>
                    <span class="user-email">${user?.email || ''}</span>
                </div>
                <button class="action-btn ${isFollowing ? 'following' : ''}" onclick="toggleFollow('${f.follower}')">
                    ${isFollowing ? '取消關注' : '回粉'}
                </button>
            </div>
        `}).join('');
    }
    
    document.getElementById('followersModal').style.display = 'flex';
}

// ============ 显示关注列表 ============
function showFollowing() {
    const following = follows.filter(f => f.follower === currentUser.username);
    const list = document.getElementById('followingList');
    
    if (following.length === 0) {
        list.innerHTML = '<div class="empty-state">暫無關注</div>';
    } else {
        list.innerHTML = following.map(f => {
            const user = users.find(u => u.username === f.followed);
            return `
            <div class="user-item">
                <div class="user-info-small">
                    <span class="user-name">${f.followed}</span>
                    <span class="user-email">${user?.email || ''}</span>
                </div>
                <button class="action-btn following" onclick="toggleFollow('${f.followed}')">取消關注</button>
            </div>
        `}).join('');
    }
    
    document.getElementById('followingModal').style.display = 'flex';
}
        // ============ 加载通知 ============
        function loadNotifications() {
            const userNotifs = notifications
                .filter(n => n.username === currentUser.username)
                .sort((a, b) => new Date(b.created_at) - new Date(a.created_at));
            
            const list = document.getElementById('notificationsList');
            
            if (userNotifs.length === 0) {
                list.innerHTML = '<div class="empty-state">📭 暫無通知</div>';
                return;
            }
            
            list.innerHTML = userNotifs.map(n => `
                <div class="notification-item" onclick="markNotificationRead(${n.id})">
                    <div class="notification-content">${n.content}</div>
                    <div class="notification-time">${formatTime(n.created_at)}</div>
                </div>
            `).join('');
        }

        // ============ 标记通知已读 ============
        function markNotificationRead(id) {
            const notif = notifications.find(n => n.id === id);
            if (notif) {
                notif.read = true;
                localStorage.setItem('notifications', JSON.stringify(notifications));
                updateNotifBadge();
                loadNotifications();
            }
        }

        // ============ 加载个人主页 ============
        function loadProfile() {
            const myPosts = posts.filter(p => p.username === currentUser.username);
            
            // 我的帖子

                myPostsList.innerHTML = '<div class="empty-state">暫無貼文</div>';
            } else {

                    <div class="post-item">
                        <div class="post-content">${escapeHtml(post.content)}</div>
                        <div class="post-time">${formatTime(post.created_at)}</div>

                `}).join('');

        // ============ 加载管理面板（社区长专用） ============
        function loadAdminPanel() {
            if (currentUser.role !== 'community_leader') return;
            
            // 统计
            document.getElementById('totalUsers').textContent = users.length;
            const adminCount = users.filter(u => u.role === 'admin' || u.role === 'community_leader').length;
            document.getElementById('adminCount').textContent = adminCount;
            
            // 被举报内容

        // ============ 发布公告 ============
        function postAnnouncement() {
            const content = document.getElementById('announcementContent').value.trim();
            if (!content) {
                alert('請輸入公告內容');
                return;
            }
            
            announcements.push({
                id: Date.now(),
                content: content,
                created_at: new Date().toISOString()
            });
            
            localStorage.setItem('announcements', JSON.stringify(announcements));
            
            document.getElementById('announcementContent').value = '';
            alert('公告已發布');
            
            if (currentPanel === 'home') {
                loadPosts();
            }
        }

        // ============ 封禁用户 ============
        function banUser(username) {
            if (!confirm(`確定要封禁用戶 ${username} 嗎？`)) return;
            
            const user = users.find(u => u.username === username);
            if (user) {
                user.banned = 1;
                localStorage.setItem('users', JSON.stringify(users));
                
                // 删除该用户的所有帖子
                posts = posts.filter(p => p.username !== username);
                localStorage.setItem('posts', JSON.stringify(posts));
                
                alert(`用戶 ${username} 已封禁`);
                loadAdminPanel();
            }
        }

        // ============ 忽略举报 ============
        function ignoreReport(reportId) {
            const report = reports.find(r => r.id === reportId);
            if (report) {
                report.status = 'ignored';
                localStorage.setItem('reports', JSON.stringify(reports));
                loadAdminPanel();
            }
        }

        // ============ 加载封禁用户列表 ============
        function loadBanUserList() {
            const normalUsers = users.filter(u => u.role === 'user' && !u.banned);
            const list = document.getElementById('banUserList');
            
            if (normalUsers.length === 0) {
                list.innerHTML = '<div class="empty-state">無可用用戶</div>';
                return;
            }
            
            list.innerHTML = normalUsers.map(user => `
                <div class="user-item">
                    <div class="user-info-small">
                        <span class="user-name">${user.username}</span>
                        <span class="user-email">${user.email}</span>
                    </div>
                    <button class="ban-btn" onclick="banUser('${user.username}')">封禁</button>
                </div>
            `).join('');
        }

        // ============ 搜索封禁用户 ============
        document.getElementById('banSearch')?.addEventListener('input', function(e) {
            const searchTerm = e.target.value.toLowerCase();
            const filtered = users.filter(u => 
                u.role === 'user' && !u.banned && (
                    u.username.toLowerCase().includes(searchTerm) || 
                    u.email.toLowerCase().includes(searchTerm)
                )
            );
            
            const list = document.getElementById('banUserList');
            if (filtered.length === 0) {
                list.innerHTML = '<div class="empty-state">未找到用戶</div>';
                return;
            }
            
            list.innerHTML = filtered.map(user => `
                <div class="user-item">
                    <div class="user-info-small">
                        <span class="user-name">${user.username}</span>
                        <span class="user-email">${user.email}</span>
                    </div>
                    <button class="ban-btn" onclick="banUser('${user.username}')">封禁</button>
                </div>
            `).join('');
        });

        // ============ 关闭弹窗 ============
        function closeUserModal() {
            document.getElementById('userProfileModal').style.display = 'none';
            currentViewingUser = null;
        }
        
        function closeFollowersModal() {
            document.getElementById('followersModal').style.display = 'none';
        }
        
        function closeFollowingModal() {
            document.getElementById('followingModal').style.display = 'none';
        }

        // ============ 退出登录 ============
        function logout() {
            localStorage.removeItem('currentUser');
            window.location.href = 'login.html';
        }

        // ============ 辅助函数 ============
        function formatTime(timestamp) {
            const date = new Date(timestamp);
            const now = new Date();
            const diff = Math.floor((now - date) / 1000 / 60);
            
            if (diff < 1) return '剛剛';
            if (diff < 60) return diff + '分鐘前';
            if (diff < 1440) return Math.floor(diff / 60) + '小時前';
            return `${date.getMonth()+1}月${date.getDate()}日`;
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // ============ 定时刷新 ============
        setInterval(() => {
            const sevenDaysAgo = new Date();
            sevenDaysAgo.setDate(sevenDaysAgo.getDate() - 7);
            posts = posts.filter(p => new Date(p.created_at) > sevenDaysAgo);
            localStorage.setItem('posts', JSON.stringify(posts));
            
            if (currentPanel === 'home') {
                loadPosts();
            } else if (currentPanel === 'notifications') {
                loadNotifications();
            } else if (currentPanel === 'profile') {
                loadProfile();
            } else if (currentPanel === 'admin' && currentUser.role === 'community_leader') {
                loadAdminPanel();
            }
            updateUserStats();
            updateNotifBadge();
        }, 30000);

        // ============ 初始化 ============
        initUserInfo();
        loadPosts();
    </script>
</body>
</html>
