<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CHFG社区</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", sans-serif;
            background: #0a0a0f;
            min-height: 100vh;
            padding-bottom: 70px;
            position: relative;
            color: white;
        }
        
        /* 星空背景 */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: radial-gradient(2px 2px at 15px 60px, #fff, rgba(0,0,0,0)),
                        radial-gradient(2px 2px at 72px 150px, #fff, rgba(0,0,0,0)),
                        radial-gradient(2px 2px at 145px 280px, #ffd700, rgba(0,0,0,0)),
                        radial-gradient(2px 2px at 220px 90px, #fff, rgba(0,0,0,0)),
                        radial-gradient(3px 3px at 350px 190px, #87ceeb, rgba(0,0,0,0)),
                        radial-gradient(2px 2px at 410px 310px, #fff, rgba(0,0,0,0)),
                        radial-gradient(3px 3px at 520px 130px, #ffd700, rgba(0,0,0,0)),
                        radial-gradient(2px 2px at 680px 250px, #fff, rgba(0,0,0,0)),
                        radial-gradient(2px 2px at 750px 380px, #87ceeb, rgba(0,0,0,0)),
                        radial-gradient(3px 3px at 820px 90px, #fff, rgba(0,0,0,0));
            background-size: 200px 200px;
            background-repeat: repeat;
            opacity: 0.6;
            animation: stars 180s linear infinite;
            pointer-events: none;
        }
        
        @keyframes stars {
            from { transform: translateY(0) translateX(0); }
            to { transform: translateY(-1000px) translateX(200px); }
        }
        
        /* 吸顶栏 */
        .top-bar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 60px;
            background: rgba(20, 20, 30, 0.8);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255,255,255,0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        
        .rainbow-text {
            font-size: 24px;
            font-weight: 800;
            background: linear-gradient(90deg, #4285F4, #9B51E0, #34A853, #EA4335, #FBBC05, #FF6B35);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        
        .container {
            max-width: 600px;
            margin: 0 auto;
            padding: 80px 16px 20px;
            position: relative;
            z-index: 10;
        }
        
        /* 底部导航栏 */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: 70px;
            background: rgba(20, 20, 30, 0.8);
            backdrop-filter: blur(15px);
            border-top: 1px solid rgba(255,255,255,0.1);
            display: flex;
            justify-content: space-around;
            align-items: center;
            z-index: 1000;
        }
        
        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            padding: 8px 12px;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .nav-item.active {
            background: rgba(102, 126, 234, 0.2);
        }
        
        .nav-item.active .nav-icon,
        .nav-item.active .nav-text {
            color: #667eea;
        }
        
        .nav-icon {
            font-size: 22px;
            color: #a0a0b0;
        }
        
        .nav-text {
            font-size: 12px;
            color: #a0a0b0;
        }
        
        .hidden {
            display: none !important;
        }
        
        /* 面板切换 */
        .panel {
            display: none;
        }
        
        .panel.active {
            display: block;
        }
        
        /* 卡片样式 */
        .card {
            background: rgba(30, 30, 40, 0.6);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 20px;
            padding: 25px;
            margin-bottom: 20px;
        }
        
        .card-title {
            color: white;
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 20px;
        }
        
        /* 表单样式 */
        .form-group {
            margin-bottom: 15px;
        }
        
        input, textarea, select {
            width: 100%;
            padding: 12px 15px;
            background: rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 10px;
            color: white;
            font-size: 15px;
        }
        
        input:focus, textarea:focus {
            outline: none;
            border-color: #667eea;
        }
        
        .btn {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            border-radius: 10px;
            color: white;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-bottom: 10px;
        }
        
        .btn-small {
            padding: 8px 16px;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 20px;
            color: white;
            font-size: 13px;
            cursor: pointer;
        }
        
        /* 帖子样式 */
        .post-item {
            padding: 15px 0;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        
        .post-item:last-child {
            border-bottom: none;
        }
        
        .post-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }
        
        .post-author {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .post-author-name {
            color: #667eea;
            font-weight: 600;
            cursor: pointer;
        }
        
        .post-verified {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 18px;
            height: 18px;
            background: #1DA1F2;
            border-radius: 50%;
            color: white;
            font-size: 11px;
        }
        
        .post-time {
            color: #6a6a7a;
            font-size: 12px;
        }
        
        .post-content {
            color: #e0e0e0;
            font-size: 15px;
            line-height: 1.6;
            margin: 10px 0;
            white-space: pre-wrap;
        }
        
        .post-actions {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        
        .action-btn {
            padding: 5px 15px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 15px;
            color: #a0a0b0;
            font-size: 12px;
            cursor: pointer;
        }
        
        .action-btn.liked {
            background: #EA4335;
            border-color: #EA4335;
            color: white;
        }
        
        .action-btn.following {
            background: #34A853;
            border-color: #34A853;
            color: white;
        }
        
        /* 用户列表样式 */
        .user-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        
        .user-item:last-child {
            border-bottom: none;
        }
        
        .user-info {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .user-avatar {
            width: 40px;
            height: 40px;
            border-radius: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            object-fit: cover;
        }
        
        .user-details {
            display: flex;
            flex-direction: column;
        }
        
        .user-name {
            display: flex;
            align-items: center;
            gap: 5px;
        }
        
        /* 头像上传 */
        .avatar-container {
            position: relative;
            width: 80px;
            height: 80px;
            margin: 0 auto 15px;
            cursor: pointer;
        }
        
        .profile-avatar {
            width: 80px;
            height: 80px;
            border-radius: 40px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            font-weight: 600;
            object-fit: cover;
        }
        
        .avatar-upload {
            position: absolute;
            bottom: 0;
            right: 0;
            width: 28px;
            height: 28px;
            background: #667eea;
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 14px;
            cursor: pointer;
            border: 2px solid rgba(255,255,255,0.2);
        }
        
        /* 状态提示 */
        .status-bar {
            text-align: center;
            padding: 10px;
            background: rgba(102, 126, 234, 0.2);
            border-radius: 10px;
            margin-bottom: 20px;
            font-size: 14px;
            transition: opacity 0.5s;
        }
        
        .status-bar.hidden {
            opacity: 0;
            pointer-events: none;
        }
        
        .empty-state {
            text-align: center;
            color: #6a6a7a;
            padding: 40px;
        }
        
        /* 管理面板专用样式 */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-bottom: 20px;
        }
        
        .stat-card {
            background: rgba(255,255,255,0.05);
            border-radius: 10px;
            padding: 15px;
            text-align: center;
        }
        
        .stat-value {
            font-size: 24px;
            font-weight: 600;
            color: #667eea;
        }
        
        .stat-label {
            font-size: 12px;
            color: #a0a0b0;
            margin-top: 5px;
        }
        
        .admin-section {
            margin-bottom: 25px;
        }
        
        .admin-section-title {
            font-size: 16px;
            font-weight: 600;
            color: white;
            margin-bottom: 15px;
            padding-bottom: 5px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        
        .reported-item {
            background: rgba(234, 67, 53, 0.1);
            border: 1px solid #EA4335;
            border-radius: 10px;
            padding: 12px;
            margin-bottom: 10px;
        }
        
        .reported-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }
        
        .reported-user {
            font-weight: 600;
            color: #EA4335;
        }
        
        .reported-reason {
            color: #e0e0e0;
            font-size: 14px;
            margin-bottom: 8px;
        }
        
        .reported-actions {
            display: flex;
            gap: 10px;
        }
        
        .badge {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 11px;
        }
        
        .badge.admin {
            background: #EA4335;
            color: white;
        }
        
        .badge.leader {
            background: #FBBC05;
            color: black;
        }
        
        .badge.user {
            background: #34A853;
            color: white;
        }
    </style>
</head>
<body>
    <div class="top-bar">
        <span class="rainbow-text">CHFG社区</span>
    </div>

    <div class="container">
        <!-- 状态栏（5秒后自动隐藏） -->
        <div class="status-bar" id="statusBar">
            🌍 正在连接 IPFS 网络...
        </div>

        <!-- 首页面板 -->
        <div id="homePanel" class="panel active">
            <div class="card">
                <div class="card-title">📢 最新动态</div>
                <div id="postsList"></div>
            </div>
        </div>

        <!-- 登录/注册面板 -->
        <div id="loginPanel" class="panel">
            <div class="card">
                <div class="card-title">🔑 登录 / 注册</div>
                <div class="form-group">
                    <input type="text" id="loginUsername" placeholder="用户名">
                </div>
                <div class="form-group">
                    <input type="email" id="loginEmail" placeholder="邮箱">
                </div>
                <div class="form-group">
                    <input type="password" id="loginPassword" placeholder="密码">
                </div>
                <button class="btn" onclick="register()">注册</button>
                <button class="btn" onclick="login()" style="background: #34A853;">登录</button>
                <div id="loginMessage" style="color: #EA4335; text-align: center; margin-top: 10px;"></div>
            </div>
        </div>

        <!-- 发布面板 -->
        <div id="postPanel" class="panel">
            <div class="card">
                <div class="card-title">✏️ 发布新帖</div>
                <div class="form-group">
                    <textarea id="postContent" rows="5" placeholder="分享你的想法..."></textarea>
                </div>
                <button class="btn" onclick="createPost()">发布</button>
                <div id="postMessage" style="color: #34A853; text-align: center; margin-top: 10px;"></div>
            </div>
        </div>

        <!-- 个人面板 -->
        <div id="profilePanel" class="panel">
            <div class="card">
                <div class="card-title">👤 个人主页</div>
                <div id="profileInfo"></div>
            </div>
            <div class="card" id="myPostsCard">
                <div class="card-title">📝 我的帖子</div>
                <div id="myPostsList"></div>
            </div>
            <div class="card" id="myFollowsCard">
                <div class="card-title">👥 我的关注</div>
                <div id="myFollowsList"></div>
            </div>
        </div>

        <!-- 管理面板（仅社区长可见）- 增强版 -->
        <div id="adminPanel" class="panel">
            <div class="card">
                <div class="card-title">⚡ 管理面板</div>
                
                <!-- 统计卡片 -->
                <div class="stats-grid">
                    <div class="stat-card">
                        <div class="stat-value" id="totalUsers">0</div>
                        <div class="stat-label">总用户</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value" id="totalPosts">0</div>
                        <div class="stat-label">总帖子</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value" id="totalAdmins">0</div>
                        <div class="stat-label">管理员</div>
                    </div>
                </div>

                <!-- 待处理举报 -->
                <div class="admin-section">
                    <div class="admin-section-title">🚨 待处理举报</div>
                    <div id="reportsList"></div>
                </div>

                <!-- 用户管理 -->
                <div class="admin-section">
                    <div class="admin-section-title">👥 用户管理</div>
                    <div class="form-group">
                        <input type="text" id="searchUser" placeholder="搜索用户...">
                    </div>
                    <div id="userList"></div>
                </div>

                <!-- 社区长管理 -->
                <div class="admin-section">
                    <div class="admin-section-title">👑 社区长管理</div>
                    <div id="leaderList"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- 底部导航栏 -->
    <div class="bottom-nav">
        <div class="nav-item active" onclick="switchPanel('home')">
            <div class="nav-icon">🏠</div>
            <div class="nav-text">首页</div>
        </div>
        <div class="nav-item" id="loginNavItem" onclick="switchPanel('login')">
            <div class="nav-icon">🔑</div>
            <div class="nav-text">登录</div>
        </div>
        <div class="nav-item" onclick="switchPanel('post')">
            <div class="nav-icon">✏️</div>
            <div class="nav-text">发布</div>
        </div>
        <div class="nav-item" onclick="switchPanel('profile')">
            <div class="nav-icon">👤</div>
            <div class="nav-text">我的</div>
        </div>
        <div class="nav-item hidden" id="adminNavItem" onclick="switchPanel('admin')">
            <div class="nav-icon">⚡</div>
            <div class="nav-text">管理</div>
        </div>
    </div>
<script>
    // ============ IPFS 配置 ============
    const IPFS_GATEWAY = 'https://ipfs.io/ipfs/';
    const WEB3_STORAGE = 'https://api.web3.storage/upload';
    
    // ============ 数据存储 ============
    let currentUser = null;
    let allUsers = [];
    let allPosts = [];
    let allFollows = [];
    let allLikes = [];
    let allReports = [];
    let userAvatars = {};
    
    const DATA_HASH_KEY = 'chfg_data_hash_v3';
    let currentDataHash = localStorage.getItem(DATA_HASH_KEY);
    let statusTimeout;

    // ============ 初始化 ============
    async function init() {
        updateStatus('🌍 正在连接 IPFS 网络...');
        
        // 先加载数据
        if (currentDataHash) {
            await loadFromIPFS(currentDataHash);
        } else {
            allUsers = [];
            allPosts = [];
            allFollows = [];
            allLikes = [];
            allReports = [];
            userAvatars = {};
            await saveToIPFS();
        }
        
        // 从 localStorage 读取已登录用户（必须在数据加载之后）
        const savedUser = localStorage.getItem('currentUser');
        if (savedUser) {
            try {
                const parsedUser = JSON.parse(savedUser);
                // 验证用户是否还存在
                const existingUser = allUsers.find(u => u.email === parsedUser.email);
                if (existingUser) {
                    currentUser = existingUser;
                    localStorage.setItem('currentUser', JSON.stringify(existingUser));
                } else {
                    localStorage.removeItem('currentUser');
                }
            } catch (e) {
                localStorage.removeItem('currentUser');
            }
        }
        
        updateStatus('✅ 数据加载完成');
        
        // 5秒后隐藏状态栏
        statusTimeout = setTimeout(() => {
            document.getElementById('statusBar').classList.add('hidden');
        }, 5000);
        
        // 如果已登录，更新UI
        if (currentUser) {
            document.getElementById('loginNavItem').classList.add('hidden');
            if (currentUser.role === 'community_leader') {
                document.getElementById('adminNavItem').classList.remove('hidden');
            }
        }
        
        switchPanel('home');
    }

    // ============ 更新状态栏 ============
    function updateStatus(msg) {
        const statusBar = document.getElementById('statusBar');
        statusBar.textContent = msg;
        statusBar.classList.remove('hidden');
        
        if (statusTimeout) clearTimeout(statusTimeout);
        statusTimeout = setTimeout(() => {
            statusBar.classList.add('hidden');
        }, 5000);
    }

    // ============ 保存到 IPFS ============
    async function saveToIPFS() {
        const data = {
            users: allUsers,
            posts: allPosts,
            follows: allFollows,
            likes: allLikes,
            reports: allReports,
            avatars: userAvatars,
            timestamp: new Date().toISOString()
        };
        
        const jsonString = JSON.stringify(data);
        const blob = new Blob([jsonString], { type: 'application/json' });
        
        localStorage.setItem('chfg_backup', jsonString);
        
        const formData = new FormData();
        formData.append('file', blob, 'data.json');
        
        try {
            updateStatus('📤 正在保存数据...');
            
            const response = await fetch(WEB3_STORAGE, {
                method: 'POST',
                body: formData,
                headers: { 'Accept': 'application/json' }
            });
            
            const result = await response.json();
            const cid = result.cid;
            
            currentDataHash = cid;
            localStorage.setItem(DATA_HASH_KEY, cid);
            updateStatus('✅ 数据已保存');
            return cid;
        } catch (error) {
            console.error('保存失败:', error);
            updateStatus('⚠️ 使用本地存储');
            return null;
        }
    }

    // ============ 从 IPFS 加载 ============
    async function loadFromIPFS(hash) {
        try {
            updateStatus('📥 正在加载数据...');
            
            const response = await fetch(IPFS_GATEWAY + hash);
            const data = await response.json();
            
            allUsers = data.users || [];
            allPosts = data.posts || [];
            allFollows = data.follows || [];
            allLikes = data.likes || [];
            allReports = data.reports || [];
            userAvatars = data.avatars || {};
            
            updateStatus('✅ 数据加载成功');
        } catch (error) {
            console.error('加载失败:', error);
            
            const backup = localStorage.getItem('chfg_backup');
            if (backup) {
                const data = JSON.parse(backup);
                allUsers = data.users || [];
                allPosts = data.posts || [];
                allFollows = data.follows || [];
                allLikes = data.likes || [];
                allReports = data.reports || [];
                userAvatars = data.avatars || {};
                updateStatus('⚠️ 使用本地备份');
            }
        }
    }

    // ============ 切换面板 ============
    function switchPanel(panel) {
        document.querySelectorAll('.nav-item').forEach(item => {
            item.classList.remove('active');
        });
        event.currentTarget.classList.add('active');
        
        document.querySelectorAll('.panel').forEach(p => {
            p.classList.remove('active');
        });
        document.getElementById(panel + 'Panel').classList.add('active');
        
        if (panel === 'home') {
            loadHomePanel();
        } else if (panel === 'profile') {
            loadProfilePanel();
        } else if (panel === 'admin' && currentUser?.role === 'community_leader') {
            loadAdminPanel();
        }
    }

    // ============ 加载首页面板 ============
    function loadHomePanel() {
        const container = document.getElementById('postsList');
        
        // 直接显示暂无，不诱导发布
        if (allPosts.length === 0) {
            container.innerHTML = '<div class="empty-state">暂无帖子</div>';
            return;
        }
        
        const sevenDaysAgo = new Date();
        sevenDaysAgo.setDate(sevenDaysAgo.getDate() - 7);
        
        const recentPosts = allPosts
            .filter(p => new Date(p.created_at) > sevenDaysAgo)
            .sort((a, b) => new Date(b.created_at) - new Date(a.created_at));
        
        if (recentPosts.length === 0) {
            container.innerHTML = '<div class="empty-state">暂无帖子</div>';
            return;
        }
        
        container.innerHTML = recentPosts.map(post => {
            const user = allUsers.find(u => u.username === post.username);
            const isVerified = (user?.role === 'admin' || user?.role === 'community_leader');
            const hasLiked = currentUser && allLikes.some(l => l.username === currentUser.username && l.postId === post.id);
            const isFollowed = currentUser && allFollows.some(f => f.follower === currentUser.username && f.followed === post.username);
            const avatar = userAvatars[post.username];
            
            return `
            <div class="post-item">
                <div class="post-header">
                    <div class="post-author">
                        ${avatar ? `<img src="${avatar}" style="width:24px; height:24px; border-radius:12px; object-fit:cover;">` : ''}
                        <span class="post-author-name" onclick="viewUserProfile('${post.username}')">${post.username}</span>
                        ${isVerified ? '<span class="post-verified">✓</span>' : ''}
                        ${user?.role === 'community_leader' ? '<span style="color:#FBBC05; font-size:11px; margin-left:5px;">社区长</span>' : ''}
                        ${user?.role === 'admin' ? '<span style="color:#EA4335; font-size:11px; margin-left:5px;">管理员</span>' : ''}
                    </div>
                    <div class="post-time">${formatTime(post.created_at)}</div>
                </div>
                <div class="post-content">${escapeHtml(post.content)}</div>
                <div class="post-actions">
                    ${currentUser ? `
                        <button class="action-btn ${hasLiked ? 'liked' : ''}" onclick="toggleLike(${post.id})">
                            ${hasLiked ? '已赞' : '点赞'} (${post.likes})
                        </button>
                    ` : ''}
                    ${currentUser && post.username !== currentUser.username ? `
                        <button class="action-btn ${isFollowed ? 'following' : ''}" onclick="toggleFollow('${post.username}')">
                            ${isFollowed ? '取消关注' : '关注'}
                        </button>
                    ` : ''}
                    ${currentUser && (currentUser.role === 'admin' || currentUser.role === 'community_leader') && post.username !== currentUser.username ? `
                        <button class="action-btn" style="border-color:#EA4335; color:#EA4335;" onclick="deletePost(${post.id})">删除</button>
                        <button class="action-btn" style="border-color:#FBBC05; color:#FBBC05;" onclick="reportPost('${post.id}', '${post.username}')">举报</button>
                    ` : ''}
                </div>
            </div>
        `}).join('');
    }

    // ============ 注册 ============
    async function register() {
        const username = document.getElementById('loginUsername').value.trim();
        const email = document.getElementById('loginEmail').value.trim();
        const password = document.getElementById('loginPassword').value.trim();
        
        if (!username || !email || !password) {
            document.getElementById('loginMessage').textContent = '请填写所有字段';
            return;
        }
        
        if (allUsers.find(u => u.email === email)) {
            document.getElementById('loginMessage').textContent = '邮箱已注册';
            return;
        }
        
        const role = email === 'chfanguang@outlook.com' ? 'community_leader' : 'user';
        
        const newUser = {
            id: Date.now(),
            username,
            email,
            password,
            role,
            created_at: new Date().toISOString()
        };
        
        allUsers.push(newUser);
        await saveToIPFS();
        
        currentUser = newUser;
        localStorage.setItem('currentUser', JSON.stringify(newUser));
        
        document.getElementById('loginMessage').style.color = '#34A853';
        document.getElementById('loginMessage').textContent = '注册成功！';
        
        document.getElementById('loginNavItem').classList.add('hidden');
        
        if (role === 'community_leader') {
            document.getElementById('adminNavItem').classList.remove('hidden');
        }
        
        setTimeout(() => switchPanel('home'), 1000);
    }

    // ============ 登录 ============
    async function login() {
        const email = document.getElementById('loginEmail').value.trim();
        const password = document.getElementById('loginPassword').value.trim();
        
        const user = allUsers.find(u => u.email === email && u.password === password);
        
        if (!user) {
            document.getElementById('loginMessage').textContent = '邮箱或密码错误';
            return;
        }
        
        currentUser = user;
        localStorage.setItem('currentUser', JSON.stringify(user));
        
        document.getElementById('loginMessage').style.color = '#34A853';
        document.getElementById('loginMessage').textContent = '登录成功！';
        
        document.getElementById('loginNavItem').classList.add('hidden');
        
        if (user.role === 'community_leader') {
            document.getElementById('adminNavItem').classList.remove('hidden');
        }
        
        setTimeout(() => switchPanel('home'), 1000);
    }

    // ============ 退出登录 ============
    function logout() {
        localStorage.removeItem('currentUser');
        currentUser = null;
        document.getElementById('loginNavItem').classList.remove('hidden');
        document.getElementById('adminNavItem').classList.add('hidden');
        switchPanel('home');
        loadHomePanel();
    }

    // ============ 发布帖子 ============
    async function createPost() {
        if (!currentUser) {
            document.getElementById('postMessage').textContent = '请先登录';
            return;
        }
        
        const content = document.getElementById('postContent').value.trim();
        if (!content) return;
        
        const newPost = {
            id: Date.now(),
            username: currentUser.username,
            userRole: currentUser.role,
            content: content,
            likes: 0,
            created_at: new Date().toISOString()
        };
        
        allPosts.unshift(newPost);
        await saveToIPFS();
        
        document.getElementById('postContent').value = '';
        document.getElementById('postMessage').textContent = '发布成功！';
        
        setTimeout(() => switchPanel('home'), 1000);
    }

    // ============ 点赞 ============
    async function toggleLike(postId) {
        if (!currentUser) {
            alert('请先登录');
            return;
        }
        
        const existing = allLikes.find(l => l.username === currentUser.username && l.postId === postId);
        const post = allPosts.find(p => p.id === postId);
        
        if (existing) {
            const index = allLikes.findIndex(l => l.username === currentUser.username && l.postId === postId);
            allLikes.splice(index, 1);
            post.likes--;
        } else {
            allLikes.push({
                username: currentUser.username,
                postId: postId,
                created_at: new Date().toISOString()
            });
            post.likes++;
        }
        
        await saveToIPFS();
        loadHomePanel();
    }

    // ============ 关注/取消关注 ============
    async function toggleFollow(targetUsername) {
        if (!currentUser) {
            alert('请先登录');
            return;
        }
        
        const existing = allFollows.find(f => f.follower === currentUser.username && f.followed === targetUsername);
        
        if (existing) {
            const index = allFollows.findIndex(f => f.follower === currentUser.username && f.followed === targetUsername);
            allFollows.splice(index, 1);
        } else {
            allFollows.push({
                follower: currentUser.username,
                followed: targetUsername,
                created_at: new Date().toISOString()
            });
        }
        
        await saveToIPFS();
        loadHomePanel();
    }
        // ============ 举报帖子 ============
        async function reportPost(postId, reportedUser) {
            if (!currentUser) {
                alert('请先登录');
                return;
            }
            
            const reason = prompt('请输入举报原因：');
            if (!reason) return;
            
            const newReport = {
                id: Date.now(),
                postId: postId,
                reportedUser: reportedUser,
                reporter: currentUser.username,
                reason: reason,
                status: 'pending',
                created_at: new Date().toISOString()
            };
            
            allReports.push(newReport);
            await saveToIPFS();
            alert('举报已提交');
        }

        // ============ 删除帖子 ============
        async function deletePost(postId) {
            if (!confirm('确定要删除这个帖子吗？')) return;
            
            const index = allPosts.findIndex(p => p.id === postId);
            if (index !== -1) {
                allPosts.splice(index, 1);
                await saveToIPFS();
                loadHomePanel();
            }
        }

        // ============ 头像上传 ============
        function setupAvatarUpload() {
            const input = document.createElement('input');
            input.type = 'file';
            input.accept = 'image/*';
            input.onchange = async (e) => {
                const file = e.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onload = async (e) => {
                        userAvatars[currentUser.username] = e.target.result;
                        await saveToIPFS();
                        loadProfilePanel();
                    };
                    reader.readAsDataURL(file);
                }
            };
            input.click();
        }

        // ============ 加载个人主页面板 ============
        function loadProfilePanel() {
            if (!currentUser) {
                document.getElementById('profileInfo').innerHTML = '<p style="color: #a0a0b0; text-align: center;">请先登录</p>';
                document.getElementById('myPostsCard').style.display = 'none';
                document.getElementById('myFollowsCard').style.display = 'none';
                return;
            }
            
            document.getElementById('myPostsCard').style.display = 'block';
            document.getElementById('myFollowsCard').style.display = 'block';
            
            const avatar = userAvatars[currentUser.username];
            
            document.getElementById('profileInfo').innerHTML = `
                <div style="text-align: center;">
                    <div class="avatar-container" onclick="setupAvatarUpload()">
                        ${avatar ? 
                            `<img src="${avatar}" class="profile-avatar" style="width:80px; height:80px; border-radius:40px; object-fit:cover;">` : 
                            `<div class="profile-avatar">${currentUser.username.charAt(0).toUpperCase()}</div>`
                        }
                        <div class="avatar-upload">✏️</div>
                    </div>
                    <h3 style="margin-top:10px;">${currentUser.username}</h3>
                    <p style="color:#a0a0b0; font-size:14px;">${currentUser.email}</p>
                    <p style="margin-top:10px;">
                        ${currentUser.role === 'community_leader' ? '<span style="background:#FBBC05; padding:4px 12px; border-radius:20px; font-size:12px;">社区长</span>' : ''}
                        ${currentUser.role === 'admin' ? '<span style="background:#EA4335; padding:4px 12px; border-radius:20px; font-size:12px;">管理员</span>' : ''}
                    </p>
                    <button class="btn-small" onclick="logout()" style="margin-top:20px; background:#EA4335;">退出登录</button>
                </div>
            `;
            
            // 我的帖子
            const myPosts = allPosts.filter(p => p.username === currentUser.username).slice(0, 10);
            const myPostsList = document.getElementById('myPostsList');
            
            if (myPosts.length === 0) {
                myPostsList.innerHTML = '<div class="empty-state">暂无帖子</div>';
            } else {
                myPostsList.innerHTML = myPosts.map(post => `
                    <div class="post-item">
                        <div class="post-content">${escapeHtml(post.content)}</div>
                        <div class="post-time">${formatTime(post.created_at)}</div>
                    </div>
                `).join('');
            }
            
            // 我的关注
            const myFollows = allFollows.filter(f => f.follower === currentUser.username);
            const myFollowsList = document.getElementById('myFollowsList');
            
            if (myFollows.length === 0) {
                myFollowsList.innerHTML = '<div class="empty-state">暂无关注</div>';
            } else {
                myFollowsList.innerHTML = myFollows.map(f => {
                    const user = allUsers.find(u => u.username === f.followed);
                    const avatar = userAvatars[f.followed];
                    return `
                    <div class="user-item">
                        <div class="user-info">
                            ${avatar ? 
                                `<img src="${avatar}" style="width:40px; height:40px; border-radius:20px; object-fit:cover;">` : 
                                `<div class="user-avatar">${f.followed.charAt(0).toUpperCase()}</div>`
                            }
                            <div class="user-details">
                                <div class="user-name">
                                    ${f.followed}
                                    ${user?.role === 'admin' || user?.role === 'community_leader' ? '<span class="post-verified">✓</span>' : ''}
                                </div>
                                <div style="font-size:11px; color:#a0a0b0;">${user?.email || ''}</div>
                            </div>
                        </div>
                        <button class="btn-small" onclick="toggleFollow('${f.followed}')">取消关注</button>
                    </div>
                `}).join('');
            }
        }

        // ============ 加载管理面板（增强版） ============
        function loadAdminPanel() {
            if (!currentUser || currentUser.role !== 'community_leader') {
                document.getElementById('adminPanel').innerHTML = '<div class="card"><p style="color:#a0a0b0; text-align:center;">无权访问</p></div>';
                return;
            }
            
            // 更新统计
            document.getElementById('totalUsers').textContent = allUsers.length;
            document.getElementById('totalPosts').textContent = allPosts.length;
            const adminCount = allUsers.filter(u => u.role === 'admin' || u.role === 'community_leader').length;
            document.getElementById('totalAdmins').textContent = adminCount;
            
            // 加载举报列表
            loadReportsList();
            
            // 加载用户列表
            loadUserList();
            
            // 加载社区长列表
            loadLeaderList();
            
            // 搜索功能
            document.getElementById('searchUser').addEventListener('input', function(e) {
                loadUserList(e.target.value);
            });
        }

        // ============ 加载举报列表 ============
        function loadReportsList() {
            const pendingReports = allReports.filter(r => r.status === 'pending');
            const reportsList = document.getElementById('reportsList');
            
            if (pendingReports.length === 0) {
                reportsList.innerHTML = '<div class="empty-state">暂无待处理举报</div>';
                return;
            }
            
            reportsList.innerHTML = pendingReports.map(report => `
                <div class="reported-item">
                    <div class="reported-header">
                        <span class="reported-user">${report.reportedUser}</span>
                        <span class="post-time">${formatTime(report.created_at)}</span>
                    </div>
                    <div class="reported-reason">举报人：${report.reporter}</div>
                    <div class="reported-reason">原因：${report.reason}</div>
                    <div class="reported-actions">
                        <button class="btn-small" onclick="handleReport(${report.id}, 'ignore')" style="background:#34A853;">忽略</button>
                        <button class="btn-small" onclick="handleReport(${report.id}, 'ban')" style="background:#EA4335;">封禁用户</button>
                        <button class="btn-small" onclick="handleReport(${report.id}, 'delete')" style="background:#FBBC05;">删除帖子</button>
                    </div>
                </div>
            `).join('');
        }

        // ============ 处理举报 ============
        async function handleReport(reportId, action) {
            const report = allReports.find(r => r.id === reportId);
            if (!report) return;
            
            if (action === 'ban') {
                const user = allUsers.find(u => u.username === report.reportedUser);
                if (user) {
                    // 封禁用户（可以从用户列表中移除或标记）
                    allUsers = allUsers.filter(u => u.username !== report.reportedUser);
                    // 删除该用户的所有帖子
                    allPosts = allPosts.filter(p => p.username !== report.reportedUser);
                }
            } else if (action === 'delete') {
                allPosts = allPosts.filter(p => p.id !== report.postId);
            }
            
            report.status = 'processed';
            await saveToIPFS();
            loadAdminPanel();
        }

        // ============ 加载用户列表 ============
        function loadUserList(searchTerm = '') {
            let users = allUsers.filter(u => u.role === 'user');
            
            if (searchTerm) {
                users = users.filter(u => 
                    u.username.toLowerCase().includes(searchTerm.toLowerCase()) ||
                    u.email.toLowerCase().includes(searchTerm.toLowerCase())
                );
            }
            
            const userList = document.getElementById('userList');
            
            if (users.length === 0) {
                userList.innerHTML = '<div class="empty-state">暂无用户</div>';
                return;
            }
            
            userList.innerHTML = users.map(user => {
                const avatar = userAvatars[user.username];
                return `
                <div class="user-item">
                    <div class="user-info">
                        ${avatar ? 
                            `<img src="${avatar}" style="width:40px; height:40px; border-radius:20px; object-fit:cover;">` : 
                            `<div class="user-avatar">${user.username.charAt(0).toUpperCase()}</div>`
                        }
                        <div class="user-details">
                            <div class="user-name">${user.username}</div>
                            <div style="font-size:11px; color:#a0a0b0;">${user.email}</div>
                        </div>
                    </div>
                    <button class="btn-small" onclick="promoteToAdmin('${user.username}')">提升管理员</button>
                </div>
            `}).join('');
        }

        // ============ 加载社区长列表 ============
        function loadLeaderList() {
            const leaders = allUsers.filter(u => u.role === 'community_leader');
            const leaderList = document.getElementById('leaderList');
            
            if (leaders.length === 0) {
                leaderList.innerHTML = '<div class="empty-state">暂无社区长</div>';
                return;
            }
            
            leaderList.innerHTML = leaders.map(leader => {
                const avatar = userAvatars[leader.username];
                return `
                <div class="user-item">
                    <div class="user-info">
                        ${avatar ? 
                            `<img src="${avatar}" style="width:40px; height:40px; border-radius:20px; object-fit:cover;">` : 
                            `<div class="user-avatar">${leader.username.charAt(0).toUpperCase()}</div>`
                        }
                        <div class="user-details">
                            <div class="user-name">
                                ${leader.username}
                                <span class="badge leader">社区长</span>
                            </div>
                            <div style="font-size:11px; color:#a0a0b0;">${leader.email}</div>
                        </div>
                    </div>
                </div>
            `}).join('');
        }

        // ============ 提升管理员 ============
        async function promoteToAdmin(username) {
            if (!currentUser || currentUser.role !== 'community_leader') return;
            
            const user = allUsers.find(u => u.username === username);
            if (user) {
                user.role = 'admin';
                await saveToIPFS();
                loadAdminPanel();
                alert(`已将 ${username} 提升为管理员`);
            }
        }

        // ============ 查看用户资料 ============
        function viewUserProfile(username) {
            const user = allUsers.find(u => u.username === username);
            if (!user) return;
            
            const avatar = userAvatars[username];
            const userPosts = allPosts.filter(p => p.username === username).length;
            const followers = allFollows.filter(f => f.followed === username).length;
            const following = allFollows.filter(f => f.follower === username).length;
            
            alert(
                `用户：${username}\n` +
                `邮箱：${user.email}\n` +
                `角色：${user.role === 'community_leader' ? '社区长' : user.role === 'admin' ? '管理员' : '普通用户'}\n` +
                `帖子：${userPosts}\n` +
                `粉丝：${followers}\n` +
                `关注：${following}`
            );
        }

        // ============ 辅助函数 ============
        function formatTime(timestamp) {
            const date = new Date(timestamp);
            const now = new Date();
            const diff = Math.floor((now - date) / 1000 / 60);
            
            if (diff < 1) return '刚刚';
            if (diff < 60) return diff + '分钟前';
            if (diff < 1440) return Math.floor(diff / 60) + '小时前';
            return `${date.getMonth()+1}月${date.getDate()}日`;
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // ============ 定时刷新 ============
        setInterval(() => {
            if (currentDataHash) {
                loadFromIPFS(currentDataHash);
            }
            if (document.querySelector('.panel.active')?.id === 'homePanel') {
                loadHomePanel();
            }
        }, 30000);

        // ============ 初始化 ============
        init();
    </script>
</body>
</html>
