<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CHFG社区 · 去中心化版</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", sans-serif;
            background: #0a0a0f;
            min-height: 100vh;
            padding-bottom: 70px;
            position: relative;
            color: white;
        }
        
        /* 星空背景 */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: radial-gradient(2px 2px at 15px 60px, #fff, rgba(0,0,0,0)),
                        radial-gradient(2px 2px at 72px 150px, #fff, rgba(0,0,0,0)),
                        radial-gradient(2px 2px at 145px 280px, #ffd700, rgba(0,0,0,0)),
                        radial-gradient(2px 2px at 220px 90px, #fff, rgba(0,0,0,0)),
                        radial-gradient(3px 3px at 350px 190px, #87ceeb, rgba(0,0,0,0)),
                        radial-gradient(2px 2px at 410px 310px, #fff, rgba(0,0,0,0)),
                        radial-gradient(3px 3px at 520px 130px, #ffd700, rgba(0,0,0,0)),
                        radial-gradient(2px 2px at 680px 250px, #fff, rgba(0,0,0,0)),
                        radial-gradient(2px 2px at 750px 380px, #87ceeb, rgba(0,0,0,0)),
                        radial-gradient(3px 3px at 820px 90px, #fff, rgba(0,0,0,0));
            background-size: 200px 200px;
            background-repeat: repeat;
            opacity: 0.6;
            animation: stars 180s linear infinite;
            pointer-events: none;
        }
        
        @keyframes stars {
            from { transform: translateY(0) translateX(0); }
            to { transform: translateY(-1000px) translateX(200px); }
        }
        
        /* 吸顶栏 */
        .top-bar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 60px;
            background: rgba(20, 20, 30, 0.8);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255,255,255,0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        
        .rainbow-text {
            font-size: 24px;
            font-weight: 800;
            background: linear-gradient(90deg, #4285F4, #9B51E0, #34A853, #EA4335, #FBBC05, #FF6B35);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        
        .container {
            max-width: 600px;
            margin: 0 auto;
            padding: 80px 16px 20px;
            position: relative;
            z-index: 10;
        }
        
        /* 面板切换 */
        .panel {
            display: none;
        }
        
        .panel.active {
            display: block;
        }
        
        /* 卡片样式 */
        .card {
            background: rgba(30, 30, 40, 0.6);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 20px;
            padding: 25px;
            margin-bottom: 20px;
        }
        
        .card-title {
            color: white;
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 20px;
        }
        
        /* 表单样式 */
        .form-group {
            margin-bottom: 15px;
        }
        
        input, textarea, select {
            width: 100%;
            padding: 12px 15px;
            background: rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 10px;
            color: white;
            font-size: 15px;
        }
        
        input:focus, textarea:focus {
            outline: none;
            border-color: #667eea;
        }
        
        .btn {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            border-radius: 10px;
            color: white;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-bottom: 10px;
        }
        
        .btn-small {
            padding: 8px 16px;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 20px;
            color: white;
            font-size: 13px;
            cursor: pointer;
        }
        
        /* 帖子样式 */
        .post-item {
            padding: 15px 0;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        
        .post-item:last-child {
            border-bottom: none;
        }
        
        .post-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }
        
        .post-author {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .post-author-name {
            color: #667eea;
            font-weight: 600;
            cursor: pointer;
        }
        
        .post-verified {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 18px;
            height: 18px;
            background: #1DA1F2;
            border-radius: 50%;
            color: white;
            font-size: 11px;
        }
        
        .post-time {
            color: #6a6a7a;
            font-size: 12px;
        }
        
        .post-content {
            color: #e0e0e0;
            font-size: 15px;
            line-height: 1.6;
            margin: 10px 0;
            white-space: pre-wrap;
        }
        
        .post-stats {
            display: flex;
            gap: 15px;
            color: #a0a0b0;
            font-size: 13px;
            margin: 10px 0;
        }
        
        .post-actions {
            display: flex;
            gap: 10px;
        }
        
        .action-btn {
            padding: 5px 15px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 15px;
            color: #a0a0b0;
            font-size: 12px;
            cursor: pointer;
        }
        
        .action-btn.liked {
            background: #EA4335;
            border-color: #EA4335;
            color: white;
        }
        
        .action-btn.following {
            background: #34A853;
            border-color: #34A853;
            color: white;
        }
        
        /* 用户列表样式 */
        .user-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        
        .user-info {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .user-avatar {
            width: 40px;
            height: 40px;
            border-radius: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            font-weight: 600;
        }
        
        .user-details {
            display: flex;
            flex-direction: column;
        }
        
        .user-name {
            display: flex;
            align-items: center;
            gap: 5px;
        }
        
        /* 状态提示 */
        .status-bar {
            text-align: center;
            padding: 10px;
            background: rgba(102, 126, 234, 0.2);
            border-radius: 10px;
            margin-bottom: 20px;
            font-size: 14px;
        }
        
        .empty-state {
            text-align: center;
            color: #6a6a7a;
            padding: 40px;
        }
        
        .hidden {
            display: none !important;
        }
    </style>
</head>
<body>
    <div class="top-bar">
        <span class="rainbow-text">CHFG社区</span>
    </div>

    <div class="container">
        <!-- 状态栏 -->
        <div class="status-bar" id="statusBar">
            🌍 正在连接 IPFS 网络...
        </div>

        <!-- 导航栏 -->
        <div style="display: flex; gap: 10px; margin-bottom: 20px; background: rgba(0,0,0,0.2); padding: 5px; border-radius: 30px;">
            <button class="btn-small" style="flex:1;" onclick="switchPanel('home')" id="tabHome">🏠 首页</button>
            <button class="btn-small" style="flex:1;" onclick="switchPanel('login')" id="tabLogin">🔑 登录</button>
            <button class="btn-small" style="flex:1;" onclick="switchPanel('post')" id="tabPost">✏️ 发布</button>
            <button class="btn-small" style="flex:1;" onclick="switchPanel('profile')" id="tabProfile">👤 我的</button>
        </div>

        <!-- 首页面板 -->
        <div id="homePanel" class="panel active">
            <div class="card">
                <div class="card-title">📢 最新帖子</div>
                <div id="postsList"></div>
            </div>
        </div>

        <!-- 登录/注册面板 -->
        <div id="loginPanel" class="panel">
            <div class="card">
                <div class="card-title">🔑 登录 / 注册</div>
                <div class="form-group">
                    <input type="text" id="loginUsername" placeholder="用户名">
                </div>
                <div class="form-group">
                    <input type="email" id="loginEmail" placeholder="邮箱">
                </div>
                <div class="form-group">
                    <input type="password" id="loginPassword" placeholder="密码">
                </div>
                <button class="btn" onclick="register()">注册</button>
                <button class="btn" onclick="login()" style="background: #34A853;">登录</button>
                <div id="loginMessage" style="color: #EA4335; text-align: center; margin-top: 10px;"></div>
            </div>
        </div>

        <!-- 发布面板 -->
        <div id="postPanel" class="panel">
            <div class="card">
                <div class="card-title">✏️ 发布新帖</div>
                <div class="form-group">
                    <textarea id="postContent" rows="5" placeholder="分享你的想法..."></textarea>
                </div>
                <button class="btn" onclick="createPost()">发布</button>
                <div id="postMessage" style="color: #34A853; text-align: center; margin-top: 10px;"></div>
            </div>
        </div>

        <!-- 个人面板 -->
        <div id="profilePanel" class="panel">
            <div class="card">
                <div class="card-title">👤 个人主页</div>
                <div id="profileInfo">
                    <p style="color: #a0a0b0; text-align: center;">请先登录</p>
                </div>
            </div>
            <div class="card" id="myPostsCard" style="display: none;">
                <div class="card-title">📝 我的帖子</div>
                <div id="myPostsList"></div>
            </div>
            <div class="card" id="myFollowsCard" style="display: none;">
                <div class="card-title">👥 我的关注</div>
                <div id="myFollowsList"></div>
            </div>
        </div>

        <!-- 管理面板（社区长专用） -->
        <div id="adminPanel" class="panel">
            <div class="card">
                <div class="card-title">⚡ 管理面板</div>
                <div id="adminStats" style="display: flex; gap: 15px; margin-bottom: 20px;">
                    <div style="flex:1; text-align:center; background:rgba(102,126,234,0.1); padding:15px; border-radius:10px;">
                        <div style="font-size:24px; font-weight:600; color:#667eea;" id="totalUsers">0</div>
                        <div style="font-size:12px; color:#a0a0b0;">总用户</div>
                    </div>
                    <div style="flex:1; text-align:center; background:rgba(52,168,83,0.1); padding:15px; border-radius:10px;">
                        <div style="font-size:24px; font-weight:600; color:#34A853;" id="totalPosts">0</div>
                        <div style="font-size:12px; color:#a0a0b0;">总帖子</div>
                    </div>
                </div>
                <div id="adminContent"></div>
            </div>
        </div>
    </div>
<!-- 底部导航栏（移动端快速切换） -->
<div class="bottom-nav">
    <div class="nav-item active" onclick="switchPanel('home')">
        <div class="nav-icon">🏠</div>
        <div class="nav-text">首页</div>
    </div>
    <div class="nav-item" onclick="switchPanel('login')">
        <div class="nav-icon">🔑</div>
        <div class="nav-text">登录</div>
    </div>
    <div class="nav-item" onclick="switchPanel('post')">
        <div class="nav-icon">✏️</div>
        <div class="nav-text">发布</div>
    </div>
    <div class="nav-item" onclick="switchPanel('profile')">
        <div class="nav-icon">👤</div>
        <div class="nav-text">我的</div>
    </div>
    <div class="nav-item hidden" id="adminNavItem" onclick="switchPanel('admin')">
        <div class="nav-icon">⚡</div>
        <div class="nav-text">管理</div>
    </div>
</div>

<style>
    /* 底部导航栏 */
    .bottom-nav {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        height: 70px;
        background: rgba(20, 20, 30, 0.8);
        backdrop-filter: blur(15px);
        border-top: 1px solid rgba(255,255,255,0.1);
        display: flex;
        justify-content: space-around;
        align-items: center;
        z-index: 1000;
    }
    
    .nav-item {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 4px;
        padding: 8px 12px;
        border-radius: 12px;
        cursor: pointer;
        transition: all 0.3s;
    }
    
    .nav-item.active {
        background: rgba(102, 126, 234, 0.2);
    }
    
    .nav-item.active .nav-icon,
    .nav-item.active .nav-text {
        color: #667eea;
    }
    
    .nav-icon {
        font-size: 22px;
        color: #a0a0b0;
    }
    
    .nav-text {
        font-size: 12px;
        color: #a0a0b0;
    }
    
    .hidden {
        display: none !important;
    }
</style>

<script>
    // ============ IPFS 配置 ============
    const IPFS_GATEWAY = 'https://ipfs.io/ipfs/';
    const WEB3_STORAGE = 'https://api.web3.storage/upload';
    
    // ============ 数据存储 ============
    let currentUser = null;
    let allUsers = [];
    let allPosts = [];
    let allFollows = [];
    let allLikes = [];
    
    const DATA_HASH_KEY = 'chfg_data_hash_v2';
    let currentDataHash = localStorage.getItem(DATA_HASH_KEY);

    // ============ 初始化 ============
    async function init() {
        updateStatus('🌍 正在连接 IPFS 网络...');
        
        if (currentDataHash) {
            await loadFromIPFS(currentDataHash);
        } else {
            // 首次使用，创建初始数据
            allUsers = [];
            allPosts = [];
            allFollows = [];
            allLikes = [];
            await saveToIPFS();
        }
        
        updateStatus('✅ 已连接到 IPFS 网络');
        
        // 检查URL参数
        checkUrlParams();
        
        // 默认显示首页
        switchPanel('home');
    }

    // ============ 检查URL参数（用于分享） ============
    function checkUrlParams() {
        const params = new URLSearchParams(window.location.search);
        const postId = params.get('post');
        const user = params.get('user');
        
        if (postId) {
            // 可以跳转到指定帖子
            console.log('查看帖子:', postId);
        }
    }

    // ============ 更新状态栏 ============
    function updateStatus(msg) {
        document.getElementById('statusBar').textContent = msg;
    }

    // ============ 保存到 IPFS ============
    async function saveToIPFS() {
        const data = {
            users: allUsers,
            posts: allPosts,
            follows: allFollows,
            likes: allLikes,
            timestamp: new Date().toISOString()
        };
        
        const jsonString = JSON.stringify(data);
        const blob = new Blob([jsonString], { type: 'application/json' });
        
        // 保存到本地作为备份
        localStorage.setItem('chfg_backup_data', jsonString);
        
        const formData = new FormData();
        formData.append('file', blob, 'data.json');
        
        try {
            updateStatus('📤 正在保存数据到 IPFS...');
            
            const response = await fetch(WEB3_STORAGE, {
                method: 'POST',
                body: formData,
                headers: {
                    'Accept': 'application/json',
                }
            });
            
            const result = await response.json();
            const cid = result.cid;
            
            currentDataHash = cid;
            localStorage.setItem(DATA_HASH_KEY, cid);
            
            updateStatus('✅ 数据已保存，CID: ' + cid.slice(0, 8) + '...');
            return cid;
        } catch (error) {
            console.error('保存到 IPFS 失败:', error);
            updateStatus('⚠️ 使用本地备份模式');
            return null;
        }
    }

    // ============ 从 IPFS 加载 ============
    async function loadFromIPFS(hash) {
        try {
            updateStatus('📥 正在从 IPFS 加载数据...');
            
            const response = await fetch(IPFS_GATEWAY + hash);
            const data = await response.json();
            
            allUsers = data.users || [];
            allPosts = data.posts || [];
            allFollows = data.follows || [];
            allLikes = data.likes || [];
            
            updateStatus('✅ 数据加载成功');
        } catch (error) {
            console.error('从 IPFS 加载失败:', error);
            
            // 从本地备份加载
            const backup = localStorage.getItem('chfg_backup_data');
            if (backup) {
                const data = JSON.parse(backup);
                allUsers = data.users || [];
                allPosts = data.posts || [];
                allFollows = data.follows || [];
                allLikes = data.likes || [];
                updateStatus('⚠️ 使用本地备份数据');
            } else {
                updateStatus('❌ 加载失败，请刷新重试');
            }
        }
    }

    // ============ 切换面板 ============
    function switchPanel(panel) {
        // 更新导航栏样式
        document.querySelectorAll('.nav-item').forEach(item => {
            item.classList.remove('active');
        });
        event.currentTarget.classList.add('active');
        
        document.querySelectorAll('.panel').forEach(p => {
            p.classList.remove('active');
        });
        document.getElementById(panel + 'Panel').classList.add('active');
        
        // 根据面板加载数据
        if (panel === 'home') {
            loadPosts();
        } else if (panel === 'profile' && currentUser) {
            loadProfile();
        } else if (panel === 'admin' && currentUser?.role === 'community_leader') {
            loadAdminPanel();
        }
    }

    // ============ 注册 ============
    async function register() {
        const username = document.getElementById('loginUsername').value.trim();
        const email = document.getElementById('loginEmail').value.trim();
        const password = document.getElementById('loginPassword').value.trim();
        
        if (!username || !email || !password) {
            document.getElementById('loginMessage').textContent = '请填写所有字段';
            return;
        }
        
        // 检查用户是否存在
        if (allUsers.find(u => u.email === email)) {
            document.getElementById('loginMessage').textContent = '邮箱已注册';
            return;
        }
        
        // 判断角色
        const role = email === 'chfanguang@outlook.com' ? 'community_leader' : 'user';
        
        // 创建用户
        const newUser = {
            id: Date.now(),
            username,
            email,
            password,
            role,
            created_at: new Date().toISOString()
        };
        
        allUsers.push(newUser);
        await saveToIPFS();
        
        currentUser = newUser;
        document.getElementById('loginMessage').style.color = '#34A853';
        document.getElementById('loginMessage').textContent = '注册成功！';
        
        // 更新导航栏
        document.getElementById('tabLogin').innerHTML = '👤 ' + username;
        
        setTimeout(() => switchPanel('home'), 1000);
    }

    // ============ 登录 ============
    async function login() {
        const email = document.getElementById('loginEmail').value.trim();
        const password = document.getElementById('loginPassword').value.trim();
        
        const user = allUsers.find(u => u.email === email && u.password === password);
        
        if (!user) {
            document.getElementById('loginMessage').textContent = '邮箱或密码错误';
            return;
        }
        
        currentUser = user;
        document.getElementById('loginMessage').style.color = '#34A853';
        document.getElementById('loginMessage').textContent = '登录成功！';
        
        // 更新导航栏
        document.getElementById('tabLogin').innerHTML = '👤 ' + user.username;
        
        // 如果是社区长，显示管理入口
        if (user.role === 'community_leader') {
            document.getElementById('adminNavItem').classList.remove('hidden');
        }
        
        setTimeout(() => switchPanel('home'), 1000);
    }
// ============ 发布帖子 ============
async function createPost() {
    if (!currentUser) {
        document.getElementById('postMessage').textContent = '请先登录';
        return;
    }
    
    const content = document.getElementById('postContent').value.trim();
    if (!content) return;
    
    const newPost = {
        id: Date.now(),
        username: currentUser.username,
        userRole: currentUser.role,
        content: content,
        likes: 0,
        created_at: new Date().toISOString()
    };
    
    allPosts.unshift(newPost);
    await saveToIPFS();
    
    document.getElementById('postContent').value = '';
    document.getElementById('postMessage').textContent = '发布成功！';
    
    setTimeout(() => switchPanel('home'), 1000);
}

// ============ 加载帖子 ============
function loadPosts() {
    const container = document.getElementById('postsList');
    
    if (allPosts.length === 0) {
        container.innerHTML = '<div class="empty-state">还没有帖子<br><br><button class="btn-small" onclick="switchPanel(\'post\')">发布第一条</button></div>';
        return;
    }
    
    // 只显示7天内的帖子
    const sevenDaysAgo = new Date();
    sevenDaysAgo.setDate(sevenDaysAgo.getDate() - 7);
    
    const recentPosts = allPosts
        .filter(p => new Date(p.created_at) > sevenDaysAgo)
        .sort((a, b) => new Date(b.created_at) - new Date(a.created_at));
    
    if (recentPosts.length === 0) {
        container.innerHTML = '<div class="empty-state">7天内没有新帖子<br><br><button class="btn-small" onclick="switchPanel(\'post\')">发布一条</button></div>';
        return;
    }
    
    container.innerHTML = recentPosts.map(post => {
        const user = allUsers.find(u => u.username === post.username);
        const isVerified = (user?.role === 'admin' || user?.role === 'community_leader');
        const hasLiked = currentUser && allLikes.some(l => l.username === currentUser.username && l.postId === post.id);
        const isFollowed = currentUser && allFollows.some(f => f.follower === currentUser.username && f.followed === post.username);
        
        return `
        <div class="post-item">
            <div class="post-header">
                <div class="post-author">
                    <span class="post-author-name" onclick="viewUserProfile('${post.username}')">${post.username}</span>
                    ${isVerified ? '<span class="post-verified">✓</span>' : ''}
                    ${user?.role === 'community_leader' ? '<span style="color:#FBBC05; font-size:11px; margin-left:5px;">社区长</span>' : ''}
                    ${user?.role === 'admin' ? '<span style="color:#EA4335; font-size:11px; margin-left:5px;">管理员</span>' : ''}
                </div>
                <div class="post-time">${formatTime(post.created_at)}</div>
            </div>
            <div class="post-content">${escapeHtml(post.content)}</div>
            <div class="post-stats">
                <span>❤️ ${post.likes}</span>
            </div>
            <div class="post-actions">
                ${currentUser ? `
                    <button class="action-btn ${hasLiked ? 'liked' : ''}" onclick="toggleLike(${post.id})">
                        ${hasLiked ? '已赞' : '点赞'}
                    </button>
                ` : ''}
                ${currentUser && post.username !== currentUser.username ? `
                    <button class="action-btn ${isFollowed ? 'following' : ''}" onclick="toggleFollow('${post.username}')">
                        ${isFollowed ? '取消关注' : '关注'}
                    </button>
                ` : ''}
                ${currentUser && (currentUser.role === 'admin' || currentUser.role === 'community_leader') && post.username !== currentUser.username ? `
                    <button class="action-btn" style="border-color:#EA4335; color:#EA4335;" onclick="deletePost(${post.id})">删除</button>
                ` : ''}
            </div>
        </div>
    `}).join('');
}

// ============ 点赞 ============
async function toggleLike(postId) {
    if (!currentUser) {
        alert('请先登录');
        return;
    }
    
    const existing = allLikes.find(l => l.username === currentUser.username && l.postId === postId);
    const post = allPosts.find(p => p.id === postId);
    
    if (existing) {
        // 取消点赞
        const index = allLikes.findIndex(l => l.username === currentUser.username && l.postId === postId);
        allLikes.splice(index, 1);
        post.likes--;
    } else {
        // 点赞
        allLikes.push({
            username: currentUser.username,
            postId: postId,
            created_at: new Date().toISOString()
        });
        post.likes++;
    }
    
    await saveToIPFS();
    loadPosts();
}

// ============ 关注/取消关注 ============
async function toggleFollow(targetUsername) {
    if (!currentUser) {
        alert('请先登录');
        return;
    }
    
    const existing = allFollows.find(f => f.follower === currentUser.username && f.followed === targetUsername);
    
    if (existing) {
        const index = allFollows.findIndex(f => f.follower === currentUser.username && f.followed === targetUsername);
        allFollows.splice(index, 1);
    } else {
        allFollows.push({
            follower: currentUser.username,
            followed: targetUsername,
            created_at: new Date().toISOString()
        });
    }
    
    await saveToIPFS();
    loadPosts();
}

// ============ 删除帖子（管理员） ============
async function deletePost(postId) {
    if (!confirm('确定要删除这个帖子吗？')) return;
    
    const index = allPosts.findIndex(p => p.id === postId);
    if (index !== -1) {
        allPosts.splice(index, 1);
        await saveToIPFS();
        loadPosts();
    }
}

// ============ 加载个人主页 ============
function loadProfile() {
    if (!currentUser) {
        document.getElementById('profileInfo').innerHTML = '<p style="color: #a0a0b0; text-align: center;">请先登录</p>';
        document.getElementById('myPostsCard').style.display = 'none';
        document.getElementById('myFollowsCard').style.display = 'none';
        return;
    }
    
    // 显示个人信息
    document.getElementById('profileInfo').innerHTML = `
        <div style="text-align: center; margin-bottom: 20px;">
            <div style="width:80px; height:80px; border-radius:40px; background:linear-gradient(135deg,#667eea,#764ba2); margin:0 auto 15px; display:flex; align-items:center; justify-content:center; font-size:32px; font-weight:600;">
                ${currentUser.username.charAt(0).toUpperCase()}
            </div>
            <h3>${currentUser.username}</h3>
            <p style="color:#a0a0b0; font-size:14px;">${currentUser.email}</p>
            <p style="margin-top:10px;">
                ${currentUser.role === 'community_leader' ? '<span style="background:#FBBC05; padding:4px 12px; border-radius:20px; font-size:12px;">社区长</span>' : ''}
                ${currentUser.role === 'admin' ? '<span style="background:#EA4335; padding:4px 12px; border-radius:20px; font-size:12px;">管理员</span>' : ''}
            </p>
        </div>
    `;
    
    // 显示我的帖子
    const myPosts = allPosts.filter(p => p.username === currentUser.username).slice(0, 10);
    const myPostsList = document.getElementById('myPostsList');
    
    if (myPosts.length === 0) {
        myPostsList.innerHTML = '<div class="empty-state">暂无帖子</div>';
    } else {
        myPostsList.innerHTML = myPosts.map(post => `
            <div class="post-item">
                <div class="post-content">${escapeHtml(post.content)}</div>
                <div class="post-time">${formatTime(post.created_at)}</div>
            </div>
        `).join('');
    }
    
    // 显示我的关注
    const myFollows = allFollows.filter(f => f.follower === currentUser.username);
    const myFollowsList = document.getElementById('myFollowsList');
    
    if (myFollows.length === 0) {
        myFollowsList.innerHTML = '<div class="empty-state">暂无关注</div>';
    } else {
        myFollowsList.innerHTML = myFollows.map(f => {
            const user = allUsers.find(u => u.username === f.followed);
            return `
            <div class="user-item">
                <div class="user-info">
                    <div class="user-avatar">${f.followed.charAt(0).toUpperCase()}</div>
                    <div class="user-details">
                        <div class="user-name">${f.followed}</div>
                        <div style="font-size:11px; color:#a0a0b0;">${user?.email || ''}</div>
                    </div>
                </div>
                <button class="btn-small" onclick="toggleFollow('${f.followed}')">取消关注</button>
            </div>
        `}).join('');
    }
    
    document.getElementById('myPostsCard').style.display = 'block';
    document.getElementById('myFollowsCard').style.display = 'block';
}
        // ============ 加载管理面板 ============
        function loadAdminPanel() {
            if (!currentUser || currentUser.role !== 'community_leader') {
                document.getElementById('adminContent').innerHTML = '<p style="color:#a0a0b0; text-align:center;">无权访问</p>';
                return;
            }
            
            // 更新统计
            document.getElementById('totalUsers').textContent = allUsers.length;
            document.getElementById('totalPosts').textContent = allPosts.length;
            
            // 显示用户列表
            const users = allUsers.filter(u => u.role === 'user');
            let html = '<h4 style="margin:20px 0 10px;">普通用户列表</h4>';
            
            users.forEach(user => {
                html += `
                <div class="user-item">
                    <div class="user-info">
                        <div class="user-avatar">${user.username.charAt(0).toUpperCase()}</div>
                        <div class="user-details">
                            <div class="user-name">${user.username}</div>
                            <div style="font-size:11px; color:#a0a0b0;">${user.email}</div>
                        </div>
                    </div>
                    <button class="btn-small" onclick="promoteToAdmin('${user.username}')">提升管理员</button>
                </div>
                `;
            });
            
            document.getElementById('adminContent').innerHTML = html;
        }

        // ============ 提升管理员 ============
        async function promoteToAdmin(username) {
            if (!currentUser || currentUser.role !== 'community_leader') return;
            
            const user = allUsers.find(u => u.username === username);
            if (user) {
                user.role = 'admin';
                await saveToIPFS();
                loadAdminPanel();
                alert(`已将 ${username} 提升为管理员`);
            }
        }

        // ============ 辅助函数 ============
        function formatTime(timestamp) {
            const date = new Date(timestamp);
            const now = new Date();
            const diff = Math.floor((now - date) / 1000 / 60);
            
            if (diff < 1) return '刚刚';
            if (diff < 60) return diff + '分钟前';
            if (diff < 1440) return Math.floor(diff / 60) + '小时前';
            return `${date.getMonth()+1}月${date.getDate()}日`;
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // ============ 初始化 ============
        init();

        // ============ 定时刷新 ============
        setInterval(() => {
            if (currentDataHash) {
                loadFromIPFS(currentDataHash);
            }
            if (document.querySelector('.panel.active').id === 'homePanel') {
                loadPosts();
            }
        }, 30000);
    </script>
